  - id: missing-ssl-minversion
    name: missing-ssl-minversion
    description: >-
      `MinVersion` is missing from this TLS configuration.  By default, as of Go 1.22, TLS 1.2 is currently used as the
      minimum. General purpose web applications should default to TLS 1.3 with all other protocols disabled.  Only where
      it is known that a web server must support legacy clients with unsupported an insecure browsers (such as Internet
      Explorer 10), it may be necessary to enable TLS 1.0 to provide support. Add `MinVersion: tls.VersionTLS13' to the
      TLS configuration to bump the minimum version to TLS 1.3.
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          tls.Config{ $...CONF }
        message: >-
          `MinVersion` is missing from this TLS configuration.  By default, as of Go 1.22, TLS 1.2 is currently used as
          the minimum. General purpose web applications should default to TLS 1.3 with all other protocols disabled. 
          Only where it is known that a web server must support legacy clients with unsupported an insecure browsers
          (such as Internet Explorer 10), it may be necessary to enable TLS 1.0 to provide support. Add `MinVersion:
          tls.VersionTLS13' to the TLS configuration to bump the minimum version to TLS 1.3.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://go.dev/doc/go1.22#minor_library_changes
      - https://pkg.go.dev/crypto/tls#:~:text=MinVersion
      - https://www.us-cert.gov/ncas/alerts/TA14-290A
    tags:
      - go

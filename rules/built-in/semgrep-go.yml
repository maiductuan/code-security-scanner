  - id: filepath-clean-misuse
    name: filepath-clean-misuse
    description: >-
      `Clean` is not intended to sanitize against path traversal attacks. This function is for finding the shortest path
      name equivalent to the given input. Using `Clean` to sanitize file reads may expose this application to path
      traversal attacks, where an attacker could access arbitrary files on the server. To fix this easily, write this:
      `filepath.FromSlash(path.Clean("/"+strings.Trim(req.URL.Path, "/")))` However, a better solution is using the
      `SecureJoin` function in the package `filepath-securejoin`. See
      https://pkg.go.dev/github.com/cyphar/filepath-securejoin#section-readme.
    category: file-ops
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          `Clean` is not intended to sanitize against path traversal attacks. This function is for finding the shortest
          path name equivalent to the given input. Using `Clean` to sanitize file reads may expose this application to
          path traversal attacks, where an attacker could access arbitrary files on the server. To fix this easily,
          write this: `filepath.FromSlash(path.Clean("/"+strings.Trim(req.URL.Path, "/")))` However, a better solution
          is using the `SecureJoin` function in the package `filepath-securejoin`. See
          https://pkg.go.dev/github.com/cyphar/filepath-securejoin#section-readme.
    cwe:
      - CWE-22
    owasp:
      - A05:2017
      - A01:2021

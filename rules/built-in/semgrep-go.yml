rules:
  - id: anthropic-hardcoded-api-key-go
    name: anthropic-hardcoded-api-key-go
    description: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: option.WithAPIKey("$KEY")
        message: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/initial-setup
    tags:
      - anthropic
  - id: gemini-hardcoded-api-key-go
    name: gemini-hardcoded-api-key-go
    description: Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: option.WithAPIKey("$KEY")
        message: Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://ai.google.dev/gemini-api/docs/api-key
    tags:
      - gemini
      - google
  - id: llm-api-key-in-source-go
    name: llm-api-key-in-source-go
    description: >-
      AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI, Anthropic,
      Google, Hugging Face). Use environment variables or a secrets manager instead.
    category: injection
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI,
          Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
    tags:
      - openai
      - anthropic
      - google
      - huggingface
  - id: openai-hardcoded-api-key-go
    name: openai-hardcoded-api-key-go
    description: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: openai.NewClient("$KEY")
        message: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://help.openai.com/en/articles/5112595-best-practices-for-api-key-safety
    tags:
      - openai
  - id: detect-gemini
    name: detect-gemini
    description: 'Possibly found usage of AI: Gemini'
    category: security
    severity: low
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: import "github.com/google/generative-ai-go"
        message: 'Possibly found usage of AI: Gemini'
      - pattern: genai.NewClient(...)
        message: 'Possibly found usage of AI: Gemini'
    cwe: []
    owasp: []
    references:
      - https://semgrep.dev/blog/2024/detecting-shadow-ai
    tags:
      - genAI
      - LLMs
  - id: detect-openai
    name: detect-openai
    description: 'Possibly found usage of AI: OpenAI'
    category: security
    severity: low
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: import "github.com/sashabaranov/go-openai"
        message: 'Possibly found usage of AI: OpenAI'
      - pattern: gogpt.NewClient(...)
        message: 'Possibly found usage of AI: OpenAI'
    cwe: []
    owasp: []
    references:
      - https://semgrep.dev/blog/2024/detecting-shadow-ai
    tags:
      - genAI
      - LLMs
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: database-sqli
    name: database-sqli
    description: >-
      Detected SQL statement that is tainted by `$EVENT` object. This could lead to SQL injection if the variable is
      user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
      prepared statements instead. You can use prepared statements with the 'Prepare' and 'PrepareContext' calls.
    category: injection
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          Detected SQL statement that is tainted by `$EVENT` object. This could lead to SQL injection if the variable is
          user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
          prepared statements instead. You can use prepared statements with the 'Prepare' and 'PrepareContext' calls.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://pkg.go.dev/database/sql#DB.Query
    tags:
      - aws-lambda
      - database
      - sql
  - id: tainted-sql-string
    name: tainted-sql-string
    description: >-
      Detected user input used to manually construct a SQL string. This is usually bad practice because manual
      construction could accidentally result in a SQL injection. An attacker could use a SQL injection to steal or
      modify contents of the database. Instead, use a parameterized query which is available by default in most database
      engines. Alternatively, consider using an object-relational mapper (ORM) such as Sequelize which will protect your
      queries.
    category: injection
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          Detected user input used to manually construct a SQL string. This is usually bad practice because manual
          construction could accidentally result in a SQL injection. An attacker could use a SQL injection to steal or
          modify contents of the database. Instead, use a parameterized query which is available by default in most
          database engines. Alternatively, consider using an object-relational mapper (ORM) such as Sequelize which will
          protect your queries.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/www-community/attacks/SQL_Injection
    tags:
      - aws-lambda
  - id: handler-assignment-from-multiple-sources
    name: handler-assignment-from-multiple-sources
    description: >-
      Variable $VAR is assigned from two different sources: '$Y' and '$R'. Make sure this is intended, as this could
      cause logic bugs if they are treated as they are the same object.
    category: injection
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          Variable $VAR is assigned from two different sources: '$Y' and '$R'. Make sure this is intended, as this could
          cause logic bugs if they are treated as they are the same object.
    cwe:
      - CWE-289
    owasp: []
    references:
      - https://cwe.mitre.org/data/definitions/289.html
    tags:
      - gorilla
  - id: session-cookie-missing-httponly
    name: session-cookie-missing-httponly
    description: >-
      A session cookie was detected without setting the 'HttpOnly' flag. The 'HttpOnly' flag for cookies instructs the
      browser to forbid client-side scripts from reading the cookie which mitigates XSS attacks. Set the 'HttpOnly' flag
      by setting 'HttpOnly' to 'true' in the Options struct.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          &sessions.Options{
            ...,
          }
        message: >-
          A session cookie was detected without setting the 'HttpOnly' flag. The 'HttpOnly' flag for cookies instructs
          the browser to forbid client-side scripts from reading the cookie which mitigates XSS attacks. Set the
          'HttpOnly' flag by setting 'HttpOnly' to 'true' in the Options struct.
    cwe:
      - CWE-1004
    owasp:
      - A05:2021
      - A02:2025
    references:
      - https://github.com/0c34/govwa/blob/139693e56406b5684d2a6ae22c0af90717e149b8/user/session/session.go#L69
    tags:
      - gorilla
  - id: session-cookie-missing-secure
    name: session-cookie-missing-secure
    description: >-
      A session cookie was detected without setting the 'Secure' flag. The 'secure' flag for cookies prevents the client
      from transmitting the cookie over insecure channels such as HTTP. Set the 'Secure' flag by setting 'Secure' to
      'true' in the Options struct.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          &sessions.Options{
            ...,
          }
        message: >-
          A session cookie was detected without setting the 'Secure' flag. The 'secure' flag for cookies prevents the
          client from transmitting the cookie over insecure channels such as HTTP. Set the 'Secure' flag by setting
          'Secure' to 'true' in the Options struct.
    cwe:
      - CWE-614
    owasp:
      - A05:2021
      - A02:2025
    references:
      - https://github.com/0c34/govwa/blob/139693e56406b5684d2a6ae22c0af90717e149b8/user/session/session.go#L69
    tags:
      - gorilla
  - id: session-cookie-samesitenone
    name: session-cookie-samesitenone
    description: >-
      Found SameSiteNoneMode setting in Gorilla session options. Consider setting SameSite to Lax, Strict or Default for
      enhanced security.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          &sessions.Options{
            ...,
          }
        message: >-
          Found SameSiteNoneMode setting in Gorilla session options. Consider setting SameSite to Lax, Strict or Default
          for enhanced security.
    cwe:
      - CWE-1275
    owasp:
      - A05:2021
      - A02:2025
    references:
      - https://pkg.go.dev/github.com/gorilla/sessions#Options
    tags:
      - gorilla
  - id: websocket-missing-origin-check
    name: websocket-missing-origin-check
    description: >-
      The Origin header in the HTTP WebSocket handshake is used to guarantee that the connection accepted by the
      WebSocket is from a trusted origin domain. Failure to enforce can lead to Cross Site Request Forgery (CSRF). As
      per "gorilla/websocket" documentation: "A CheckOrigin function should carefully validate the request origin to
      prevent cross-site request forgery."
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          The Origin header in the HTTP WebSocket handshake is used to guarantee that the connection accepted by the
          WebSocket is from a trusted origin domain. Failure to enforce can lead to Cross Site Request Forgery (CSRF).
          As per "gorilla/websocket" documentation: "A CheckOrigin function should carefully validate the request origin
          to prevent cross-site request forgery."
    cwe:
      - CWE-352
    owasp:
      - A01:2021
      - A01:2025
    references:
      - https://pkg.go.dev/github.com/gorilla/websocket#Upgrader
    tags:
      - gorilla
  - id: gorm-dangerous-method-usage
    name: gorm-dangerous-method-usage
    description: >-
      Detected usage of dangerous method $METHOD which does not escape inputs (see link in references). If the argument
      is user-controlled, this can lead to SQL injection. When using $METHOD function, do not trust user-submitted data
      and only allow approved list of input (possibly, use an allowlist approach).
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          Detected usage of dangerous method $METHOD which does not escape inputs (see link in references). If the
          argument is user-controlled, this can lead to SQL injection. When using $METHOD function, do not trust
          user-submitted data and only allow approved list of input (possibly, use an allowlist approach).
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://gorm.io/docs/security.html#SQL-injection-Methods
      - https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
    tags:
      - gorm
  - id: grpc-client-insecure-connection
    name: grpc-client-insecure-connection
    description: >-
      Found an insecure gRPC connection using 'grpc.WithInsecure()'. This creates a connection without encryption to a
      gRPC server. A malicious attacker could tamper with the gRPC message, which could compromise the machine. Instead,
      establish a secure connection with an SSL certificate using the 'grpc.WithTransportCredentials()' function. You
      can create a create credentials using a 'tls.Config{}' struct with 'credentials.NewTLS()'. The final fix looks
      like this: 'grpc.WithTransportCredentials(credentials.NewTLS(<config>))'.
    category: security
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: $GRPC.Dial($ADDR, ..., $GRPC.WithInsecure(...), ...)
        message: >-
          Found an insecure gRPC connection using 'grpc.WithInsecure()'. This creates a connection without encryption to
          a gRPC server. A malicious attacker could tamper with the gRPC message, which could compromise the machine.
          Instead, establish a secure connection with an SSL certificate using the 'grpc.WithTransportCredentials()'
          function. You can create a create credentials using a 'tls.Config{}' struct with 'credentials.NewTLS()'. The
          final fix looks like this: 'grpc.WithTransportCredentials(credentials.NewTLS(<config>))'.
    cwe:
      - CWE-300
    owasp:
      - A07:2021
      - A07:2025
    references:
      - https://blog.gopheracademy.com/advent-2019/go-grps-and-tls/#connection-without-encryption
    tags:
      - grpc
  - id: grpc-server-insecure-connection
    name: grpc-server-insecure-connection
    description: >-
      Found an insecure gRPC server without 'grpc.Creds()' or options with credentials. This allows for a connection
      without encryption to this server. A malicious attacker could tamper with the gRPC message, which could compromise
      the machine. Include credentials derived from an SSL certificate in order to create a secure gRPC connection. You
      can create credentials using 'credentials.NewServerTLSFromFile("cert.pem", "cert.key")'.
    category: security
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          Found an insecure gRPC server without 'grpc.Creds()' or options with credentials. This allows for a connection
          without encryption to this server. A malicious attacker could tamper with the gRPC message, which could
          compromise the machine. Include credentials derived from an SSL certificate in order to create a secure gRPC
          connection. You can create credentials using 'credentials.NewServerTLSFromFile("cert.pem", "cert.key")'.
    cwe:
      - CWE-300
    owasp:
      - A07:2021
      - A07:2025
    references:
      - https://blog.gopheracademy.com/advent-2019/go-grps-and-tls/#connection-without-encryption
    tags:
      - grpc
  - id: jwt-go-parse-unverified
    name: jwt-go-parse-unverified
    description: >-
      Detected the decoding of a JWT token without a verify step. Don't use `ParseUnverified` unless you know what
      you're doing This method parses the token but doesn't validate the signature. It's only ever useful in cases where
      you know the signature is valid (because it has been checked previously in the stack) and you want to extract
      values from it.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          $JWT.ParseUnverified(...)
        message: >-
          Detected the decoding of a JWT token without a verify step. Don't use `ParseUnverified` unless you know what
          you're doing This method parses the token but doesn't validate the signature. It's only ever useful in cases
          where you know the signature is valid (because it has been checked previously in the stack) and you want to
          extract values from it.
    cwe:
      - CWE-345
    owasp:
      - A08:2021
      - A08:2025
    references:
      - https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures
    tags:
      - jwt
  - id: jwt-go-none-algorithm
    name: jwt-go-none-algorithm
    description: >-
      Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token has
      already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
      verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
    category: auth
    severity: high
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token
          has already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
          verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - jwt
  - id: hardcoded-jwt-key
    name: hardcoded-jwt-key
    description: >-
      A hard-coded credential was detected. It is not recommended to store credentials in source-code, as this risks
      secrets being leaked and used by either an internal or external malicious adversary. It is recommended to use
      environment variables to securely provide credentials or retrieve credentials from a secure vault or HSM (Hardware
      Security Module).
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          A hard-coded credential was detected. It is not recommended to store credentials in source-code, as this risks
          secrets being leaked and used by either an internal or external malicious adversary. It is recommended to use
          environment variables to securely provide credentials or retrieve credentials from a secure vault or HSM
          (Hardware Security Module).
    cwe:
      - CWE-798
    owasp:
      - A07:2021
      - A07:2025
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
    tags:
      - jwt
      - secrets
  - id: channel-guarded-with-mutex
    name: channel-guarded-with-mutex
    description: >-
      Detected a channel guarded with a mutex. Channels already have an internal mutex, so this is unnecessary. Remove
      the mutex. See https://hackmongo.com/page/golang-antipatterns/#guarded-channel for more information.
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          $MUX.Lock()
          $VALUE <- $CHANNEL
          $MUX.Unlock()
        message: >-
          Detected a channel guarded with a mutex. Channels already have an internal mutex, so this is unnecessary.
          Remove the mutex. See https://hackmongo.com/page/golang-antipatterns/#guarded-channel for more information.
      - pattern: |
          $MUX.Lock()
          $VALUE = <- $CHANNEL
          $MUX.Unlock()
        message: >-
          Detected a channel guarded with a mutex. Channels already have an internal mutex, so this is unnecessary.
          Remove the mutex. See https://hackmongo.com/page/golang-antipatterns/#guarded-channel for more information.
    cwe: []
    owasp: []
    references: []
    tags:
      - go
  - id: hidden-goroutine
    name: hidden-goroutine
    description: >-
      Detected a hidden goroutine. Function invocations are expected to synchronous, and this function will execute
      asynchronously because all it does is call a goroutine. Instead, remove the internal goroutine and call the
      function using 'go'.
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          func $FUNC(...) {
            go func() {
              ...
            }(...)
          }
        message: >-
          Detected a hidden goroutine. Function invocations are expected to synchronous, and this function will execute
          asynchronously because all it does is call a goroutine. Instead, remove the internal goroutine and call the
          function using 'go'.
    cwe: []
    owasp: []
    references: []
    tags:
      - go
  - id: exported_loop_pointer
    name: exported_loop_pointer
    description: >-
      `$VALUE` is a loop pointer that may be exported from the loop. This pointer is shared between loop iterations, so
      the exported reference will always point to the last loop value, which is likely unintentional. To fix, copy the
      pointer to a new pointer within the loop.
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          for _, $VALUE := range $SOURCE {
            <... &($VALUE) ...>
          }
        message: >-
          `$VALUE` is a loop pointer that may be exported from the loop. This pointer is shared between loop iterations,
          so the exported reference will always point to the last loop value, which is likely unintentional. To fix,
          copy the pointer to a new pointer within the loop.
      - pattern: |
          for _, $VALUE := range $SOURCE {
            <... func() { <... &$VALUE ...> } ...>
          }
        message: >-
          `$VALUE` is a loop pointer that may be exported from the loop. This pointer is shared between loop iterations,
          so the exported reference will always point to the last loop value, which is likely unintentional. To fix,
          copy the pointer to a new pointer within the loop.
      - pattern: |
          for _, $VALUE := range $SOURCE {
            <... $ANYTHING(..., <... &$VALUE ...>, ...) ...>
          }
        message: >-
          `$VALUE` is a loop pointer that may be exported from the loop. This pointer is shared between loop iterations,
          so the exported reference will always point to the last loop value, which is likely unintentional. To fix,
          copy the pointer to a new pointer within the loop.
    cwe: []
    owasp: []
    references:
      - https://github.com/kyoh86/looppointer
    tags:
      - go
  - id: integer-overflow-int16
    name: integer-overflow-int16
    description: >-
      Detected conversion of the result of a strconv.Atoi command to an int16. This could lead to an integer overflow,
      which could possibly result in unexpected behavior and even privilege escalation. Instead, use `strconv.ParseInt`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          $F, $ERR := strconv.Atoi($NUM)
          ...
          int16($F)
        message: >-
          Detected conversion of the result of a strconv.Atoi command to an int16. This could lead to an integer
          overflow, which could possibly result in unexpected behavior and even privilege escalation. Instead, use
          `strconv.ParseInt`.
    cwe: []
    owasp: []
    references: []
    tags:
      - go
  - id: integer-overflow-int32
    name: integer-overflow-int32
    description: >-
      Detected conversion of the result of a strconv.Atoi command to an int32. This could lead to an integer overflow,
      which could possibly result in unexpected behavior and even privilege escalation. Instead, use `strconv.ParseInt`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - pattern: |
          $F, $ERR := strconv.Atoi($NUM)
          ...
          int32($F)
        message: >-
          Detected conversion of the result of a strconv.Atoi command to an int32. This could lead to an integer
          overflow, which could possibly result in unexpected behavior and even privilege escalation. Instead, use
          `strconv.ParseInt`.
    cwe: []
    owasp: []
    references: []
    tags:
      - go
  - id: incorrect-default-permission
    name: incorrect-default-permission
    description: >-
      Detected file permissions that are set to more than `0600` (user/owner can read and write). Setting file
      permissions to higher than `0600` is most likely unnecessary and violates the principle of least privilege.
      Instead, set permissions to be `0600` or less for os.Chmod, os.Mkdir, os.OpenFile, os.MkdirAll, and
      ioutil.WriteFile
    category: security
    severity: medium
    confidence: medium
    languages:
      - go
    patterns:
      - regex: .*
        message: >-
          Detected file permissions that are set to more than `0600` (user/owner can read and write). Setting file
          permissions to higher than `0600` is most likely unnecessary and violates the principle of least privilege.
          Instead, set permissions to be `0600` or less for os.Chmod, os.Mkdir, os.OpenFile, os.MkdirAll, and
          ioutil.WriteFile
    cwe:
      - CWE-276
    owasp: []
    references:
      - https://github.com/securego/gosec/blob/master/rules/fileperms.go
    tags:
      - go

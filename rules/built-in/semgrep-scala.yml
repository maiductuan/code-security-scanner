  - id: scalajs-eval
    name: scalajs-eval
    description: >-
      `eval()` function evaluates JavaScript code represented as a string. Executing JavaScript from a string is an
      enormous security risk. It is far too easy for a bad actor to run arbitrary code when you use `eval()`. Do not use
      eval(). Alternatively: Ensure evaluated content is not definable by external sources. If it’s not possible, strip
      everything except alphanumeric characters from an input provided for the command string and arguments.
    category: injection
    severity: medium
    confidence: medium
    languages:
      - scala
    patterns:
      - regex: .*
        message: >-
          `eval()` function evaluates JavaScript code represented as a string. Executing JavaScript from a string is an
          enormous security risk. It is far too easy for a bad actor to run arbitrary code when you use `eval()`. Do not
          use eval(). Alternatively: Ensure evaluated content is not definable by external sources. If it’s not
          possible, strip everything except alphanumeric characters from an input provided for the command string and
          arguments.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://www.scala-js.org/doc/
    tags:
      - scala
      - scala-js
  - id: tainted-sql-string
    name: tainted-sql-string
    description: >-
      User data flows into this manually-constructed SQL string. User data can be safely inserted into SQL strings using
      prepared statements or an object-relational mapper (ORM). Manually-constructed SQL strings is a possible indicator
      of SQL injection, which could let an attacker steal or manipulate data from the database. Instead, use prepared
      statements (`connection.PreparedStatement`) or a safe library.
    category: injection
    severity: high
    confidence: medium
    languages:
      - scala
    patterns:
      - regex: .*
        message: >-
          User data flows into this manually-constructed SQL string. User data can be safely inserted into SQL strings

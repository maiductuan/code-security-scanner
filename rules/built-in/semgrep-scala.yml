  - id: path-traversal-fromfile
    name: path-traversal-fromfile
    description: >-
      Flags cases of possible path traversal. If an unfiltered parameter is passed into 'fromFile', file from an
      arbitrary filesystem location could be read. This could lead to sensitive data exposure and other provles.
      Instead, sanitize the user input instead of performing direct string concatenation.
    category: file-ops

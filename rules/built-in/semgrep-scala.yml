rules:
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: no-null-cipher
    name: no-null-cipher
    description: >-
      NullCipher was detected. This will not encrypt anything; the cipher text will be the same as the plain text. Use a
      valid, secure cipher: Cipher.getInstance("AES/CBC/PKCS7PADDING"). See
      https://owasp.org/www-community/Using_the_Java_Cryptographic_Extensions for more information.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - kt
      - scala
    patterns:
      - pattern: NullCipher(...)
        message: >-
          NullCipher was detected. This will not encrypt anything; the cipher text will be the same as the plain text.
          Use a valid, secure cipher: Cipher.getInstance("AES/CBC/PKCS7PADDING"). See
          https://owasp.org/www-community/Using_the_Java_Cryptographic_Extensions for more information.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - kotlin
  - id: jwt-scala-hardcode
    name: jwt-scala-hardcode
    description: >-
      Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
      https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect the
      credentials (e.g. keeping secrets in environment variables)
    category: auth
    severity: medium
    confidence: medium
    languages:
      - scala
    patterns:
      - regex: .*
        message: >-
          Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
          https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect
          the credentials (e.g. keeping secrets in environment variables)
    cwe:
      - CWE-522
    owasp:
      - A02:2017
      - A04:2021
      - A06:2025
    references:
      - https://jwt-scala.github.io/jwt-scala/
    tags:
      - scala
  - id: positive-number-index-of
    name: positive-number-index-of
    description: >-
      Flags scala code that look for values that are greater than 0. This ignores the first element, which is most
      likely a bug. Instead, use indexOf with -1. If the intent is to check the inclusion of a value, use the contains
      method instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - scala
    patterns:
      - regex: .*
        message: >-
          Flags scala code that look for values that are greater than 0. This ignores the first element, which is most
          likely a bug. Instead, use indexOf with -1. If the intent is to check the inclusion of a value, use the
          contains method instead.
    cwe: []
    owasp: []
    references:
      - https://blog.codacy.com/9-scala-security-issues/
    tags:
      - scala
  - id: dangerous-seq-run
    name: dangerous-seq-run
    description: >-
      Found dynamic content used for the external process. This is dangerous if arbitrary data can reach this function
      call because it allows a malicious actor to execute commands. Ensure your variables are not controlled by users or
      sufficiently sanitized.

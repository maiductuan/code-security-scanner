  - id: scala-jwt-hardcoded-secret
    name: scala-jwt-hardcoded-secret
    description: >-
      Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
      https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect the
      credentials (e.g. keeping secrets in environment variables)
    category: secrets
    severity: high
    confidence: medium
    languages:
      - scala
    patterns:
      - pattern: |
          com.auth0.jwt.algorithms.Algorithm.HMAC256("...");
        message: >-
          Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
          https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect
          the credentials (e.g. keeping secrets in environment variables)
      - pattern: |
          $SECRET = "...";
          ...
          com.auth0.jwt.algorithms.Algorithm.HMAC256($SECRET);
        message: >-
          Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
          https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect
          the credentials (e.g. keeping secrets in environment variables)
      - pattern: |
          class $CLASS {
            ...
            $DECL $SECRET = "...";
            ...
            def $FUNC (...): $RETURNTYPE = {
              ...
              com.auth0.jwt.algorithms.Algorithm.HMAC256($SECRET);
              ...
            }
            ...
          }
        message: >-
          Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
          https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect
          the credentials (e.g. keeping secrets in environment variables)
      - pattern: |
          com.auth0.jwt.algorithms.Algorithm.HMAC384("...");
        message: >-
          Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
          https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect
          the credentials (e.g. keeping secrets in environment variables)
      - pattern: |
          $SECRET = "...";
          ...
          com.auth0.jwt.algorithms.Algorithm.HMAC384($SECRET);
        message: >-

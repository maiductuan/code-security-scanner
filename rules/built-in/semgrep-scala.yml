  - id: dispatch-ssrf
    name: dispatch-ssrf
    description: >-
      A parameter being passed directly into `url` most likely lead to SSRF. This could allow an attacker to send data
      to their own server, potentially exposing sensitive data sent with this request. They could also probe internal
      servers or other resources that the server running this code can access. Do not allow arbitrary hosts. Instead,
      create an allowlist for approved hosts, or hardcode the correct host.
    category: api-security
    severity: medium
    confidence: medium
    languages:
      - scala
    patterns:
      - pattern: url($URL)
        message: >-
          A parameter being passed directly into `url` most likely lead to SSRF. This could allow an attacker to send
          data to their own server, potentially exposing sensitive data sent with this request. They could also probe
          internal servers or other resources that the server running this code can access. Do not allow arbitrary
          hosts. Instead, create an allowlist for approved hosts, or hardcode the correct host.
    cwe:
      - CWE-918
    owasp:
      - A10:2021
      - A01:2025
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html
      - https://dispatchhttp.org/Dispatch.html
    tags:
      - scala
      - dispatch
  - id: documentbuilder-dtd-enabled
    name: documentbuilder-dtd-enabled
    description: >-
      Document Builder being instantiated without calling the `setFeature` functions that are generally used for
      disabling entity processing. User controlled data in XML Document builder can result in XML Internal Entity
      Processing vulnerabilities like the disclosure of confidential data, denial of service, Server Side Request
      Forgery (SSRF), port scanning. Make sure to disable entity processing functionality.
    category: security
    severity: medium
    confidence: medium
    languages:
      - scala
    patterns:
      - regex: .*
        message: >-
          Document Builder being instantiated without calling the `setFeature` functions that are generally used for
          disabling entity processing. User controlled data in XML Document builder can result in XML Internal Entity
          Processing vulnerabilities like the disclosure of confidential data, denial of service, Server Side Request
          Forgery (SSRF), port scanning. Make sure to disable entity processing functionality.
    cwe:
      - CWE-611
    owasp:
      - A04:2017
      - A05:2021
      - A02:2025
    references:
      - https://owasp.org/Top10/A05_2021-Security_Misconfiguration
    tags:
      - scala
  - id: insecure-random
    name: insecure-random
    description: >-
      Flags the use of a predictable random value from `scala.util.Random`. This can lead to vulnerabilities when used
      in security contexts, such as in a CSRF token, password reset token, or any other secret value. To fix this, use
      java.security.SecureRandom instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - scala
    patterns:
      - pattern: |
          import scala.util.Random
        message: >-
          Flags the use of a predictable random value from `scala.util.Random`. This can lead to vulnerabilities when
          used in security contexts, such as in a CSRF token, password reset token, or any other secret value. To fix
          this, use java.security.SecureRandom instead.
    cwe:
      - CWE-330
    owasp:
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - scala

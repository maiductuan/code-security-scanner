  - id: rsa-padding-set
    name: rsa-padding-set
    description: >-
      Usage of RSA without OAEP (Optimal Asymmetric Encryption Padding) may weaken encryption. This could lead to
      sensitive data exposure. Instead, use RSA with `OAEPWithMD5AndMGF1Padding` instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - scala
    patterns:
      - pattern: |
          $VAR = $CIPHER.getInstance($MODE)
        message: >-
          Usage of RSA without OAEP (Optimal Asymmetric Encryption Padding) may weaken encryption. This could lead to
          sensitive data exposure. Instead, use RSA with `OAEPWithMD5AndMGF1Padding` instead.
    cwe:
      - CWE-780
    owasp:
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - scala
      - cryptography

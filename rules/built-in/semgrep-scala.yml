          indicator of SQL injection, which could let an attacker steal or manipulate data from the database. Instead,
          use prepared statements (`connection.PreparedStatement`) or a safe library.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://docs.oracle.com/javase/7/docs/api/java/sql/PreparedStatement.html
    tags:
      - scala

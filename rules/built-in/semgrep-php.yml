      - >-
        https://github.com/FloeDesignTechnologies/phpcs-security-audit/blob/master/Security/Sniffs/BadFunctions/BackticksSniff.php
    tags:
      - php
  - id: base-convert-loses-precision
    name: base-convert-loses-precision
    description: >-
      The function base_convert uses 64-bit numbers internally, and does not correctly convert large numbers. It is not
      suitable for random tokens such as those used for session tokens or CSRF tokens.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          The function base_convert uses 64-bit numbers internally, and does not correctly convert large numbers. It is
          not suitable for random tokens such as those used for session tokens or CSRF tokens.
    cwe:
      - CWE-190
    owasp: []
    references:
      - https://www.php.net/base_convert
      - https://www.sjoerdlangkemper.nl/2017/03/15/dont-use-base-convert-on-random-tokens/
    tags:
      - php
  - id: curl-ssl-verifypeer-off
    name: curl-ssl-verifypeer-off
    description: SSL verification is disabled but should not be (currently CURLOPT_SSL_VERIFYPEER= $IS_VERIFIED)
    category: security
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: SSL verification is disabled but should not be (currently CURLOPT_SSL_VERIFYPEER= $IS_VERIFIED)
    cwe:
      - CWE-319
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://www.saotn.org/dont-turn-off-curlopt_ssl_verifypeer-fix-php-configuration/
    tags:
      - php
  - id: extract-user-data
    name: extract-user-data
    description: >-
      Do not call 'extract()' on user-controllable data. If you must, then you must also provide the EXTR_SKIP flag to
      prevent overwriting existing variables.
    category: security
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          Do not call 'extract()' on user-controllable data. If you must, then you must also provide the EXTR_SKIP flag
          to prevent overwriting existing variables.
    cwe:
      - CWE-502
    owasp:
      - A08:2017
      - A08:2021
      - A08:2025
    references:
      - https://www.php.net/manual/en/function.extract.php#refsect1-function.extract-notes
    tags:
      - php
  - id: eval-use
    name: eval-use
    description: Evaluating non-constant commands. This can lead to command injection.
    category: injection
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - pattern: eval(...);
        message: Evaluating non-constant commands. This can lead to command injection.
    cwe:
      - CWE-78
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://www.php.net/manual/en/function.eval
      - >-
        https://github.com/FloeDesignTechnologies/phpcs-security-audit/blob/master/Security/Sniffs/BadFunctions/NoEvalsSniff.php
    tags:
      - php
  - id: exec-use
    name: exec-use
    description: Executing non-constant commands. This can lead to command injection.
    category: security
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - pattern: $FUNC(...);
        message: Executing non-constant commands. This can lead to command injection.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - >-
        https://github.com/FloeDesignTechnologies/phpcs-security-audit/blob/master/Security/Sniffs/BadFunctions/SystemExecFunctionsSniff.php
    tags:
      - php
  - id: file-inclusion
    name: file-inclusion
    description: >-
      Detected non-constant file inclusion. This can lead to local file inclusion (LFI) or remote file inclusion (RFI)
      if user input reaches this statement. LFI and RFI could lead to sensitive files being obtained by attackers.
      Instead, explicitly specify what to include. If that is not a viable solution, validate user input thoroughly.
    category: file-ops
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          Detected non-constant file inclusion. This can lead to local file inclusion (LFI) or remote file inclusion
          (RFI) if user input reaches this statement. LFI and RFI could lead to sensitive files being obtained by
          attackers. Instead, explicitly specify what to include. If that is not a viable solution, validate user input
          thoroughly.
    cwe:
      - CWE-98
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://www.php.net/manual/en/function.include.php
      - >-
        https://github.com/FloeDesignTechnologies/phpcs-security-audit/blob/master/Security/Sniffs/BadFunctions/EasyRFISniff.php
      - https://en.wikipedia.org/wiki/File_inclusion_vulnerability#Types_of_Inclusion
    tags:
      - php
  - id: ftp-use
    name: ftp-use
    description: FTP allows for unencrypted file transfers. Consider using an encrypted alternative.
    category: security
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - pattern: $FUNC(...);
        message: FTP allows for unencrypted file transfers. Consider using an encrypted alternative.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://www.php.net/manual/en/intro.ftp.php
      - >-
        https://github.com/FloeDesignTechnologies/phpcs-security-audit/blob/master/Security/Sniffs/BadFunctions/FringeFunctionsSniff.php
    tags:
      - php
  - id: echoed-request
    name: echoed-request
    description: >-
      `Echo`ing user input risks cross-site scripting vulnerability. You should use `htmlentities()` when showing data
      to users.
    category: security
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          `Echo`ing user input risks cross-site scripting vulnerability. You should use `htmlentities()` when showing
          data to users.
    cwe:
      - CWE-79
    owasp:
      - A07:2017
      - A03:2021
      - A05:2025
    references:
      - https://www.php.net/manual/en/function.htmlentities.php
      - https://www.php.net/manual/en/reserved.variables.request.php
      - https://www.php.net/manual/en/reserved.variables.post.php
      - https://www.php.net/manual/en/reserved.variables.get.php
      - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
    tags:
      - php
  - id: printed-request
    name: printed-request
    description: >-
      `Printing user input risks cross-site scripting vulnerability. You should use `htmlentities()` when showing data
      to users.
    category: security
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          `Printing user input risks cross-site scripting vulnerability. You should use `htmlentities()` when showing
          data to users.
    cwe:
      - CWE-79
    owasp:
      - A07:2017
      - A03:2021
      - A05:2025
    references:

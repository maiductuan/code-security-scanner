rules:
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: doctrine-dbal-dangerous-query
    name: doctrine-dbal-dangerous-query
    description: >-
      Detected string concatenation with a non-literal variable in a Doctrine DBAL query method. This could lead to SQL
      injection if the variable is user-controlled and not properly sanitized. In order to prevent SQL injection, use
      parameterized queries or prepared statements instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          Detected string concatenation with a non-literal variable in a Doctrine DBAL query method. This could lead to
          SQL injection if the variable is user-controlled and not properly sanitized. In order to prevent SQL
          injection, use parameterized queries or prepared statements instead.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://www.doctrine-project.org/projects/doctrine-dbal/en/current/reference/security.html
      - https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
    tags:
      - doctrine
  - id: doctrine-orm-dangerous-query
    name: doctrine-orm-dangerous-query
    description: >-
      `$QUERY` Detected string concatenation with a non-literal variable in a Doctrine QueryBuilder method. This could
      lead to SQL injection if the variable is user-controlled and not properly sanitized. In order to prevent SQL
      injection, use parameterized queries or prepared statements instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          `$QUERY` Detected string concatenation with a non-literal variable in a Doctrine QueryBuilder method. This
          could lead to SQL injection if the variable is user-controlled and not properly sanitized. In order to prevent
          SQL injection, use parameterized queries or prepared statements instead.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - >-
        https://www.doctrine-project.org/projects/doctrine-dbal/en/current/reference/query-builder.html#security-safely-preventing-sql-injection
      - https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
    tags:
      - doctrine
  - id: empty-with-boolean-expression
    name: empty-with-boolean-expression
    description: Calling `empty` on a boolean expression may be an indication that a parenthesis is misplaced.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - pattern: |
          empty($A && $B)
        message: Calling `empty` on a boolean expression may be an indication that a parenthesis is misplaced.
      - pattern: |
          empty($A || $B)
        message: Calling `empty` on a boolean expression may be an indication that a parenthesis is misplaced.
    cwe: []
    owasp: []
    references: []
    tags:
      - php
  - id: assert-use
    name: assert-use
    description: Calling assert with user input is equivalent to eval'ing.
    category: security
    severity: high

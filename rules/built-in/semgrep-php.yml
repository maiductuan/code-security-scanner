      - >-
        https://github.com/FloeDesignTechnologies/phpcs-security-audit/blob/master/Security/Sniffs/BadFunctions/AssertsSniff.php
    tags:
      - php
  - id: assert-use-audit
    name: assert-use-audit
    description: Calling assert with user input is equivalent to eval'ing.
    category: security
    severity: high
    confidence: medium
    languages:
      - php

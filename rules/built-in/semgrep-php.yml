  - id: openssl-decrypt-validate
    name: openssl-decrypt-validate
    description: >-
      The function `openssl_decrypt` returns either a string of the decrypted data on success or `false` on failure. If
      the failure case is not handled, this could lead to undefined behavior in your application. Please handle the case
      where `openssl_decrypt` returns `false`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - pattern: openssl_decrypt(...);
        message: >-
          The function `openssl_decrypt` returns either a string of the decrypted data on success or `false` on failure.
          If the failure case is not handled, this could lead to undefined behavior in your application. Please handle
          the case where `openssl_decrypt` returns `false`.
    cwe:
      - CWE-252
    owasp:
      - A02:2021
      - A04:2025
    references:
      - https://www.php.net/manual/en/function.openssl-decrypt.php
    tags:
      - php
      - openssl
  - id: sha224-hash
    name: sha224-hash
    description: >-
      This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
      updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - pattern: hash('sha224', ...);
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
      - pattern: hash('sha512/224', ...);
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
      - pattern: hash('sha3-224', ...);
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
      - pattern: hash_hmac('sha224', ...);
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
      - pattern: hash_hmac('sha512/224', ...);
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
      - pattern: hash_hmac('sha3-224', ...);
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
    cwe:
      - CWE-328
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-131Ar3.ipd.pdf
      - >-
        https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism/cyber-security-guidelines/guidelines-cryptography
    tags:
      - php
  - id: backticks-use
    name: backticks-use
    description: Backticks use may lead to command injection vulnerabilities.
    category: security
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - pattern: '`...`;'
        message: Backticks use may lead to command injection vulnerabilities.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:

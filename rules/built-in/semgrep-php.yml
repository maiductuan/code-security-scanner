      - https://www.php.net/manual/en/reserved.variables.post.php
      - https://www.php.net/manual/en/reserved.variables.get.php
      - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
    tags:
      - php
  - id: tainted-callable
    name: tainted-callable
    description: Callable based on user input risks remote code execution.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: Callable based on user input risks remote code execution.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://www.php.net/manual/en/language.types.callable.php
    tags:
      - php
  - id: tainted-exec
    name: tainted-exec
    description: User input is passed to a function that executes a shell command. This can lead to remote code execution.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: User input is passed to a function that executes a shell command. This can lead to remote code execution.
    cwe:
      - CWE-78
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
    tags:
      - php
  - id: tainted-filename
    name: tainted-filename
    description: File name based on user input risks server-side request forgery.
    category: file-ops
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: File name based on user input risks server-side request forgery.
    cwe:
      - CWE-918
    owasp:
      - A10:2021
      - A01:2025
    references:
      - https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29
    tags:
      - php
  - id: tainted-object-instantiation
    name: tainted-object-instantiation
    description: >-
      <- A new object is created where the class name is based on user input. This could lead to remote code execution,
      as it allows to instantiate any class in the application.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          <- A new object is created where the class name is based on user input. This could lead to remote code
          execution, as it allows to instantiate any class in the application.
    cwe:
      - CWE-470
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
    tags:
      - php
  - id: tainted-session
    name: tainted-session
    description: >-
      Session key based on user input risks session poisoning. The user can determine the key used for the session, and
      thus write any session variable. Session variables are typically trusted to be set only by the application, and
      manipulating the session can result in access control issues.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          Session key based on user input risks session poisoning. The user can determine the key used for the session,
          and thus write any session variable. Session variables are typically trusted to be set only by the
          application, and manipulating the session can result in access control issues.
    cwe:
      - CWE-284
    owasp:
      - A01:2021
      - A01:2025
    references:
      - https://en.wikipedia.org/wiki/Session_poisoning
    tags:
      - php
  - id: tainted-sql-string
    name: tainted-sql-string
    description: >-
      User data flows into this manually-constructed SQL string. User data can be safely inserted into SQL strings using
      prepared statements or an object-relational mapper (ORM). Manually-constructed SQL strings is a possible indicator
      of SQL injection, which could let an attacker steal or manipulate data from the database. Instead, use prepared
      statements (`$mysqli->prepare("INSERT INTO test(id, label) VALUES (?, ?)");`) or a safe library.
    category: injection
    severity: high
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          User data flows into this manually-constructed SQL string. User data can be safely inserted into SQL strings
          using prepared statements or an object-relational mapper (ORM). Manually-constructed SQL strings is a possible
          indicator of SQL injection, which could let an attacker steal or manipulate data from the database. Instead,
          use prepared statements (`$mysqli->prepare("INSERT INTO test(id, label) VALUES (?, ?)");`) or a safe library.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/www-community/attacks/SQL_Injection
    tags:
      - php
  - id: tainted-url-host
    name: tainted-url-host
    description: >-
      User data flows into the host portion of this manually-constructed URL. This could allow an attacker to send data
      to their own server, potentially exposing sensitive data such as cookies or authorization information sent with
      this request. They could also probe internal servers or other resources that the server running this code can
      access. (This is called server-side request forgery, or SSRF.) Do not allow arbitrary hosts. Instead, create an
      allowlist for approved hosts, or hardcode the correct host.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          User data flows into the host portion of this manually-constructed URL. This could allow an attacker to send
          data to their own server, potentially exposing sensitive data such as cookies or authorization information
          sent with this request. They could also probe internal servers or other resources that the server running this
          code can access. (This is called server-side request forgery, or SSRF.) Do not allow arbitrary hosts. Instead,
          create an allowlist for approved hosts, or hardcode the correct host.
    cwe:
      - CWE-918
    owasp:
      - A10:2021
      - A01:2025
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html
    tags:
      - php
  - id: trigger-error
    name: trigger-error
    description: >-
      The `$message` parameter to `trigger_error` is not HTML-encoded. If the error is displayed in a browser, this
      risks a cross-site scripting vulnerability. Escape the message with `htmlentities()` or disable `display_errors`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          The `$message` parameter to `trigger_error` is not HTML-encoded. If the error is displayed in a browser, this
          risks a cross-site scripting vulnerability. Escape the message with `htmlentities()` or disable
          `display_errors`.
    cwe:
      - CWE-79
    owasp:
      - A07:2017
      - A03:2021
    references:
      - https://www.php.net/trigger_error
      - https://bugs.php.net/bug.php?id=77074
      - https://www.php.net/manual/en/function.htmlentities.php
      - https://www.php.net/manual/en/reserved.variables.request.php
      - https://www.php.net/manual/en/reserved.variables.post.php
      - https://www.php.net/manual/en/reserved.variables.get.php
      - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
    tags:
      - php
  - id: ldap-bind-without-password
    name: ldap-bind-without-password
    description: >-
      Detected anonymous LDAP bind. This permits anonymous users to execute LDAP statements. Consider enforcing
      authentication for LDAP.
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - php
    patterns:
      - regex: .*
        message: >-
          Detected anonymous LDAP bind. This permits anonymous users to execute LDAP statements. Consider enforcing
          authentication for LDAP.
    cwe:
      - CWE-287
    owasp:
      - A02:2017
      - A07:2021
      - A07:2025
    references:
      - https://www.php.net/manual/en/function.ldap-bind.php
    tags:
      - php
  - id: mb-ereg-replace-eval
    name: mb-ereg-replace-eval
    description: >-
      Calling mb_ereg_replace with user input in the options can lead to arbitrary code execution. The eval modifier
      (`e`) evaluates the replacement argument as code.
    category: injection
    severity: high
    confidence: medium
    languages:
      - php
    patterns:

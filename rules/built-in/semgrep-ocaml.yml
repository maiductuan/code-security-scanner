  - id: broken-input-line
    name: broken-input-line
    description: >-
      'input_line' leaves a '\r' (CR) character when reading lines from a Windows text file, whose lines end in "\r\n"
      (CRLF). This is a problem for any Windows file that is being read either on a Unix-like platform or on Windows in
      binary mode. If the code already takes care of removing any trailing '\r' after reading the line, add a '(*
      nosemgrep *)' comment to disable this warning.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: |
          input_line
        message: >-
          'input_line' leaves a '\r' (CR) character when reading lines from a Windows text file, whose lines end in
          "\r\n" (CRLF). This is a problem for any Windows file that is being read either on a Unix-like platform or on
          Windows in binary mode. If the code already takes care of removing any trailing '\r' after reading the line,
          add a '(* nosemgrep *)' comment to disable this warning.
    cwe: []
    owasp: []
    references: []
    tags:
      - ocaml
  - id: prefer-read-in-binary-mode
    name: prefer-read-in-binary-mode
    description: >-
      'open_in' behaves differently on Windows and on Unix-like systems with respect to line endings. To get the same
      behavior everywhere, use 'open_in_bin' or 'open_in_gen [Open_binary]'. If you really want CRLF-to-LF translations
      to take place when running on Windows, use 'open_in_gen [Open_text]'.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: open_in
        message: >-
          'open_in' behaves differently on Windows and on Unix-like systems with respect to line endings. To get the
          same behavior everywhere, use 'open_in_bin' or 'open_in_gen [Open_binary]'. If you really want CRLF-to-LF
          translations to take place when running on Windows, use 'open_in_gen [Open_text]'.
    cwe: []
    owasp: []
    references: []
    tags:
      - ocaml
  - id: prefer-write-in-binary-mode
    name: prefer-write-in-binary-mode

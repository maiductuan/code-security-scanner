    name: ocamllint-marshal
    description: >-
      Marshaling is currently not type-safe and can lead to insecure behaviour when untrusted data is marshalled.
      Marshalling can lead to out-of-bound reads as well.
    category: security
    severity: medium
    confidence: medium
    languages:

  - id: ocamllint-hashtable-dos
    name: ocamllint-hashtable-dos
    description: >-
      Creating a Hashtbl without the optional random number parameter makes it prone to DoS attacks when attackers are
      able to fill the table with malicious content. Hashtbl.randomize or the R flag in the OCAMLRUNPARAM are other ways
      to randomize it.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: Hashtbl.create $Y
        message: >-
          Creating a Hashtbl without the optional random number parameter makes it prone to DoS attacks when attackers
          are able to fill the table with malicious content. Hashtbl.randomize or the R flag in the OCAMLRUNPARAM are
          other ways to randomize it.
    cwe:
      - CWE-399
    owasp: []
    references:
      - https://v2.ocaml.org/api/Hashtbl.html
    tags:
      - ocaml

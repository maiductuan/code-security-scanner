  - id: mutex-lock-exn
    name: mutex-lock-exn
    description: >-
      Raw `Mutex.lock`/`Mutex.unlock` is not exception-safe. If an exception is raised between lock and unlock, the
      mutex will never be released, causing a deadlock. Replace with `Mutex.protect $MUTEX (fun () -> ...)` which
      guarantees the mutex is released even when exceptions are raised.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: Mutex.lock $MUTEX
        message: >-
          Raw `Mutex.lock`/`Mutex.unlock` is not exception-safe. If an exception is raised between lock and unlock, the
          mutex will never be released, causing a deadlock. Replace with `Mutex.protect $MUTEX (fun () -> ...)` which
          guarantees the mutex is released even when exceptions are raised.
    cwe: []
    owasp: []
    references: []
    tags:
      - ocaml
  - id: ocamllint-ref-incr
    name: ocamllint-ref-incr
    description: You should use `incr`
    category: security
    severity: medium
    confidence: medium

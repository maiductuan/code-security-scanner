rules:
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: ocamllint-bool-true
    name: ocamllint-bool-true
    description: Comparison to boolean. Just use `$X`
    category: security
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: $X = true
        message: Comparison to boolean. Just use `$X`
      - pattern: $X == true
        message: Comparison to boolean. Just use `$X`
      - pattern: $X != false
        message: Comparison to boolean. Just use `$X`
    cwe: []
    owasp: []
    references: []
    tags:
      - ocaml
  - id: ocamllint-bool-false
    name: ocamllint-bool-false
    description: Comparison to boolean. Just use `not $X`
    category: security
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: $X = false
        message: Comparison to boolean. Just use `not $X`
      - pattern: $X == false
        message: Comparison to boolean. Just use `not $X`
      - pattern: $X <> true
        message: Comparison to boolean. Just use `not $X`
    cwe: []
    owasp: []
    references: []
    tags:
      - ocaml
  - id: bad-reraise
    name: bad-reraise
    description: >-
      You should not re-raise exceptions using 'raise' because it loses track of where the exception was raised
      originally, leading to a useless and possibly confusing stack trace. Instead, you should obtain a stack backtrace
      as soon as the exception is caught using 'try ... with exn -> let trace = Printexc.get_raw_backtrace () in ...',
      and keep it around until you re-raise the exception using 'Printexc.raise_with_backtrace exn trace'. You must
      collect the stack backtrace before calling another function which might internally raise and catch exceptions. To
      avoid false positives from Semgrep, write 'raise (Foo args)' instead of 'let e = Foo args in raise e'.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: |
          raise $EXN
        message: >-
          You should not re-raise exceptions using 'raise' because it loses track of where the exception was raised
          originally, leading to a useless and possibly confusing stack trace. Instead, you should obtain a stack
          backtrace as soon as the exception is caught using 'try ... with exn -> let trace = Printexc.get_raw_backtrace
          () in ...', and keep it around until you re-raise the exception using 'Printexc.raise_with_backtrace exn
          trace'. You must collect the stack backtrace before calling another function which might internally raise and
          catch exceptions. To avoid false positives from Semgrep, write 'raise (Foo args)' instead of 'let e = Foo args
          in raise e'.
    cwe: []
    owasp: []
    references:
      - https://v2.ocaml.org/api/Printexc.html
    tags:
      - ocaml
  - id: hashtbl-find-outside-try
    name: hashtbl-find-outside-try
    description: >-
      'Hashtbl.find' raises the 'Not_found' exception. Handle the exception or use 'Hashtbl.find_opt' instead. If you
      have proof that the key exists in the table, use 'assert false' as the exception handler to demonstrate awareness
      of the issue. If your code uses the syntax 'match Hashtbl.find ... with exception Not_found -> ...', it's fine and
      we apologize for not detecting it. Consider using 'Hashtbl.find_opt' to please Semgrep and stay safe.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - ocaml
    patterns:
      - pattern: |
          Hashtbl.find ...
        message: >-
          'Hashtbl.find' raises the 'Not_found' exception. Handle the exception or use 'Hashtbl.find_opt' instead. If
          you have proof that the key exists in the table, use 'assert false' as the exception handler to demonstrate
          awareness of the issue. If your code uses the syntax 'match Hashtbl.find ... with exception Not_found -> ...',
          it's fine and we apologize for not detecting it. Consider using 'Hashtbl.find_opt' to please Semgrep and stay
          safe.
    cwe: []
    owasp: []
    references: []
    tags:
      - ocaml
  - id: ocamllint-useless-else
    name: ocamllint-useless-else
    description: Useless else. Just remove the else branch;
    category: security
    severity: medium
    confidence: medium
    languages:

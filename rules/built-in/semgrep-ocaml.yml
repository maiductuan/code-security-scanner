        message: Digest uses MD5 and should not be used for security purposes. Consider using SHA256 instead.
      - pattern: Digest.bytes
        message: Digest uses MD5 and should not be used for security purposes. Consider using SHA256 instead.
      - pattern: Digest.substring
        message: Digest uses MD5 and should not be used for security purposes. Consider using SHA256 instead.

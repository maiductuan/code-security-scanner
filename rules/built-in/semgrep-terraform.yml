rules:
  - id: aws-elasticsearch-insecure-tls-version
    name: aws-elasticsearch-insecure-tls-version
    description: >-
      Detected an AWS Elasticsearch domain using an insecure version of TLS. To fix this, set "tls_security_policy"
      equal to "Policy-Min-TLS-1-2-2019-07".
    category: security
    severity: medium
    confidence: medium
    languages:
      - terraform
    patterns:
      - pattern: |
          resource "aws_elasticsearch_domain" $ANYTHING {
            ...
            domain_endpoint_options {
              ...
              enforce_https = true
              tls_security_policy = "Policy-Min-TLS-1-0-2019-07"
              ...
            }
            ...
          }
        message: >-
          Detected an AWS Elasticsearch domain using an insecure version of TLS. To fix this, set "tls_security_policy"
          equal to "Policy-Min-TLS-1-2-2019-07".
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - aws
      - terraform
  - id: aws-insecure-api-gateway-tls-version
    name: aws-insecure-api-gateway-tls-version
    description: >-
      Detected AWS API Gateway to be using an insecure version of TLS. To fix this issue make sure to set
      "security_policy" equal to "TLS_1_2".
    category: security
    severity: medium
    confidence: medium
    languages:
      - terraform
    patterns:
      - regex: .*
        message: >-
          Detected AWS API Gateway to be using an insecure version of TLS. To fix this issue make sure to set
          "security_policy" equal to "TLS_1_2".
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - aws
      - terraform
  - id: aws-opensearchserverless-encrypted-with-cmk
    name: aws-opensearchserverless-encrypted-with-cmk
    description: >-
      Ensure opensearch serverless is encrypted at rest using AWS KMS (Key Management Service) CMK (Customer Managed
      Keys). CMKs give you control over the encryption key in terms of access and rotation.
    category: security
    severity: medium
    confidence: medium
    languages:
      - terraform
    patterns:
      - regex: .*
        message: >-
          Ensure opensearch serverless is encrypted at rest using AWS KMS (Key Management Service) CMK (Customer Managed
          Keys). CMKs give you control over the encryption key in terms of access and rotation.
    cwe:
      - CWE-320
    owasp:
      - A2:2021
      - A5:2021
    references:
      - >-
        https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-encryption.html#serverless-encryption-policies
    tags:
      - terraform
      - aws
  - id: aws-provisioner-exec
    name: aws-provisioner-exec
    description: >-
      Provisioners are a tool of last resort and should be avoided where possible. Provisioner behavior cannot be mapped
      by Terraform as part of a plan, and execute arbitrary shell commands by design.
    category: security
    severity: medium
    confidence: medium
    languages:
      - terraform
    patterns:
      - regex: .*
        message: >-
          Provisioners are a tool of last resort and should be avoided where possible. Provisioner behavior cannot be
          mapped by Terraform as part of a plan, and execute arbitrary shell commands by design.
    cwe:
      - CWE-77
      - CWE-94
    owasp:
      - A03:2021
      - A01:2017
      - A05:2025
    references:
      - https://developer.hashicorp.com/terraform/language/resources/provisioners/remote-exec
      - https://developer.hashicorp.com/terraform/language/resources/provisioners/local-exec
    tags:
      - terraform
  - id: gcp-insecure-load-balancer-tls-version
    name: gcp-insecure-load-balancer-tls-version
    description: >-
      Detected GCP Load Balancer to be using an insecure version of TLS. To fix this set your "min_tls_version" to
      "TLS_1_2"
    category: security
    severity: medium
    confidence: medium
    languages:
      - terraform
    patterns:
      - pattern: |
          resource "google_compute_ssl_policy" $ANYTHING {
            ...
            min_tls_version = "..."
            ...
          }
        message: >-
          Detected GCP Load Balancer to be using an insecure version of TLS. To fix this set your "min_tls_version" to
          "TLS_1_2"
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://docs.bridgecrew.io/docs/google-cloud-policy-index
    tags:
      - gcp
      - terraform

          should have the same level of at rest protection. The AWS KMS encryption key protects database contents. To
          create your own, create a aws_kms_key resource or use the ARN string of a key in your account.
    cwe:
      - CWE-311
    owasp:
      - A03:2017
      - A04:2021
      - A06:2025
    references:
      - https://owasp.org/Top10/A04_2021-Insecure_Design
    tags:
      - terraform
      - aws

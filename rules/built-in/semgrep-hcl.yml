  - id: missing-autoscaling-group-tags
    name: missing-autoscaling-group-tags
    description: >-
      There are missing tags for an AWS Auto Scaling group. Tags help track costs, allow for filtering for Auto Scaling
      groups, help with access control, and aid in organizing AWS resources. Add: `tag {
        key = "key"
        value = "value"
        propagate_at_launch = boolean
      }` See https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/autoscaling_group for more
      details.
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - regex: .*
        message: >-
          There are missing tags for an AWS Auto Scaling group. Tags help track costs, allow for filtering for Auto
          Scaling groups, help with access control, and aid in organizing AWS resources. Add: `tag {
            key = "key"
            value = "value"
            propagate_at_launch = boolean
          }` See https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/autoscaling_group for more
          details.
    cwe: []
    owasp: []
    references: []
    tags:
      - aws
      - terraform

  - id: lambda-permission-logs-missing-arn-asterisk
    name: lambda-permission-logs-missing-arn-asterisk
    description: >-
      The `source_arn` field needs to end with an asterisk, like this: `<log-group-arn>:*` Without this, the
      `aws_lambda_permission` resource '$NAME' will not be created. Add the asterisk to the end of the arn. x $ARN
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - pattern: |
          source_arn = $ARN
        message: >-
          The `source_arn` field needs to end with an asterisk, like this: `<log-group-arn>:*` Without this, the
          `aws_lambda_permission` resource '$NAME' will not be created. Add the asterisk to the end of the arn. x $ARN
    cwe: []
    owasp: []
    references:
      - https://github.com/hashicorp/terraform-provider-aws/issues/14630
    tags:
      - aws
      - terraform
      - aws-lambda
  - id: lambda-redundant-field-with-image
    name: lambda-redundant-field-with-image
    description: >-
      When using the AWS Lambda "Image" package_type, `runtime` and `handler` are not necessary for Lambda to understand
      how to run the code. These are built into the container image. Including `runtime` or `handler` with an "Image"
      `package_type` will result in an error on `terraform apply`. Remove these redundant fields.
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - regex: .*
        message: >-
          When using the AWS Lambda "Image" package_type, `runtime` and `handler` are not necessary for Lambda to
          understand how to run the code. These are built into the container image. Including `runtime` or `handler`
          with an "Image" `package_type` will result in an error on `terraform apply`. Remove these redundant fields.
    cwe: []
    owasp: []
    references:
      - >-
        https://stackoverflow.com/questions/72771366/why-do-i-get-error-handler-and-runtime-must-be-set-when-packagetype-is-zip-whe
    tags:
      - aws
      - terraform
      - aws-lambda
  - id: reserved-aws-lambda-environment-variable
    name: reserved-aws-lambda-environment-variable
    description: >-
      `terraform apply` will fail because the environment variable "$VARIABLE" is a reserved by AWS. Use another name
      for "$VARIABLE".
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - pattern: |
          $VARIABLE = ...
        message: >-
          `terraform apply` will fail because the environment variable "$VARIABLE" is a reserved by AWS. Use another
          name for "$VARIABLE".
    cwe: []
    owasp: []
    references:
      - https://docs.aws.amazon.com/lambda/latest/dg/configuration-envvars.html#configuration-envvars-runtime
    tags:
      - aws
      - aws-lambda
      - terraform
  - id: subscription-filter-missing-depends
    name: subscription-filter-missing-depends
    description: >-
      The `aws_cloudwatch_log_subscription_filter` resource "$NAME" needs a `depends_on` clause on the
      `aws_lambda_permission`, otherwise Terraform may try to create these out-of-order and fail.
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - pattern: |
          resource "aws_cloudwatch_log_subscription_filter" $NAME {
            ...
            destination_arn = aws_lambda_function.$LAMBDA_NAME.arn
          }
        message: >-
          The `aws_cloudwatch_log_subscription_filter` resource "$NAME" needs a `depends_on` clause on the
          `aws_lambda_permission`, otherwise Terraform may try to create these out-of-order and fail.
    cwe: []
    owasp: []
    references:
      - >-
        https://stackoverflow.com/questions/38407660/terraform-configuring-cloudwatch-log-subscription-delivery-to-lambda/38428834#38428834
    tags:
      - aws
      - terraform
      - aws-lambda
      - cloudwatch
  - id: aws-athena-client-can-disable-workgroup-encryption
    name: aws-athena-client-can-disable-workgroup-encryption
    description: >-
      The Athena workgroup configuration can be overriden by client-side settings. The client can make changes to
      disable encryption settings. Enforce the configuration to prevent client overrides.
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - pattern: |
          resource "aws_athena_workgroup" $ANYTHING {
            ...
            configuration {
              ...
              enforce_workgroup_configuration = false
              ...
              result_configuration {
                ...
                encryption_configuration {
                  ...
                }
                ...
              }
              ...
            }
            ...
          }
        message: >-
          The Athena workgroup configuration can be overriden by client-side settings. The client can make changes to
          disable encryption settings. Enforce the configuration to prevent client overrides.
    cwe:
      - CWE-311
    owasp:
      - A03:2017
      - A04:2021
      - A06:2025
    references:
      - https://owasp.org/Top10/A04_2021-Insecure_Design
    tags:
      - terraform
      - aws
  - id: aws-athena-database-unencrypted
    name: aws-athena-database-unencrypted
    description: >-
      The Athena database is unencrypted at rest. These databases are generally derived from data in S3 buckets and
      should have the same level of at rest protection. The AWS KMS encryption key protects database contents. To create
      your own, create a aws_kms_key resource or use the ARN string of a key in your account.
    category: security
    severity: medium
    confidence: medium
    languages:

  - id: aws-codebuild-artifacts-unencrypted
    name: aws-codebuild-artifacts-unencrypted
    description: >-
      The CodeBuild project artifacts are unencrypted. All artifacts produced by your CodeBuild project pipeline should
      be encrypted to prevent them from being read if compromised.
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - pattern: |
          $ARTIFACTS {
            ...
            type = "$TYPE"
            encryption_disabled = true
            ...
          }
        message: >-
          The CodeBuild project artifacts are unencrypted. All artifacts produced by your CodeBuild project pipeline
          should be encrypted to prevent them from being read if compromised.
    cwe:
      - CWE-311
    owasp:
      - A03:2017
      - A04:2021
      - A06:2025
    references:
      - https://owasp.org/Top10/A04_2021-Insecure_Design
      - >-
        https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/codebuild_project#encryption_disabled
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-codebuild-project-artifacts.html
      - https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-codebuild-project.html
    tags:
      - terraform
      - aws
  - id: aws-codebuild-project-artifacts-unencrypted
    name: aws-codebuild-project-artifacts-unencrypted
    description: >-
      The AWS CodeBuild Project Artifacts are unencrypted. The AWS KMS encryption key protects artifacts in the
      CodeBuild Projects. To create your own, create a aws_kms_key resource or use the ARN string of a key in your
      account.
    category: security
    severity: medium

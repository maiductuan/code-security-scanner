    name: aws-elasticache-automatic-backup-not-enabled
    description: >-
      Ensure that Amazon ElastiCache clusters have automatic backup turned on. To fix this, set a
      `snapshot_retention_limit`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:

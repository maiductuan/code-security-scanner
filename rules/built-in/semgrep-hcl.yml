        message: >-
          By default, AWS CloudWatch Log Group is encrypted using AWS-managed keys. However, for added security, it's
          recommended to configure your own AWS KMS encryption key to protect your log group in CloudWatch. You can
          either create a new aws_kms_key resource or use the ARN of an existing key in your AWS account to do so.

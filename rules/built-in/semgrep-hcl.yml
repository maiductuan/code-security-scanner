  - id: aws-insecure-cloudfront-distribution-tls-version
    name: aws-insecure-cloudfront-distribution-tls-version
    description: >-
      Detected an AWS CloudFront Distribution with an insecure TLS version. TLS versions less than 1.2 are considered
      insecure because they can be broken. To fix this, set your `minimum_protocol_version` to `"TLSv1.2_2018",
      "TLSv1.2_2019", "TLSv1.2_2021", "TLSv1.2_2025" or "TLSv1.3_2025"`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - hcl
    patterns:
      - pattern: |
          resource "aws_cloudfront_distribution" $ANYTHING {
            ...
            viewer_certificate {
              ...
            }
            ...
          }
        message: >-
          Detected an AWS CloudFront Distribution with an insecure TLS version. TLS versions less than 1.2 are
          considered insecure because they can be broken. To fix this, set your `minimum_protocol_version` to
          `"TLSv1.2_2018", "TLSv1.2_2019", "TLSv1.2_2021", "TLSv1.2_2025" or "TLSv1.3_2025"`.
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - terraform
      - aws

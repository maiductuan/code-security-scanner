  - id: default-mutable-dict
    name: default-mutable-dict
    description: >-
      Function $F mutates default dict $D. Python only instantiates default function arguments once and shares the
      instance across the function calls. If the default function argument is mutated, that will modify the instance
      used by all future function calls. This can cause unexpected results, or lead to security vulnerabilities whereby
      one function consumer can view or modify the data of another function consumer. Instead, use a default argument
      (like None) to indicate that no argument was provided and instantiate a new dictionary at that time. For example:
      `if $D is None: $D = {}`.
    category: security
    severity: high
    confidence: medium
    languages:

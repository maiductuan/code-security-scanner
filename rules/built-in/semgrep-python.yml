          `yaml.UnsafeLoader` are all known to be unsafe methods of deserializing YAML. An attacker with control over
          the YAML input could create special YAML input that allows the attacker to run arbitrary Python code. This
          would allow the attacker to steal files, download and install malware, or otherwise take over the machine. Use
          `yaml.safe_load` or `yaml.SafeLoader` instead.
    cwe:

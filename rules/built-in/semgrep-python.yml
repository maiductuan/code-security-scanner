  - id: mistral-missing-moderation
    name: mistral-missing-moderation
    description: >-
      Mistral chat completion used without content moderation. Consider using the Moderation API
      (client.classifiers.moderate() or client.classifiers.moderate_chat()) to check content for harmful material. See
      https://docs.mistral.ai/capabilities/guardrailing/
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $CLIENT.chat.complete(...)
        message: >-

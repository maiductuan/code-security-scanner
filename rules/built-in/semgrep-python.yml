    description: Cohere API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: cohere.Client(api_key="$KEY", ...)
        message: Cohere API key is hardcoded in source code. Use environment variables or a secrets manager instead.
      - pattern: cohere.ClientV2(api_key="$KEY", ...)

  - id: avoid-query-set-extra
    name: avoid-query-set-extra
    description: >-
      QuerySet.extra' does not provide safeguards against SQL injection and requires very careful use. SQL injection can
      lead to critical data being stolen by attackers. Instead of using '.extra', use the Django ORM and parameterized
      queries such as `People.objects.get(name='Bob')`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $MODEL.extra(...)
        message: >-
          QuerySet.extra' does not provide safeguards against SQL injection and requires very careful use. SQL injection
          can lead to critical data being stolen by attackers. Instead of using '.extra', use the Django ORM and
          parameterized queries such as `People.objects.get(name='Bob')`.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://docs.djangoproject.com/en/3.0/ref/models/querysets/#django.db.models.query.QuerySet.extra
      - https://semgrep.dev/blog/2020/preventing-sql-injection-a-django-authors-perspective/
    tags:
      - django
  - id: avoid-raw-sql
    name: avoid-raw-sql
    description: >-
      Detected the use of 'RawSQL' or 'raw' indicating the execution of a non-parameterized SQL query. This could lead
      to a SQL injection and therefore protected information could be leaked. Instead, use Django ORM and parameterized
      queries before raw SQL. An example of using the Django ORM is: `People.objects.get(name='Bob')`
    category: injection
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          Detected the use of 'RawSQL' or 'raw' indicating the execution of a non-parameterized SQL query. This could
          lead to a SQL injection and therefore protected information could be leaked. Instead, use Django ORM and
          parameterized queries before raw SQL. An example of using the Django ORM is: `People.objects.get(name='Bob')`
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://docs.djangoproject.com/en/3.0/ref/models/expressions/#raw-sql-expressions
      - https://semgrep.dev/blog/2020/preventing-sql-injection-a-django-authors-perspective/
    tags:
      - django
  - id: django-secure-set-cookie
    name: django-secure-set-cookie
    description: >-
      Django cookies should be handled securely by setting secure=True, httponly=True, and samesite='Lax' in
      response.set_cookie(...). If your situation calls for different settings, explicitly disable the setting. If you
      want to send the cookie over http, set secure=False. If you want to let client-side JavaScript read the cookie,
      set httponly=False. If you want to attach cookies to requests for external sites, set samesite=None.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: response.set_cookie(...)
        message: >-
          Django cookies should be handled securely by setting secure=True, httponly=True, and samesite='Lax' in
          response.set_cookie(...). If your situation calls for different settings, explicitly disable the setting. If
          you want to send the cookie over http, set secure=False. If you want to let client-side JavaScript read the
          cookie, set httponly=False. If you want to attach cookies to requests for external sites, set samesite=None.
    cwe:
      - CWE-614
    owasp:
      - A05:2021
      - A02:2025
    references:
      - https://docs.djangoproject.com/en/3.0/ref/request-response/#django.http.HttpResponse.set_cookie
      - https://semgrep.dev/blog/2020/bento-check-keeping-cookies-safe-in-flask/
      - https://bento.dev/checks/flask/secure-set-cookie/
    tags:
      - django

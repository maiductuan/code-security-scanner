  - id: gemini-missing-system-instruction-python
    name: gemini-missing-system-instruction-python
    description: >-
      Gemini GenerativeModel created without 'system_instruction' parameter. A system instruction helps establish
      behavioral guidelines and safety boundaries for the model. See
      https://ai.google.dev/gemini-api/docs/safety-guidance
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: genai.GenerativeModel(...)
        message: >-
          Gemini GenerativeModel created without 'system_instruction' parameter. A system instruction helps establish

  - id: sqlalchemy-execute-raw-query
    name: sqlalchemy-execute-raw-query
    description: >-
      Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL Injection. In
      order to execute raw query safely, prepared statement should be used. SQLAlchemy provides TextualSQL to easily
      used prepared statement with named parameters. For complex SQL composition, use SQL Expression Language or Schema
      Definition Language. In most cases, SQLAlchemy ORM will be a better option.
    category: injection
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: |
          $CONNECTION.execute( $SQL + ..., ... )
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. In order to execute raw query safely, prepared statement should be used. SQLAlchemy provides
          TextualSQL to easily used prepared statement with named parameters. For complex SQL composition, use SQL
          Expression Language or Schema Definition Language. In most cases, SQLAlchemy ORM will be a better option.
      - pattern: |
          $CONNECTION.execute( $SQL % (...), ...)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. In order to execute raw query safely, prepared statement should be used. SQLAlchemy provides
          TextualSQL to easily used prepared statement with named parameters. For complex SQL composition, use SQL
          Expression Language or Schema Definition Language. In most cases, SQLAlchemy ORM will be a better option.
      - pattern: |
          $CONNECTION.execute( $SQL.format(...), ... )
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. In order to execute raw query safely, prepared statement should be used. SQLAlchemy provides
          TextualSQL to easily used prepared statement with named parameters. For complex SQL composition, use SQL
          Expression Language or Schema Definition Language. In most cases, SQLAlchemy ORM will be a better option.
      - pattern: |
          $CONNECTION.execute(f"...{...}...", ...)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. In order to execute raw query safely, prepared statement should be used. SQLAlchemy provides
          TextualSQL to easily used prepared statement with named parameters. For complex SQL composition, use SQL
          Expression Language or Schema Definition Language. In most cases, SQLAlchemy ORM will be a better option.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://docs.sqlalchemy.org/en/14/core/tutorial.html#using-textual-sql
      - https://www.tutorialspoint.com/sqlalchemy/sqlalchemy_quick_guide.htm
      - >-
        https://docs.sqlalchemy.org/en/14/core/tutorial.html#using-more-specific-text-with-table-expression-literal-column-and-expression-column

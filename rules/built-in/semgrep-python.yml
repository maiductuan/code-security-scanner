  - id: sql-injection-using-extra-where
    name: sql-injection-using-extra-where
    description: >-
      User-controlled data from a request is passed to 'extra()'. This could lead to a SQL injection and therefore
      protected information could be leaked. Instead, use parameterized queries or escape the user-controlled data by
      using `params` and not using quote placeholders in the SQL string.
    category: injection
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          User-controlled data from a request is passed to 'extra()'. This could lead to a SQL injection and therefore
          protected information could be leaked. Instead, use parameterized queries or escape the user-controlled data
          by using `params` and not using quote placeholders in the SQL string.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://docs.djangoproject.com/en/3.0/ref/models/expressions/#.objects.extra
    tags:
      - django

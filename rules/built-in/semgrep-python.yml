          used by all future function calls. This can cause unexpected results, or lead to security vulnerabilities
          whereby one function consumer can view or modify the data of another function consumer. Instead, use a default
          argument (like None) to indicate that no argument was provided and instantiate a new dictionary at that time.
          For example: `if $D is None: $D = {}`.
    cwe: []

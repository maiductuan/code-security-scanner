  - id: use-timeout
    name: use-timeout
    description: >-
      Detected a 'requests' call without a timeout set. By default, 'requests' calls wait until the connection is
      closed. This means a 'requests' call without a timeout will hang the program if a response is never received.
      Consider setting a timeout for all 'requests'.
    category: security
    severity: medium
    confidence: medium
    languages:

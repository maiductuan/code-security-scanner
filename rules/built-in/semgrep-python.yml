  - id: no-auth-over-http
    name: no-auth-over-http
    description: >-
      Authentication detected over HTTP. HTTP does not provide any encryption or protection for these authentication
      credentials. This may expose these credentials to unauthorized parties. Use 'https://' instead.
    category: auth
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: requests.$W("=~/http:\/\/.*/", ..., auth=$X, ...)
        message: >-
          Authentication detected over HTTP. HTTP does not provide any encryption or protection for these authentication
          credentials. This may expose these credentials to unauthorized parties. Use 'https://' instead.
      - pattern: |
          $URL = "=~/http:\/\/.../"
          ...
          requests.$W($URL, ..., auth=$X, ...)
        message: >-
          Authentication detected over HTTP. HTTP does not provide any encryption or protection for these authentication
          credentials. This may expose these credentials to unauthorized parties. Use 'https://' instead.
    cwe:

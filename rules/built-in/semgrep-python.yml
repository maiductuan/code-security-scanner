      Avoid using null on string-based fields such as CharField and TextField. If a string-based field has null=True,
      that means it has two possible values for "no data": NULL, and the empty string. In most cases, it's redundant to
      have two possible values for "no data;" the Django convention is to use the empty string, not NULL.
    category: security
    severity: medium

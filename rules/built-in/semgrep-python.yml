  - id: locals-as-template-context
    name: locals-as-template-context
    description: >-
      Using 'locals()' as a context to 'render(...)' is extremely dangerous. This exposes Python functions to the
      template that were not meant to be exposed. An attacker could use these functions to execute code that was not
      intended to run and could compromise the application. (This is server-side template injection (SSTI)). Do not use
      'locals()'. Instead, specify each variable in a dictionary or 'django.template.Context' object, like '{"var1":
      "hello"}' and use that instead.
    category: security
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: django.shortcuts.render(..., locals(...), ...)
        message: >-
          Using 'locals()' as a context to 'render(...)' is extremely dangerous. This exposes Python functions to the
          template that were not meant to be exposed. An attacker could use these functions to execute code that was not
          intended to run and could compromise the application. (This is server-side template injection (SSTI)). Do not
          use 'locals()'. Instead, specify each variable in a dictionary or 'django.template.Context' object, like
          '{"var1": "hello"}' and use that instead.
      - pattern: django.template.Template.render(..., locals(...), ...)
        message: >-
          Using 'locals()' as a context to 'render(...)' is extremely dangerous. This exposes Python functions to the
          template that were not meant to be exposed. An attacker could use these functions to execute code that was not
          intended to run and could compromise the application. (This is server-side template injection (SSTI)). Do not
          use 'locals()'. Instead, specify each variable in a dictionary or 'django.template.Context' object, like
          '{"var1": "hello"}' and use that instead.
    cwe:
      - CWE-96
    owasp:
      - A03:2021
      - A05:2025
    references:

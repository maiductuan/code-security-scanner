    tags:
      - requests
  - id: string-concat
    name: string-concat
    description: >-
      Detected string concatenation or formatting in a call to a command via 'sh'. This could be a command injection
      vulnerability if the data is user-controlled. Instead, use a list and append the argument.
    category: security
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: sh.$BIN($X + $Y)
        message: >-
          Detected string concatenation or formatting in a call to a command via 'sh'. This could be a command injection
          vulnerability if the data is user-controlled. Instead, use a list and append the argument.
      - pattern: sh.$BIN($X.format(...))
        message: >-
          Detected string concatenation or formatting in a call to a command via 'sh'. This could be a command injection
          vulnerability if the data is user-controlled. Instead, use a list and append the argument.
      - pattern: sh.$BIN(f"...{...}...")
        message: >-
          Detected string concatenation or formatting in a call to a command via 'sh'. This could be a command injection
          vulnerability if the data is user-controlled. Instead, use a list and append the argument.
    cwe:
      - CWE-78
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
    tags:
      - sh
  - id: bad-operator-in-filter
    name: bad-operator-in-filter
    description: >-
      Only comparison operators should be used inside SQLAlchemy filter expressions. Use `==` instead of `is`, `!=`
      instead of `is not`, `sqlalchemy.and_` instead of `and`, `sqlalchemy.or_` instead of `or`, `sqlalchemy.not_`
      instead of `not`, and `sqlalchemy.in_` instead of `in_`.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          Only comparison operators should be used inside SQLAlchemy filter expressions. Use `==` instead of `is`, `!=`
          instead of `is not`, `sqlalchemy.and_` instead of `and`, `sqlalchemy.or_` instead of `or`, `sqlalchemy.not_`
          instead of `not`, and `sqlalchemy.in_` instead of `in_`.
    cwe: []
    owasp: []
    references:
      - https://docs.sqlalchemy.org/en/13/orm/tutorial.html#common-filter-operators
    tags:
      - sqlalchemy
  - id: delete-where-no-execute

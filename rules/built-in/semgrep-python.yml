  - id: langchain-dangerous-exec-python
    name: langchain-dangerous-exec-python
    description: >-
      Dangerous LangChain execution utility detected. PythonREPL, BashProcess, PythonAstREPLTool, and LLMMathChain allow
      arbitrary code execution and should not be used in production. If an LLM agent can invoke these tools, prompt
      injection can lead to remote code execution.
    category: security
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          Dangerous LangChain execution utility detected. PythonREPL, BashProcess, PythonAstREPLTool, and LLMMathChain
          allow arbitrary code execution and should not be used in production. If an LLM agent can invoke these tools,
          prompt injection can lead to remote code execution.
    cwe:
      - CWE-94
    owasp: []
    references:
      - https://blog.trailofbits.com/2025/10/22/prompt-injection-to-rce-in-ai-agents/
    tags:
      - langchain
  - id: llm-api-key-in-source-python
    name: llm-api-key-in-source-python
    description: >-
      AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI, Anthropic,
      Google, Hugging Face). Use environment variables or a secrets manager instead.
    category: injection
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $VAR = "$KEY"
        message: >-
          AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI,
          Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
    tags:
      - openai
      - anthropic
      - google
      - huggingface
  - id: llm-output-to-exec-python
    name: llm-output-to-exec-python
    description: >-
      LLM API response data flows into a dangerous code execution function (eval, exec, subprocess, os.system). This
      enables code injection attacks where a compromised or manipulated LLM response can execute arbitrary code on the
      host system. Validate and sandbox LLM outputs before execution.
    category: security
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          LLM API response data flows into a dangerous code execution function (eval, exec, subprocess, os.system). This
          enables code injection attacks where a compromised or manipulated LLM response can execute arbitrary code on
          the host system. Validate and sandbox LLM outputs before execution.
    cwe:
      - CWE-94
    owasp: []
    references:
      - https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/
    tags:
      - openai
      - anthropic
      - gemini
  - id: mcp-command-injection-python
    name: mcp-command-injection-python
    description: >-
      User input from an MCP tool handler flows into a command execution sink without sanitization. An attacker could
      inject arbitrary OS commands via tool arguments. Use subprocess with a list of arguments (shell=False) or sanitize
      input with shlex.quote() before passing to shell commands.
    category: injection
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          User input from an MCP tool handler flows into a command execution sink without sanitization. An attacker
          could inject arbitrary OS commands via tool arguments. Use subprocess with a list of arguments (shell=False)
          or sanitize input with shlex.quote() before passing to shell commands.
    cwe:
      - CWE-78
    owasp: []
    references:
      - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    tags:
      - mcp
  - id: mcp-credential-in-response-python
    name: mcp-credential-in-response-python
    description: >-
      MCP tool returns a dictionary containing credential-like keys such as api_key, password, secret, or token.
      Exposing credentials in tool responses risks leaking them to the LLM context or logs. Remove sensitive fields
      before returning data from MCP tools.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          MCP tool returns a dictionary containing credential-like keys such as api_key, password, secret, or token.
          Exposing credentials in tool responses risks leaking them to the LLM context or logs. Remove sensitive fields
          before returning data from MCP tools.
    cwe:
      - CWE-522
    owasp: []
    references:
      - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    tags:
      - mcp
  - id: mcp-ssrf-python
    name: mcp-ssrf-python
    description: >-
      User input from an MCP tool handler flows into an HTTP request URL without validation. An attacker could supply
      internal network URLs to access internal services (SSRF). Validate and restrict URLs with an allowlist or parse
      with urllib.parse.urlparse() before making requests.
    category: api-security
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          User input from an MCP tool handler flows into an HTTP request URL without validation. An attacker could
          supply internal network URLs to access internal services (SSRF). Validate and restrict URLs with an allowlist
          or parse with urllib.parse.urlparse() before making requests.
    cwe:
      - CWE-918
    owasp: []
    references:
      - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    tags:
      - mcp
  - id: mcp-unsanitized-return-python
    name: mcp-unsanitized-return-python
    description: >-
      External HTTP response data flows directly into an MCP tool return value without sanitization. Untrusted API
      responses may contain prompt injection payloads or malicious content that could manipulate the LLM. Sanitize or
      validate external data before returning it from MCP tools.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          External HTTP response data flows directly into an MCP tool return value without sanitization. Untrusted API
          responses may contain prompt injection payloads or malicious content that could manipulate the LLM. Sanitize
          or validate external data before returning it from MCP tools.
    cwe:
      - CWE-116
    owasp: []
    references:
      - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    tags:
      - mcp
  - id: mistral-hardcoded-api-key-python

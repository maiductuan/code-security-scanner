rules:
  - id: agent-unbounded-loop-python
    name: agent-unbounded-loop-python
    description: >-
      LLM API call inside a `while True` loop without a break condition. This creates an unbounded agent loop that may
      run indefinitely, consuming API credits and resources. Add a break condition, iteration counter, or timeout to
      prevent runaway execution.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          LLM API call inside a `while True` loop without a break condition. This creates an unbounded agent loop that
          may run indefinitely, consuming API credits and resources. Add a break condition, iteration counter, or
          timeout to prevent runaway execution.
    cwe:
      - CWE-835
    owasp: []
    references:
      - https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/
    tags:
      - openai
      - anthropic
      - gemini
  - id: anthropic-hardcoded-api-key-python
    name: anthropic-hardcoded-api-key-python
    description: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/initial-setup
    tags:
      - anthropic
  - id: anthropic-missing-max-tokens-python
    name: anthropic-missing-max-tokens-python
    description: >-
      Anthropic messages.create() called without 'max_tokens' parameter. Setting max_tokens prevents unexpectedly long
      or expensive responses.
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $CLIENT.messages.create(...)
        message: >-
          Anthropic messages.create() called without 'max_tokens' parameter. Setting max_tokens prevents unexpectedly
          long or expensive responses.
    cwe:
      - CWE-770
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-missing-metadata-user-id-python
    name: anthropic-missing-metadata-user-id-python
    description: >-
      Anthropic messages.create() called without 'metadata' parameter. Pass a metadata object with a hashed user_id to
      enable abuse tracking and policy enforcement. See https://docs.anthropic.com/en/api/messages
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $CLIENT.messages.create(...)
        message: >-
          Anthropic messages.create() called without 'metadata' parameter. Pass a metadata object with a hashed user_id
          to enable abuse tracking and policy enforcement. See https://docs.anthropic.com/en/api/messages
    cwe:
      - CWE-778
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-missing-refusal-check-python
    name: anthropic-missing-refusal-check-python
    description: >-
      Anthropic response content accessed without checking stop_reason. Check response.stop_reason to handle cases where
      the model stops unexpectedly (e.g., due to max_tokens or content filtering).
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $RESP.content
        message: >-
          Anthropic response content accessed without checking stop_reason. Check response.stop_reason to handle cases
          where the model stops unexpectedly (e.g., due to max_tokens or content filtering).
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-missing-system-prompt-python
    name: anthropic-missing-system-prompt-python
    description: >-
      Anthropic messages.create() called without a 'system' parameter. A system prompt helps set behavioral guidelines
      and safety boundaries for the model.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $CLIENT.messages.create(...)
        message: >-
          Anthropic messages.create() called without a 'system' parameter. A system prompt helps set behavioral
          guidelines and safety boundaries for the model.
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-no-error-handling
    name: anthropic-no-error-handling
    description: >-
      Anthropic API call without error handling. Wrap API calls in try/except to handle rate limits, API errors, and
      network issues gracefully.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: $CLIENT.messages.create(...)
        message: >-
          Anthropic API call without error handling. Wrap API calls in try/except to handle rate limits, API errors, and
          network issues gracefully.
    cwe:
      - CWE-754
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-user-input-in-system-prompt-python
    name: anthropic-user-input-in-system-prompt-python
    description: >-
      User input flows into the Anthropic system prompt. This enables prompt injection attacks where users can override
      system instructions. Validate and sanitize user input, or keep system prompts hardcoded.
    category: security
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          User input flows into the Anthropic system prompt. This enables prompt injection attacks where users can
          override system instructions. Validate and sanitize user input, or keep system prompts hardcoded.
    cwe:
      - CWE-77
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/initial-setup
    tags:
      - anthropic

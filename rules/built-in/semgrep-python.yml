  - id: hooks-no-input-validation-python
    name: hooks-no-input-validation-python
    description: >-
      Claude Code and Cursor hook reads stdin without input validation. Wrap json.loads/json.load calls in try/except to
      handle malformed or unexpected input gracefully.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          Claude Code and Cursor hook reads stdin without input validation. Wrap json.loads/json.load calls in
          try/except to handle malformed or unexpected input gracefully.
    cwe:
      - CWE-1287
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor
  - id: hooks-path-traversal-python
    name: hooks-path-traversal-python
    description: >-
      Hook input flows into a file path without validation. Claude Code and Cursor hooks receive JSON input that may
      contain user-controlled paths. An attacker could craft input with path traversal sequences (e.g.,
      '../../etc/passwd') to read, modify, or delete arbitrary files. Use os.path.realpath() or os.path.abspath() to
      resolve and validate paths before file operations.
    category: file-ops
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          Hook input flows into a file path without validation. Claude Code and Cursor hooks receive JSON input that may
          contain user-controlled paths. An attacker could craft input with path traversal sequences (e.g.,
          '../../etc/passwd') to read, modify, or delete arbitrary files. Use os.path.realpath() or os.path.abspath() to
          resolve and validate paths before file operations.
    cwe:
      - CWE-22
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor
  - id: hooks-sensitive-file-access-python
    name: hooks-sensitive-file-access-python
    description: >-
      Hook input flows into a file operation without checking for sensitive files. Claude Code and Cursor hooks receive
      JSON input that may reference sensitive files such as ~/.ssh/*, ~/.aws/credentials, or .env files. Filter or block
      access to sensitive paths using a validation function like check_sensitive() or is_sensitive() before performing
      file operations.
    category: file-ops
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          Hook input flows into a file operation without checking for sensitive files. Claude Code and Cursor hooks
          receive JSON input that may reference sensitive files such as ~/.ssh/*, ~/.aws/credentials, or .env files.
          Filter or block access to sensitive paths using a validation function like check_sensitive() or is_sensitive()
          before performing file operations.
    cwe:
      - CWE-538
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor

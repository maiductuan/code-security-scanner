  - id: socket-shutdown-close
    name: socket-shutdown-close
    description: >-
      Socket is not closed if shutdown fails. When socket.shutdown fails on an OSError, socket.close is not called and
      the code fails to clean up the socket and allow garbage collection to release the memory used for it. The OSError
      on shutdown can occur when the remote side of the connection closes the connection first.
    category: security
    severity: medium
    confidence: medium
    languages:
      - python
    patterns:
      - pattern: |
          $SOCK.shutdown(socket.$A)
          $SOCK.close()
        message: >-
          Socket is not closed if shutdown fails. When socket.shutdown fails on an OSError, socket.close is not called
          and the code fails to clean up the socket and allow garbage collection to release the memory used for it. The
          OSError on shutdown can occur when the remote side of the connection closes the connection first.
    cwe: []
    owasp: []
    references:
      - https://www.paulsprogrammingnotes.com/2021/12/python-memory-leaks.html
    tags:
      - python

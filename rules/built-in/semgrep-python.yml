  - id: avoid-sqlalchemy-text
    name: avoid-sqlalchemy-text
    description: >-
      sqlalchemy.text passes the constructed SQL statement to the database mostly unchanged. This means that the usual
      SQL injection protections are not applied and this function is vulnerable to SQL injection if user input can reach
      here. Use normal SQLAlchemy operators (such as `or_()`, `and_()`, etc.) to construct SQL.
    category: injection
    severity: high
    confidence: medium
    languages:
      - python
    patterns:
      - regex: .*
        message: >-
          sqlalchemy.text passes the constructed SQL statement to the database mostly unchanged. This means that the
          usual SQL injection protections are not applied and this function is vulnerable to SQL injection if user input
          can reach here. Use normal SQLAlchemy operators (such as `or_()`, `and_()`, etc.) to construct SQL.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021

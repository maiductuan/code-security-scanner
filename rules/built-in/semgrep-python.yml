    description: >-
      Cohere safety mode explicitly set to 'OFF', disabling all safety guardrails. Use 'STRICT' or 'CONTEXTUAL' instead.
      See https://docs.cohere.com/docs/safety-modes
    category: security
    severity: high
    confidence: medium
    languages:

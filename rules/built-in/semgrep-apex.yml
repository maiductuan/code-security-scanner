      different credentials for different environments is troublesome and error-prone.
    category: security
    severity: high
    confidence: medium
    languages:
      - apex
    patterns:
      - pattern: $REQUEST.setHeader('Authorization', $AUTHSTRING);
        message: >-
          Named Credentials (and callout endpoints) should be used instead of hard-coding credentials. 1. Hard-coded
          credentials are hard to maintain when mixed in with application code. 2. It is particularly hard to update
          hard-coded credentials when they are used amongst different classes. 3. Granting a developer access to the
          codebase means granting knowledge of credentials, and thus keeping a two-level access is not possible. 4.
          Using different credentials for different environments is troublesome and error-prone.
    cwe:
      - CWE-540
    owasp: []
    references:
      - https://cwe.mitre.org/data/definitions/540.html
    tags:
      - salesforce
  - id: soql-injection-unescaped-url-param
    name: soql-injection-unescaped-url-param
    description: >-
      If a dynamic query must be used,leverage nFORCE Query Builder. In other programming languages, the related flaw is
      known as SQL injection. Apex doesn't use SQL, but uses its own database query language, SOQL. SOQL is much simpler
      and more limited in functionality than SQL. The risks are much lower for SOQL injection than for SQL injection,
      but the attacks are nearly identical to traditional SQL injection. SQL/SOQL injection takes user-supplied input
      and uses those values in a dynamic SOQL query. If the input isn't validated, it can include SOQL commands that
      effectively modify the SOQL statement and trick the application into performing unintended commands.
    category: security
    severity: high
    confidence: medium
    languages:
      - apex
    patterns:
      - regex: .*
        message: >-
          If a dynamic query must be used,leverage nFORCE Query Builder. In other programming languages, the related
          flaw is known as SQL injection. Apex doesn't use SQL, but uses its own database query language, SOQL. SOQL is
          much simpler and more limited in functionality than SQL. The risks are much lower for SOQL injection than for
          SQL injection, but the attacks are nearly identical to traditional SQL injection. SQL/SOQL injection takes
          user-supplied input and uses those values in a dynamic SOQL query. If the input isn't validated, it can
          include SOQL commands that effectively modify the SOQL statement and trick the application into performing
          unintended commands.
    cwe:
      - CWE-943
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://cwe.mitre.org/data/definitions/943.html
    tags:
      - salesforce

  - id: specify-sharing-level
    name: specify-sharing-level
    description: >-
      Every Apex class should have an explicit sharing mode declared. Use the `with sharing` or `without sharing`
      keywords on a class to specify whether sharing rules must be enforced. Use the `inherited sharing` keyword on an
      Apex class to run the class in the sharing mode of the class that called it.
    category: security
    severity: medium
    confidence: medium
    languages:
      - apex
    patterns:
      - regex: (private|public|global).*\s(class)\s.*[{]
        message: >-
          Every Apex class should have an explicit sharing mode declared. Use the `with sharing` or `without sharing`
          keywords on a class to specify whether sharing rules must be enforced. Use the `inherited sharing` keyword on
          an Apex class to run the class in the sharing mode of the class that called it.
    cwe:
      - CWE-284
    owasp:
      - A04:2021
      - A06:2025
    references:
      - https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/apex_classes_keywords_sharing.htm
      - https://cwe.mitre.org/data/definitions/284.html
      - https://owasp.org/Top10/A04_2021-Insecure_Design/
    tags:
      - salesforce
  - id: system-debug
    name: system-debug
    description: >-
      In addition to debug statements potentially logging data excessively, debug statements also contribute to longer
      transactions and consume Apex CPU time even when debug logs are not being captured.
    category: security
    severity: medium
    confidence: medium
    languages:
      - apex
    patterns:
      - pattern: System.debug(...)
        message: >-
          In addition to debug statements potentially logging data excessively, debug statements also contribute to
          longer transactions and consume Apex CPU time even when debug logs are not being captured.
    cwe:
      - CWE-489
      - CWE-779
    owasp: []
    references:
      - https://cwe.mitre.org/data/definitions/489.html
      - https://cwe.mitre.org/data/definitions/779.html
    tags:
      - vuln

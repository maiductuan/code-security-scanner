rules:
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: args-os
    name: args-os
    description: >-
      args_os should not be used for security operations. From the docs: "The first element is traditionally the path of
      the executable, but it can be set to arbitrary text, and might not even exist. This means this property should not
      be relied upon for security purposes."
    category: security
    severity: low
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: std::env::args_os()
        message: >-
          args_os should not be used for security operations. From the docs: "The first element is traditionally the
          path of the executable, but it can be set to arbitrary text, and might not even exist. This means this
          property should not be relied upon for security purposes."
    cwe:
      - CWE-807
    owasp: []
    references:
      - https://doc.rust-lang.org/stable/std/env/fn.args_os.html
    tags:
      - rust
  - id: args
    name: args
    description: >-
      args should not be used for security operations. From the docs: "The first element is traditionally the path of
      the executable, but it can be set to arbitrary text, and might not even exist. This means this property should not
      be relied upon for security purposes."
    category: security
    severity: low
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: std::env::args()
        message: >-
          args should not be used for security operations. From the docs: "The first element is traditionally the path
          of the executable, but it can be set to arbitrary text, and might not even exist. This means this property
          should not be relied upon for security purposes."
    cwe:
      - CWE-807
    owasp: []
    references:
      - https://doc.rust-lang.org/stable/std/env/fn.args.html
    tags:
      - rust
  - id: current-exe
    name: current-exe
    description: >-
      current_exe should not be used for security operations. From the docs: "The output of this function should not be
      trusted for anything that might have security implications. Basically, if users can run the executable, they can
      change the output arbitrarily."
    category: security
    severity: low
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: std::env::current_exe()
        message: >-
          current_exe should not be used for security operations. From the docs: "The output of this function should not
          be trusted for anything that might have security implications. Basically, if users can run the executable,
          they can change the output arbitrarily."
    cwe:
      - CWE-807
    owasp: []
    references:
      - https://doc.rust-lang.org/stable/std/env/fn.current_exe.html#security
    tags:
      - rust
  - id: insecure-hashes
    name: insecure-hashes
    description: Detected cryptographically insecure hashing function
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: md2::Md2::new(...)
        message: Detected cryptographically insecure hashing function
      - pattern: md4::Md4::new(...)
        message: Detected cryptographically insecure hashing function
      - pattern: md5::Md5::new(...)
        message: Detected cryptographically insecure hashing function
      - pattern: sha1::Sha1::new(...)
        message: Detected cryptographically insecure hashing function
    cwe:
      - CWE-328
    owasp: []
    references:
      - https://github.com/RustCrypto/hashes
      - https://docs.rs/md2/latest/md2/
      - https://docs.rs/md4/latest/md4/
      - https://docs.rs/md5/latest/md5/
      - https://docs.rs/sha-1/latest/sha1/
    tags:
      - rust
  - id: reqwest-accept-invalid
    name: reqwest-accept-invalid
    description: Dangerously accepting invalid TLS information
    category: security
    severity: medium
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: reqwest::Client::builder(). ... .danger_accept_invalid_hostnames(true)
        message: Dangerously accepting invalid TLS information
      - pattern: reqwest::Client::builder(). ... .danger_accept_invalid_certs(true)
        message: Dangerously accepting invalid TLS information
    cwe:
      - CWE-295
    owasp: []
    references:
      - https://docs.rs/reqwest/latest/reqwest/struct.ClientBuilder.html#method.danger_accept_invalid_hostnames
      - https://docs.rs/reqwest/latest/reqwest/struct.ClientBuilder.html#method.danger_accept_invalid_certs
    tags:
      - reqwest
  - id: reqwest-set-sensitive
    name: reqwest-set-sensitive
    description: Set sensitive flag on security headers with 'set_sensitive' to treat data with special care
    category: security
    severity: low
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: |
          let mut $HEADERS = header::HeaderMap::new();
          ...
          let $HEADER_VALUE = <... header::HeaderValue::$FROM_FUNC(...) ...>;
          ...
          $HEADERS.insert($HEADER, $HEADER_VALUE);
        message: Set sensitive flag on security headers with 'set_sensitive' to treat data with special care
    cwe:
      - CWE-921
    owasp: []
    references:
      - https://docs.rs/reqwest/latest/reqwest/header/struct.HeaderValue.html#method.set_sensitive
    tags:
      - reqwest
  - id: rustls-dangerous
    name: rustls-dangerous
    description: Dangerous client config used, ensure SSL verification
    category: security
    severity: medium
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: rustls::client::DangerousClientConfig
        message: Dangerous client config used, ensure SSL verification
      - pattern: $CLIENT.dangerous().set_certificate_verifier(...)
        message: Dangerous client config used, ensure SSL verification
      - pattern: |
          let $CLIENT = rustls::client::ClientConfig::dangerous(...);
          ...
          $CLIENT.set_certificate_verifier(...);
        message: Dangerous client config used, ensure SSL verification
    cwe:
      - CWE-295
    owasp: []
    references:
      - https://docs.rs/rustls/latest/rustls/client/struct.DangerousClientConfig.html
      - https://docs.rs/rustls/latest/rustls/client/struct.ClientConfig.html#method.dangerous
    tags:
      - rustls
  - id: ssl-verify-none
    name: ssl-verify-none
    description: SSL verification disabled, this allows for MitM attacks
    category: security
    severity: medium
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: $BUILDER.set_verify(openssl::ssl::SSL_VERIFY_NONE)
        message: SSL verification disabled, this allows for MitM attacks
    cwe:
      - CWE-295
    owasp: []
    references:
      - https://docs.rs/openssl/latest/openssl/ssl/struct.SslContextBuilder.html#method.set_verify
    tags:
      - openssl
  - id: temp-dir
    name: temp-dir
    description: >-
      temp_dir should not be used for security operations. From the docs: 'The temporary directory may be shared among
      users, or between processes with different privileges; thus, the creation of any files or directories in the
      temporary directory must use a secure method to create a uniquely named file. Creating a file or directory with a
      fixed or predictable name may result in “insecure temporary file” security vulnerabilities.'
    category: security
    severity: low
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: std::env::temp_dir()
        message: >-
          temp_dir should not be used for security operations. From the docs: 'The temporary directory may be shared
          among users, or between processes with different privileges; thus, the creation of any files or directories in
          the temporary directory must use a secure method to create a uniquely named file. Creating a file or directory
          with a fixed or predictable name may result in “insecure temporary file” security vulnerabilities.'
    cwe:
      - CWE-807
    owasp: []
    references:
      - https://doc.rust-lang.org/stable/std/env/fn.temp_dir.html
    tags:
      - rust
  - id: unsafe-usage
    name: unsafe-usage
    description: Detected 'unsafe' usage, please audit for secure usage
    category: security
    severity: low
    confidence: medium
    languages:
      - rust
    patterns:
      - pattern: unsafe { ... }
        message: Detected 'unsafe' usage, please audit for secure usage
    cwe:
      - CWE-242
    owasp: []
    references:
      - https://doc.rust-lang.org/std/keyword.unsafe.html
    tags:
      - rust

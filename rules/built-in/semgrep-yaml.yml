  - id: secrets-inherit
    name: secrets-inherit
    description: >-
      This workflow uses `secrets: inherit` to pass all of the calling workflow's secrets to a reusable workflow. This
      violates the principle of least privilege because the called workflow receives access to every secret in the
      repository, not just the ones it needs. If the called workflow is compromised or sourced from a third party, an
      attacker gains access to all repository secrets. Instead, explicitly pass only the secrets that the called
      workflow requires using the `secrets:` map, e.g. `secrets: { MY_SECRET: ${{ secrets.MY_SECRET }} }`.
    category: secrets
    severity: high
    confidence: medium
    languages:

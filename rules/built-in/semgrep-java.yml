  - id: insecure-jms-deserialization
    name: insecure-jms-deserialization
    description: >-
      JMS Object messages depend on Java Serialization for marshalling/unmarshalling of the message payload when
      ObjectMessage.getObject() is called. Deserialization of untrusted data can lead to security flaws; a remote
      attacker could via a crafted JMS ObjectMessage to execute arbitrary code with the permissions of the application
      listening/consuming JMS Messages. In this case, the JMS MessageListener consume an ObjectMessage type received
      inside the onMessage method, which may lead to arbitrary code execution when calling the $Y.getObject method.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          JMS Object messages depend on Java Serialization for marshalling/unmarshalling of the message payload when
          ObjectMessage.getObject() is called. Deserialization of untrusted data can lead to security flaws; a remote
          attacker could via a crafted JMS ObjectMessage to execute arbitrary code with the permissions of the
          application listening/consuming JMS Messages. In this case, the JMS MessageListener consume an ObjectMessage
          type received inside the onMessage method, which may lead to arbitrary code execution when calling the
          $Y.getObject method.
    cwe:
      - CWE-502
    owasp:
      - A08:2017
      - A08:2021
      - A08:2025
    references:
      - >-
        https://www.blackhat.com/docs/us-16/materials/us-16-Kaiser-Pwning-Your-Java-Messaging-With-Deserialization-Vulnerabilities-wp.pdf
    tags:
      - java
  - id: jackson-unsafe-deserialization
    name: jackson-unsafe-deserialization
    description: >-
      When using Jackson to marshall/unmarshall JSON to Java objects, enabling default typing is dangerous and can lead
      to RCE. If an attacker can control `$JSON` it might be possible to provide a malicious JSON which can be used to
      exploit unsecure deserialization. In order to prevent this issue, avoid to enable default typing (globally or by
      using "Per-class" annotations) and avoid using `Object` and other dangerous types for member variable declaration
      which creating classes for Jackson based deserialization.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          When using Jackson to marshall/unmarshall JSON to Java objects, enabling default typing is dangerous and can
          lead to RCE. If an attacker can control `$JSON` it might be possible to provide a malicious JSON which can be
          used to exploit unsecure deserialization. In order to prevent this issue, avoid to enable default typing
          (globally or by using "Per-class" annotations) and avoid using `Object` and other dangerous types for member
          variable declaration which creating classes for Jackson based deserialization.
    cwe:
      - CWE-502
    owasp:
      - A8:2017
      - A8:2021
    references:

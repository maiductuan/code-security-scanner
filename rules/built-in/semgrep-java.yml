  - id: tls-renegotiation
    name: tls-renegotiation
    description: >-
      Checks for cases where java applications are allowing unsafe renegotiation. This leaves the application vulnerable
      to a man-in-the-middle attack where chosen plain text is injected as prefix to a TLS connection.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          java.lang.System.setProperty("sun.security.ssl.allowUnsafeRenegotiation", true);
        message: >-
          Checks for cases where java applications are allowing unsafe renegotiation. This leaves the application
          vulnerable to a man-in-the-middle attack where chosen plain text is injected as prefix to a TLS connection.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
    references:
      - https://www.oracle.com/java/technologies/javase/tlsreadme.html
    tags:
      - java
  - id: unirest-http-request
    name: unirest-http-request
    description: >-
      Checks for requests sent via Unirest to http:// URLS. This is dangerous because the server is attempting to
      connect to a website that does not encrypt traffic with TLS. Instead, send requests only to https:// URLS.

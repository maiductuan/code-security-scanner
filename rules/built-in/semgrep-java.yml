        message: >-
          Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token
          has already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
          verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - jwt
  - id: assignment-comparison
    name: assignment-comparison
    description: The value of `$X` is being ignored and will be used in the conditional test
    category: security
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: if ($X=true) { ... }
        message: The value of `$X` is being ignored and will be used in the conditional test
      - pattern: if ($X=false) { ... }
        message: The value of `$X` is being ignored and will be used in the conditional test
    cwe: []
    owasp: []
    references: []
    tags:
      - java
  - id: eqeq
    name: eqeq
    description: >-
      `$X == $X` or `$X != $X` is always true. (Unless the value compared is a float or double). To test if `$X` is
      not-a-number, use `Double.isNaN($X)`.
    category: security
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          `$X == $X` or `$X != $X` is always true. (Unless the value compared is a float or double). To test if `$X` is
          not-a-number, use `Double.isNaN($X)`.
    cwe: []
    owasp: []
    references: []
    tags:
      - java
  - id: hardcoded-conditional
    name: hardcoded-conditional
    description: This if statement will always have the same behavior and is therefore unnecessary.
    category: security
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: This if statement will always have the same behavior and is therefore unnecessary.
    cwe: []
    owasp: []
    references: []
    tags:
      - java
  - id: no-string-eqeq
    name: no-string-eqeq
    description: Strings should not be compared with '=='. This is a reference comparison operator. Use '.equals()' instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: $X == (String $Y)
        message: Strings should not be compared with '=='. This is a reference comparison operator. Use '.equals()' instead.
    cwe: []
    owasp: []
    references: []
    tags:
      - java
  - id: anonymous-ldap-bind
    name: anonymous-ldap-bind
    description: >-
      Detected anonymous LDAP bind. This permits anonymous users to execute LDAP statements. Consider enforcing
      authentication for LDAP. See https://docs.oracle.com/javase/tutorial/jndi/ldap/auth_mechs.html for more
      information.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          $ENV.put($CTX.SECURITY_AUTHENTICATION, "none");
          ...
          $DCTX = new InitialDirContext($ENV, ...);
        message: >-
          Detected anonymous LDAP bind. This permits anonymous users to execute LDAP statements. Consider enforcing
          authentication for LDAP. See https://docs.oracle.com/javase/tutorial/jndi/ldap/auth_mechs.html for more
          information.
    cwe:
      - CWE-287
    owasp:
      - A02:2017
      - A07:2021
      - A07:2025
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures
    tags:
      - java
  - id: bad-hexa-conversion
    name: bad-hexa-conversion
    description: >-
      'Integer.toHexString()' strips leading zeroes from each byte if read byte-by-byte. This mistake weakens the hash
      value computed since it introduces more collisions. Use 'String.format("%02X", ...)' instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |-
          $X $METHOD(...) {
            ...
            MessageDigest $MD = ...;
            ...
            $MD.digest(...);
            ...
            Integer.toHexString(...);
          }
        message: >-
          'Integer.toHexString()' strips leading zeroes from each byte if read byte-by-byte. This mistake weakens the
          hash value computed since it introduces more collisions. Use 'String.format("%02X", ...)' instead.
    cwe:
      - CWE-704
    owasp:
      - A03:2017
    references:
      - https://cwe.mitre.org/data/definitions/704.html
    tags:
      - java
  - id: blowfish-insufficient-key-size
    name: blowfish-insufficient-key-size
    description: Using less than 128 bits for Blowfish is considered insecure. Use 128 bits or more, or switch to use AES instead.
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          $KEYGEN = KeyGenerator.getInstance("Blowfish");
          ...
          $KEYGEN.init($SIZE);
        message: >-
          Using less than 128 bits for Blowfish is considered insecure. Use 128 bits or more, or switch to use AES
          instead.
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - java
  - id: cbc-padding-oracle
    name: cbc-padding-oracle
    description: >-
      Using CBC with PKCS5Padding is susceptible to padding oracle attacks. A malicious actor could discern the
      difference between plaintext with valid or invalid padding. Further, CBC mode does not include any integrity
      checks. Use 'AES/GCM/NoPadding' instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          "=~/.*\/CBC\/PKCS5Padding/"
        message: >-
          Using CBC with PKCS5Padding is susceptible to padding oracle attacks. A malicious actor could discern the
          difference between plaintext with valid or invalid padding. Further, CBC mode does not include any integrity
          checks. Use 'AES/GCM/NoPadding' instead.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://capec.mitre.org/data/definitions/463.html
      - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html#cipher-modes

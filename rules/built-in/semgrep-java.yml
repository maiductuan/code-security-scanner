  - id: mongodb-nosqli
    name: mongodb-nosqli
    description: >-
      Detected non-constant data passed into a NoSQL query using the 'where' evaluation operator. If this data can be
      controlled by an external user, this is a NoSQL injection. Ensure data passed to the NoSQL query is not user
      controllable, or properly sanitize the data. Ideally, avoid using the 'where' operator at all and instead use the
      helper methods provided by com.mongodb.client.model.Filters with comparative operators such as eq, ne, lt, gt,
      etc.
    category: injection
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          Detected non-constant data passed into a NoSQL query using the 'where' evaluation operator. If this data can
          be controlled by an external user, this is a NoSQL injection. Ensure data passed to the NoSQL query is not
          user controllable, or properly sanitize the data. Ideally, avoid using the 'where' operator at all and instead
          use the helper methods provided by com.mongodb.client.model.Filters with comparative operators such as eq, ne,
          lt, gt, etc.
    cwe:
      - CWE-943
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
      - https://www.mongodb.com/docs/manual/tutorial/query-documents/
      - https://www.mongodb.com/docs/manual/reference/operator/query/where/

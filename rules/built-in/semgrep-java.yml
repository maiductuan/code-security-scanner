rules:
  - id: anthropic-hardcoded-api-key-java
    name: anthropic-hardcoded-api-key-java
    description: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: $OBJ.apiKey("$KEY")
        message: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/initial-setup
    tags:
      - anthropic
  - id: gemini-hardcoded-api-key-java
    name: gemini-hardcoded-api-key-java
    description: Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: $OBJ.apiKey("$KEY")
        message: Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://ai.google.dev/gemini-api/docs/api-key
    tags:
      - gemini
      - google
  - id: llm-api-key-in-source-java
    name: llm-api-key-in-source-java
    description: >-
      AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI, Anthropic,
      Google, Hugging Face). Use environment variables or a secrets manager instead.
    category: injection
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI,
          Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
    tags:
      - openai
      - anthropic
      - google
      - huggingface
  - id: openai-hardcoded-api-key-java
    name: openai-hardcoded-api-key-java
    description: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: new OpenAiService("$KEY")
        message: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://help.openai.com/en/articles/5112595-best-practices-for-api-key-safety
    tags:
      - openai
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: tainted-sql-string
    name: tainted-sql-string
    description: >-
      Detected user input used to manually construct a SQL string. This is usually bad practice because manual
      construction could accidentally result in a SQL injection. An attacker could use a SQL injection to steal or
      modify contents of the database. Instead, use a parameterized query which is available by default in most database
      engines. Alternatively, consider using an object-relational mapper (ORM) such as Sequelize which will protect your
      queries.
    category: injection
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          Detected user input used to manually construct a SQL string. This is usually bad practice because manual
          construction could accidentally result in a SQL injection. An attacker could use a SQL injection to steal or
          modify contents of the database. Instead, use a parameterized query which is available by default in most
          database engines. Alternatively, consider using an object-relational mapper (ORM) such as Sequelize which will
          protect your queries.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/www-community/attacks/SQL_Injection
    tags:
      - aws-lambda
  - id: tainted-sqli
    name: tainted-sqli
    description: >-
      Detected SQL statement that is tainted by `$EVENT` object. This could lead to SQL injection if variables in the
      SQL statement are not properly sanitized. Use parameterized SQL queries or properly sanitize user input instead.
    category: injection
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          Detected SQL statement that is tainted by `$EVENT` object. This could lead to SQL injection if variables in
          the SQL statement are not properly sanitized. Use parameterized SQL queries or properly sanitize user input
          instead.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
    tags:
      - sql
      - java
      - aws-lambda
  - id: java-jwt-decode-without-verify
    name: java-jwt-decode-without-verify
    description: >-
      Detected the decoding of a JWT token without a verify step. JWT tokens must be verified before use, otherwise the
      token's integrity is unknown. This means a malicious actor could forge a JWT token with any claims. Call
      '.verify()' before using the token.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          com.auth0.jwt.JWT.decode(...);
        message: >-
          Detected the decoding of a JWT token without a verify step. JWT tokens must be verified before use, otherwise
          the token's integrity is unknown. This means a malicious actor could forge a JWT token with any claims. Call
          '.verify()' before using the token.
    cwe:
      - CWE-345
    owasp:
      - A08:2021
      - A08:2025
    references:
      - https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures
    tags:
      - jwt
  - id: java-jwt-hardcoded-secret
    name: java-jwt-hardcoded-secret
    description: >-
      A hard-coded credential was detected. It is not recommended to store credentials in source-code, as this risks
      secrets being leaked and used by either an internal or external malicious adversary. It is recommended to use
      environment variables to securely provide credentials or retrieve credentials from a secure vault or HSM (Hardware
      Security Module).
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - regex: .*
        message: >-
          A hard-coded credential was detected. It is not recommended to store credentials in source-code, as this risks
          secrets being leaked and used by either an internal or external malicious adversary. It is recommended to use
          environment variables to securely provide credentials or retrieve credentials from a secure vault or HSM
          (Hardware Security Module).
    cwe:
      - CWE-798
    owasp:
      - A07:2021
      - A07:2025
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
    tags:
      - java
      - secrets
      - jwt
  - id: java-jwt-none-alg
    name: java-jwt-none-alg
    description: >-
      Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token has
      already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
      verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
    category: auth
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          $JWT.sign(com.auth0.jwt.algorithms.Algorithm.none());
        message: >-
          Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token
          has already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
          verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
      - pattern: |
          $NONE = com.auth0.jwt.algorithms.Algorithm.none();
          ...
          $JWT.sign($NONE);
        message: >-
          Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token
          has already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
          verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
      - pattern: |-
          class $CLASS {
            ...
            $TYPE $NONE = com.auth0.jwt.algorithms.Algorithm.none();
            ...
            $RETURNTYPE $FUNC (...) {
              ...
              $JWT.sign($NONE);
              ...
            }
            ...
          }
        message: >-
          Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token
          has already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
          verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - jwt
  - id: insecure-resteasy-deserialization
    name: insecure-resteasy-deserialization
    description: >-
      When a Restful webservice endpoint is configured to use wildcard mediaType {*/*} as a value for the @Consumes
      annotation, an attacker could abuse the SerializableProvider by sending a HTTP Request with a Content-Type of
      application/x-java-serialized-object. The body of that request would be processed by the SerializationProvider and
      could contain a malicious payload, which may lead to arbitrary code execution when calling the $Y.getObject
      method.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          @Consumes({"application/x-java-serialized-object"})
        message: >-
          When a Restful webservice endpoint is configured to use wildcard mediaType {*/*} as a value for the @Consumes
          annotation, an attacker could abuse the SerializableProvider by sending a HTTP Request with a Content-Type of
          application/x-java-serialized-object. The body of that request would be processed by the SerializationProvider
          and could contain a malicious payload, which may lead to arbitrary code execution when calling the
          $Y.getObject method.
      - pattern: |
          @Consumes({"*/*"})
        message: >-
          When a Restful webservice endpoint is configured to use wildcard mediaType {*/*} as a value for the @Consumes
          annotation, an attacker could abuse the SerializableProvider by sending a HTTP Request with a Content-Type of
          application/x-java-serialized-object. The body of that request would be processed by the SerializationProvider
          and could contain a malicious payload, which may lead to arbitrary code execution when calling the
          $Y.getObject method.
      - pattern: |
          @Consumes("*/*")
        message: >-
          When a Restful webservice endpoint is configured to use wildcard mediaType {*/*} as a value for the @Consumes
          annotation, an attacker could abuse the SerializableProvider by sending a HTTP Request with a Content-Type of
          application/x-java-serialized-object. The body of that request would be processed by the SerializationProvider
          and could contain a malicious payload, which may lead to arbitrary code execution when calling the
          $Y.getObject method.
      - pattern: |
          @Consumes({MediaType.WILDCARD_TYPE})
        message: >-
          When a Restful webservice endpoint is configured to use wildcard mediaType {*/*} as a value for the @Consumes
          annotation, an attacker could abuse the SerializableProvider by sending a HTTP Request with a Content-Type of
          application/x-java-serialized-object. The body of that request would be processed by the SerializationProvider
          and could contain a malicious payload, which may lead to arbitrary code execution when calling the
          $Y.getObject method.
    cwe:
      - CWE-502
    owasp:
      - A08:2017
      - A08:2021
      - A08:2025
    references:
      - https://access.redhat.com/blogs/766093/posts/3162112
    tags:
      - jax-rs
  - id: default-resteasy-provider-abuse
    name: default-resteasy-provider-abuse
    description: >-
      When a Restful webservice endpoint isn't configured with a @Consumes annotation, an attacker could abuse the
      SerializableProvider by sending a HTTP Request with a Content-Type of application/x-java-serialized-object. The
      body of that request would be processed by the SerializationProvider and could contain a malicious payload, which
      may lead to arbitrary code execution. Instead, add a @Consumes annotation to the function or class.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          @Path("...")
          public $RETURNTYPE $METHOD(...) { ...}
        message: >-
          When a Restful webservice endpoint isn't configured with a @Consumes annotation, an attacker could abuse the
          SerializableProvider by sending a HTTP Request with a Content-Type of application/x-java-serialized-object.
          The body of that request would be processed by the SerializationProvider and could contain a malicious
          payload, which may lead to arbitrary code execution. Instead, add a @Consumes annotation to the function or
          class.
    cwe:
      - CWE-502
    owasp:
      - A08:2017
      - A08:2021
      - A08:2025
    references:
      - https://access.redhat.com/blogs/766093/posts/3162112
    tags:
      - jax-rs
  - id: jax-rs-path-traversal
    name: jax-rs-path-traversal
    description: >-
      Detected a potential path traversal. A malicious actor could control the location of this file, to include going
      backwards in the directory with '../'. To address this, ensure that user-controlled variables in file paths are
      sanitized. You may also consider using a utility method such as org.apache.commons.io.FilenameUtils.getName(...)
      to only retrieve the file name from the path.
    category: file-ops
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          $RETURNTYPE $FUNC (..., @PathParam(...) $TYPE $VAR, ...) {
            ...
            new File(..., $VAR, ...);
            ...
          }
        message: >-
          Detected a potential path traversal. A malicious actor could control the location of this file, to include
          going backwards in the directory with '../'. To address this, ensure that user-controlled variables in file
          paths are sanitized. You may also consider using a utility method such as
          org.apache.commons.io.FilenameUtils.getName(...) to only retrieve the file name from the path.
      - pattern: |-
          $RETURNTYPE $FUNC (..., @javax.ws.rs.PathParam(...) $TYPE $VAR, ...) {
            ...
            new File(..., $VAR, ...);
            ...
          }
        message: >-
          Detected a potential path traversal. A malicious actor could control the location of this file, to include
          going backwards in the directory with '../'. To address this, ensure that user-controlled variables in file
          paths are sanitized. You may also consider using a utility method such as
          org.apache.commons.io.FilenameUtils.getName(...) to only retrieve the file name from the path.
    cwe:
      - CWE-22
    owasp:
      - A05:2017
      - A01:2021
      - A01:2025
    references:
      - https://www.owasp.org/index.php/Path_Traversal
    tags:
      - jax-rs
  - id: seam-log-injection
    name: seam-log-injection
    description: >-
      Seam Logging API support an expression language to introduce bean property to log messages. The expression
      language can also be the source to unwanted code execution. In this context, an expression is built with a dynamic
      value. The source of the value(s) should be verified to avoid that unfiltered values fall into this risky code
      evaluation.
    category: security
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          $LOG.$INFO($X + $Y,...)
        message: >-
          Seam Logging API support an expression language to introduce bean property to log messages. The expression
          language can also be the source to unwanted code execution. In this context, an expression is built with a
          dynamic value. The source of the value(s) should be verified to avoid that unfiltered values fall into this
          risky code evaluation.
    cwe:
      - CWE-95
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
    tags:
      - jboss
  - id: find-sql-string-concatenation
    name: find-sql-string-concatenation
    description: In $METHOD, $X is used to construct a SQL query via string concatenation.
    category: injection
    severity: high
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          $RETURN $METHOD(...,String $X,...){
            ...
            Session $SESSION = ...;
            ...
            String $QUERY = ... + $X + ...;
            ...
            PreparedStatement $PS = $SESSION.connection().prepareStatement($QUERY);
            ...
            ResultSet $RESULT = $PS.executeQuery();
            ...
          }
        message: In $METHOD, $X is used to construct a SQL query via string concatenation.
      - pattern: |
          $RETURN $METHOD(...,String $X,...){
            ...
            String $QUERY = ... + $X + ...;
            ...
            Session $SESSION = ...;
            ...
            PreparedStatement $PS = $SESSION.connection().prepareStatement($QUERY);
            ...
            ResultSet $RESULT = $PS.executeQuery();
            ...
          }
        message: In $METHOD, $X is used to construct a SQL query via string concatenation.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
    tags:
      - jboss
  - id: jjwt-none-alg
    name: jjwt-none-alg

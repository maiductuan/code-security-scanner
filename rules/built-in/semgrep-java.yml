      Insecure transport rules to catch socket connections to http, telnet, and ftp servers. This is dangerous because
      these are protocols that do not encrypt traffic.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
    patterns:
      - pattern: |
          $SOCKET = new Socket("=~/[tT][eE][lL][nN][eE][tT]://.*/", ...);
          ...
          $OUT = new PrintWriter($SOCKET.getOutputStream(...), ...);
          ...
          $OUT.$FUNC(...);
        message: >-
          Insecure transport rules to catch socket connections to http, telnet, and ftp servers. This is dangerous
          because these are protocols that do not encrypt traffic.
      - pattern: |
          $SOCKET = new Socket("=~/^[fF][tT][pP]://.*/", ...);
          ...
          $OUT = new PrintWriter($SOCKET.getOutputStream(...), ...);
          ...
          $OUT.$FUNC(...);
        message: >-
          Insecure transport rules to catch socket connections to http, telnet, and ftp servers. This is dangerous
          because these are protocols that do not encrypt traffic.
      - pattern: |
          $SOCKET = new Socket("=~/[hH][tT][tT][pP]://.*/", ...);
          ...
          $OUT = new PrintWriter($SOCKET.getOutputStream(...), ...);
          ...
          $OUT.$FUNC(...);
        message: >-
          Insecure transport rules to catch socket connections to http, telnet, and ftp servers. This is dangerous
          because these are protocols that do not encrypt traffic.
    cwe:

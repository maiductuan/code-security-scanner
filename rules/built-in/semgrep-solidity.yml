  - id: arbitrary-send-erc20
    name: arbitrary-send-erc20
    description: >-
      msg.sender is not being used when calling erc20.transferFrom. Example - Alice approves this contract to spend her
      ERC20 tokens. Bob can call function 'a' and specify Alice's address as the from parameter in transferFrom,
      allowing him to transfer Alice's tokens to himself.
    category: security
    severity: medium
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: $FUNC.transferFrom(...)
        message: >-
          msg.sender is not being used when calling erc20.transferFrom. Example - Alice approves this contract to spend
          her ERC20 tokens. Bob can call function 'a' and specify Alice's address as the from parameter in transferFrom,
          allowing him to transfer Alice's tokens to himself.
    cwe:
      - CWE-285
    owasp:
      - A01:2021
      - A01:2025
    references:
      - https://github.com/crytic/slither/wiki/Detector-Documentation#arbitrary-from-in-transferfrom
      - https://cwe.mitre.org/data/definitions/285.html
    tags:
      - solidity

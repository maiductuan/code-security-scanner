rules:
  - id: use-abi-encodecall-instead-of-encodewithselector
    name: use-abi-encodecall-instead-of-encodewithselector
    description: To guarantee arguments type safety it is recommended to use `abi.encodeCall` instead of `abi.encodeWithSelector`.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: |
          abi.encodeWithSelector(...);
        message: >-
          To guarantee arguments type safety it is recommended to use `abi.encodeCall` instead of
          `abi.encodeWithSelector`.
    cwe: []
    owasp: []
    references:
      - https://blog.soliditylang.org/2021/12/20/solidity-0.8.11-release-announcement/
    tags:
      - solidity
  - id: use-ownable2step
    name: use-ownable2step
    description: >-
      By demanding that the receiver of the owner permissions actively accept via a contract call of its own, 
      `Ownable2Step` and `Ownable2StepUpgradeable` prevent the contract ownership from accidentally being transferred 
      to an address that cannot handle it.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - regex: .*
        message: >-
          By demanding that the receiver of the owner permissions actively accept via a contract call of its own, 
          `Ownable2Step` and `Ownable2StepUpgradeable` prevent the contract ownership from accidentally being
          transferred  to an address that cannot handle it.
    cwe: []
    owasp: []
    references:
      - https://docs.openzeppelin.com/contracts/4.x/api/access#Ownable2Step
      - https://www.rareskills.io/post/openzeppelin-ownable2step
    tags:
      - solidity
  - id: array-length-outside-loop
    name: array-length-outside-loop
    description: >-
      Caching the array length outside a loop saves reading it on each iteration, as long as the array's length is not
      changed during the loop.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: |
          $VAR.length
        message: >-
          Caching the array length outside a loop saves reading it on each iteration, as long as the array's length is
          not changed during the loop.
    cwe: []
    owasp: []
    references:
      - >-
        https://github.com/byterocket/c4-common-issues/blob/main/0-Gas-Optimizations.md/#g002---cache-array-length-outside-of-loop
    tags:
      - solidity
  - id: inefficient-state-variable-increment
    name: inefficient-state-variable-increment
    description: <x> += <y> costs more gas than <x> = <x> + <y> for state variables.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - regex: .*
        message: <x> += <y> costs more gas than <x> = <x> + <y> for state variables.
    cwe: []
    owasp: []
    references:
      - https://gist.github.com/IllIllI000/cbbfb267425b898e5be734d4008d4fe8
    tags:
      - solidity
  - id: init-variables-with-default-value
    name: init-variables-with-default-value
    description: >-
      Uninitialized variables are assigned with the types default value. Explicitly initializing a variable with its
      default value costs unnecessary gas.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - regex: .*
        message: >-
          Uninitialized variables are assigned with the types default value. Explicitly initializing a variable with its
          default value costs unnecessary gas.
    cwe: []
    owasp: []
    references:
      - >-
        https://github.com/byterocket/c4-common-issues/blob/main/0-Gas-Optimizations.md/#g001---dont-initialize-variables-with-default-value
    tags:
      - solidity
  - id: non-optimal-variables-swap
    name: non-optimal-variables-swap
    description: Consider swapping variables using `($VAR1, $VAR2) = ($VAR2, $VAR1)` to save gas
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: |
          $TMP = $VAR1;
          ...
          $VAR1 = $VAR2;
          ...
          $VAR2 = $TMP;
        message: Consider swapping variables using `($VAR1, $VAR2) = ($VAR2, $VAR1)` to save gas
    cwe: []
    owasp: []
    references:
      - https://dev.to/oliverjumpertz/solidity-quick-tip-efficiently-swap-two-variables-1f8i
    tags:
      - solidity
  - id: non-payable-constructor
    name: non-payable-constructor
    description: Consider making costructor payable to save gas.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: |
          constructor(...){
            ...
          }
        message: Consider making costructor payable to save gas.
    cwe: []
    owasp: []
    references:
      - https://twitter.com/0xAsm0d3us/status/1518960704271056897
    tags:
      - solidity
  - id: state-variable-read-in-a-loop
    name: state-variable-read-in-a-loop
    description: Replace state variable reads and writes within loops with local variable reads and writes.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: $X
        message: Replace state variable reads and writes within loops with local variable reads and writes.
    cwe: []
    owasp: []
    references:
      - >-
        https://github.com/devanshbatham/Solidity-Gas-Optimization-Tips#10--replace-state-variable-reads-and-writes-within-loops-with-local-variable-reads-and-writes
    tags:
      - solidity
  - id: unnecessary-checked-arithmetic-in-loop
    name: unnecessary-checked-arithmetic-in-loop
    description: >-
      A lot of times there is no risk that the loop counter can overflow.  Using Solidity's unchecked block saves the
      overflow checks.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - regex: .*
        message: >-
          A lot of times there is no risk that the loop counter can overflow.  Using Solidity's unchecked block saves
          the overflow checks.
    cwe: []
    owasp: []
    references:
      - >-
        https://github.com/byterocket/c4-common-issues/blob/main/0-Gas-Optimizations.md/#g011---unnecessary-checked-arithmetic-in-for-loop
    tags:
      - solidity
  - id: use-custom- high-not-require
    name: use-custom- high-not-require
    description: >-
      Consider using custom errors as they are more gas efficient while allowing developers  to describe the error in
      detail using NatSpec.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - regex: .*
        message: >-
          Consider using custom errors as they are more gas efficient while allowing developers  to describe the error
          in detail using NatSpec.
    cwe: []
    owasp: []
    references:
      - https://blog.soliditylang.org/2021/04/21/custom- highs/
    tags:
      - solidity
  - id: use-multiple-require
    name: use-multiple-require
    description: >-
      Using multiple require statements is cheaper than using && multiple check combinations.  There are more
      advantages, such as easier to read code and better coverage reports.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: |
          require (<... $X && $Y ...>, ...);
        message: >-
          Using multiple require statements is cheaper than using && multiple check combinations.  There are more
          advantages, such as easier to read code and better coverage reports.
    cwe: []
    owasp: []
    references:
      - >-
        https://code4rena.com/reports/2023-01-ondo#g-15-splitting-require-statements-that-use--saves-gas---saves-8-gas-per-
    tags:
      - solidity
  - id: use-nested-if
    name: use-nested-if
    description: >-
      Using nested is cheaper than using && multiple check combinations.  There are more advantages, such as easier to
      read code and better coverage reports.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: |
          if (<... $X && $Y ...>) {
            ...
          }
        message: >-
          Using nested is cheaper than using && multiple check combinations.  There are more advantages, such as easier
          to read code and better coverage reports.
    cwe: []
    owasp: []
    references:
      - https://code4rena.com/reports/2023-01-biconomy#g-18-use-nested-if-and-avoid-multiple-check-combinations
    tags:
      - solidity
  - id: use-prefix-decrement-not-postfix
    name: use-prefix-decrement-not-postfix
    description: >-
      Consider using the prefix decrement expression whenever the return value is not needed. The prefix decrement
      expression is cheaper in terms of gas.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: $VAR--
        message: >-
          Consider using the prefix decrement expression whenever the return value is not needed. The prefix decrement
          expression is cheaper in terms of gas.
    cwe: []
    owasp: []
    references:
      - >-
        https://github.com/byterocket/c4-common-issues/blob/main/0-Gas-Optimizations.md/#g012---use-prefix-increment-instead-of-postfix-increment-if-possible
    tags:
      - solidity
  - id: use-prefix-increment-not-postfix
    name: use-prefix-increment-not-postfix
    description: >-
      Consider using the prefix increment expression whenever the return value is not needed. The prefix increment
      expression is cheaper in terms of gas.
    category: security
    severity: low
    confidence: medium
    languages:
      - solidity
    patterns:
      - pattern: $VAR++
        message: >-
          Consider using the prefix increment expression whenever the return value is not needed. The prefix increment

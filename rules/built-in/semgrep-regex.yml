rules:
  - id: adafruit-api-key
    name: adafruit-api-key
    description: >-
      A gitleaks adafruit-api-key was detected which attempts to identify hard-coded credentials. It is not recommended
      to store credentials in source-code, as this risks secrets being leaked and used by either an internal or external
      malicious adversary. It is recommended to use environment variables to securely provide credentials or retrieve
      credentials from a secure vault or HSM (Hardware Security Module).
    category: secrets
    severity: low
    confidence: medium
    languages:
      - regex
    patterns:
      - regex: >-
          (?i)(?:adafruit)(?:[0-9a-z\-_\t
          .]{0,20})(?:[\s|']|[\s|"]){0,3}(?:=|>|:{1,3}=|\|\|:|<=|=>|:|\?=)(?:'|\"|\s|=|\x60){0,5}([a-z0-9_-]{32})(?:['|\"|\n|\r|\s|\x60|;]|$)
        message: >-
          A gitleaks adafruit-api-key was detected which attempts to identify hard-coded credentials. It is not
          recommended to store credentials in source-code, as this risks secrets being leaked and used by either an
          internal or external malicious adversary. It is recommended to use environment variables to securely provide
          credentials or retrieve credentials from a secure vault or HSM (Hardware Security Module).
    cwe:
      - CWE-798
    owasp:
      - A07:2021
      - A07:2025
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
    tags:
      - gitleaks

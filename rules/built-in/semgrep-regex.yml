          input the 'javascript:' URI and is subject to cross- site scripting (XSS) attacks. If using a relative URL,
          start with a literal forward slash and concatenate the URL, like this: href='/<%= link %>'. You may also
          consider setting the Content Security Policy (CSP) header.

  - id: metadata-owasp
    name: metadata-owasp
    description: >-
      The `owasp` tag in Semgrep rule metadata should start with the format "A00:YYYY", where A00 is the OWASP top ten
      number and YYYY is the OWASP top ten year.
    category: security
    severity: high
    confidence: medium
    languages:
      - json
      - yaml
    patterns:
      - regex: .*
        message: >-
          The `owasp` tag in Semgrep rule metadata should start with the format "A00:YYYY", where A00 is the OWASP top
          ten number and YYYY is the OWASP top ten year.
    cwe: []
    owasp: []
    references: []
    tags:
      - semgrep
  - id: metadata-references

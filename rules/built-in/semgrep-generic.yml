  - id: use-SRI-for-CDNs
    name: use-SRI-for-CDNs
    description: >-
      Consuming CDNs without including a SubResource Integrity (SRI) can expose your application and its users to
      compromised code. SRIs allow you to consume specific versions of content where if even a single byte is
      compromised, the resource will not be loaded. Add an integrity attribute to your <script> and <link> tags pointing
      to CDN content to ensure the resources have not been compromised. A crossorigin attribute should also be added.
      For a more thorough explanation along with explicit instructions on remediating, follow the directions from
      Mozilla here: https://developer.mozilla.org/en-US/blog/securing-cdn-using-sri-why-how/
    category: security
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: .*
        message: >-
          Consuming CDNs without including a SubResource Integrity (SRI) can expose your application and its users to
          compromised code. SRIs allow you to consume specific versions of content where if even a single byte is
          compromised, the resource will not be loaded. Add an integrity attribute to your <script> and <link> tags
          pointing to CDN content to ensure the resources have not been compromised. A crossorigin attribute should also
          be added. For a more thorough explanation along with explicit instructions on remediating, follow the
          directions from Mozilla here: https://developer.mozilla.org/en-US/blog/securing-cdn-using-sri-why-how/
    cwe:
      - CWE-346
    owasp:

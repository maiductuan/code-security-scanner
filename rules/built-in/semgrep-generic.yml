rules:
  - id: ai-config-hidden-unicode-generic
    name: ai-config-hidden-unicode-generic
    description: >-
      Invisible or zero-width Unicode character detected in AI coding assistant config file. These characters can be
      used in "Rules File Backdoor" attacks to inject hidden malicious instructions that are invisible to developers but
      interpreted by AI assistants. Remove all zero-width and bidirectional override characters from this file.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: '[\x{200B}\x{200C}\x{200D}\x{2063}\x{FEFF}\x{202A}-\x{202E}]'
        message: >-
          Invisible or zero-width Unicode character detected in AI coding assistant config file. These characters can be
          used in "Rules File Backdoor" attacks to inject hidden malicious instructions that are invisible to developers
          but interpreted by AI assistants. Remove all zero-width and bidirectional override characters from this file.
    cwe:
      - CWE-116
    owasp: []
    references:
      - >-
        https://www.pillar.security/blog/new-vulnerability-in-github-copilot-and-cursor-how-hackers-can-weaponize-code-agents
    tags:
      - cursor
      - github-copilot
      - windsurf
      - claude-code
  - id: claude-settings-auto-enable-mcp-generic
    name: claude-settings-auto-enable-mcp-generic
    description: >-
      "enableAllProjectMcpServers" is set to true in settings. This automatically enables all MCP servers defined in
      project configuration without user confirmation, allowing malicious repositories to register arbitrary MCP servers
      that execute code on your machine. Remove this setting or set it to false so that MCP servers require explicit
      approval.
    category: security
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: '"enableAllProjectMcpServers"\s*:\s*true'
        message: >-
          "enableAllProjectMcpServers" is set to true in settings. This automatically enables all MCP servers defined in
          project configuration without user confirmation, allowing malicious repositories to register arbitrary MCP
          servers that execute code on your machine. Remove this setting or set it to false so that MCP servers require
          explicit approval.
    cwe:
      - CWE-862
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/security
    tags:
      - claude-code
  - id: claude-settings-bypass-permissions-generic
    name: claude-settings-bypass-permissions-generic
    description: >-
      Dangerous permission bypass detected in Claude Code or Cursor settings. Settings like "bypassPermissions",
      "allowUnsandboxedCommands: true", or "enableWeakerNestedSandbox: true" disable critical security controls that
      protect against malicious tool use. Remove these settings or set them to false to maintain proper sandboxing and
      permission checks.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: '"bypassPermissions"'
        message: >-
          Dangerous permission bypass detected in Claude Code or Cursor settings. Settings like "bypassPermissions",
          "allowUnsandboxedCommands: true", or "enableWeakerNestedSandbox: true" disable critical security controls that
          protect against malicious tool use. Remove these settings or set them to false to maintain proper sandboxing
          and permission checks.
      - regex: '"allowUnsandboxedCommands"\s*:\s*true'
        message: >-
          Dangerous permission bypass detected in Claude Code or Cursor settings. Settings like "bypassPermissions",
          "allowUnsandboxedCommands: true", or "enableWeakerNestedSandbox: true" disable critical security controls that
          protect against malicious tool use. Remove these settings or set them to false to maintain proper sandboxing
          and permission checks.
      - regex: '"enableWeakerNestedSandbox"\s*:\s*true'
        message: >-
          Dangerous permission bypass detected in Claude Code or Cursor settings. Settings like "bypassPermissions",
          "allowUnsandboxedCommands: true", or "enableWeakerNestedSandbox: true" disable critical security controls that
          protect against malicious tool use. Remove these settings or set them to false to maintain proper sandboxing
          and permission checks.
    cwe:
      - CWE-862
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/security
    tags:
      - claude-code
      - cursor
  - id: claude-settings-env-url-override-generic
    name: claude-settings-env-url-override-generic
    description: >-
      API base URL override detected in settings or environment file. ANTHROPIC_BASE_URL or OPENAI_BASE_URL overrides
      can redirect all API traffic to an attacker-controlled server, exposing prompts, code, and API keys. Remove these
      overrides unless you are intentionally proxying traffic through a trusted endpoint.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: (ANTHROPIC_BASE_URL|OPENAI_BASE_URL)\s*"?\s*[=:]\s*"?\s*\S+
        message: >-
          API base URL override detected in settings or environment file. ANTHROPIC_BASE_URL or OPENAI_BASE_URL
          overrides can redirect all API traffic to an attacker-controlled server, exposing prompts, code, and API keys.
          Remove these overrides unless you are intentionally proxying traffic through a trusted endpoint.
    cwe:
      - CWE-923
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/security
    tags:
      - claude-code
      - cursor
  - id: hooks-dns-exfiltration-generic
    name: hooks-dns-exfiltration-generic
    description: >-
      DNS lookup command uses a variable in the hostname, which could exfiltrate sensitive data via DNS queries. In
      Claude Code and Cursor hooks, this pattern can leak secrets or environment data to attacker-controlled domains.
      Use static hostnames only in DNS commands.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: \b(ping|nslookup|dig|host)\s+.*\$
        message: >-
          DNS lookup command uses a variable in the hostname, which could exfiltrate sensitive data via DNS queries. In
          Claude Code and Cursor hooks, this pattern can leak secrets or environment data to attacker-controlled
          domains. Use static hostnames only in DNS commands.
    cwe:
      - CWE-201
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor
  - id: hooks-sensitive-file-access-bash
    name: hooks-sensitive-file-access-bash
    description: >-
      Hook input from jq flows into a file operation without checking for sensitive files. Claude Code and Cursor hooks
      receive JSON input that may reference sensitive files such as ~/.ssh/*, ~/.aws/credentials, or .env files. Filter
      or block access to sensitive paths using realpath and a validation check before performing file operations.
    category: file-ops
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: \$\(.*\|\s*jq\b[^)]*\)[\s\S]*?\n\s*(cat|rm|cp|mv)\s+\$
        message: >-
          Hook input from jq flows into a file operation without checking for sensitive files. Claude Code and Cursor
          hooks receive JSON input that may reference sensitive files such as ~/.ssh/*, ~/.aws/credentials, or .env
          files. Filter or block access to sensitive paths using realpath and a validation check before performing file
          operations.
    cwe:
      - CWE-538
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor
  - id: hooks-stop-missing-active-check-generic
    name: hooks-stop-missing-active-check-generic
    description: >-
      Stop hook outputs a "block" decision. Ensure you check stop_hook_active first and exit 0 if true, otherwise the
      hook will cause an infinite loop by blocking its own stop attempts.
    category: security
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: '"decision".*"block"'
        message: >-
          Stop hook outputs a "block" decision. Ensure you check stop_hook_active first and exit 0 if true, otherwise
          the hook will cause an infinite loop by blocking its own stop attempts.
    cwe:
      - CWE-835
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor
  - id: hooks-unconditional-allow-generic
    name: hooks-unconditional-allow-generic
    description: >-
      Hook unconditionally allows tool execution by outputting a permissionDecision of "allow" without any conditional
      check. This bypasses the entire permission system. Add a conditional check to validate the tool or command before
      allowing.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: permissionDecision.*allow
        message: >-
          Hook unconditionally allows tool execution by outputting a permissionDecision of "allow" without any
          conditional check. This bypasses the entire permission system. Add a conditional check to validate the tool or
          command before allowing.
    cwe:
      - CWE-862
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor
  - id: hooks-wget-pipe-bash-generic
    name: hooks-wget-pipe-bash-generic
    description: >-
      Remote script is fetched and piped directly to a shell interpreter. In Claude Code and Cursor hooks, this enables
      remote code execution from untrusted sources. Download the script first, inspect it, then execute it separately.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: (curl|wget)\s+.*\|\s*(bash|sh|zsh)\b
        message: >-
          Remote script is fetched and piped directly to a shell interpreter. In Claude Code and Cursor hooks, this
          enables remote code execution from untrusted sources. Download the script first, inspect it, then execute it
          separately.
    cwe:
      - CWE-829
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/claude-code/hooks
      - https://cursor.com/docs/agent/hooks
    tags:
      - claude-code
      - cursor
  - id: ide-settings-executable-path-generic
    name: ide-settings-executable-path-generic
    description: >-
      Executable path override detected in VS Code settings pointing to a project-relative path. A malicious repository
      can override interpreter or tool paths in workspace settings to execute arbitrary code when the project is opened.
      Use absolute system paths instead of relative paths for executable settings, and review .vscode/settings.json in
      untrusted repos.
    category: file-ops
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: >-
          "[^"]*(?:executablePath|ExecutablePath|defaultInterpreterPath|pythonPath|terminal\.integrated\.shell\.\w+)"\s*:\s*"\.\.?/
        message: >-
          Executable path override detected in VS Code settings pointing to a project-relative path. A malicious
          repository can override interpreter or tool paths in workspace settings to execute arbitrary code when the
          project is opened. Use absolute system paths instead of relative paths for executable settings, and review
          .vscode/settings.json in untrusted repos.
    cwe:
      - CWE-94
    owasp: []
    references:
      - https://blog.vipyrsec.com/posts/idesaster/
    tags:
      - vscode
  - id: mcp-hardcoded-config-secret-generic
    name: mcp-hardcoded-config-secret-generic
    description: >-
      Plaintext API key or token detected in MCP configuration file. Hardcoded secrets in config files risk exposure
      through version control or file sharing. Use environment variable references or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: ':\s*"sk-[a-zA-Z0-9]{20,}"'
        message: >-
          Plaintext API key or token detected in MCP configuration file. Hardcoded secrets in config files risk exposure
          through version control or file sharing. Use environment variable references or a secrets manager instead.
      - regex: ':\s*"sk-ant-[a-zA-Z0-9\-]{20,}"'
        message: >-
          Plaintext API key or token detected in MCP configuration file. Hardcoded secrets in config files risk exposure
          through version control or file sharing. Use environment variable references or a secrets manager instead.
      - regex: ':\s*"sk-proj-[a-zA-Z0-9\-]{20,}"'
        message: >-
          Plaintext API key or token detected in MCP configuration file. Hardcoded secrets in config files risk exposure
          through version control or file sharing. Use environment variable references or a secrets manager instead.
      - regex: ':\s*"hf_[a-zA-Z0-9]{20,}"'
        message: >-
          Plaintext API key or token detected in MCP configuration file. Hardcoded secrets in config files risk exposure
          through version control or file sharing. Use environment variable references or a secrets manager instead.
      - regex: ':\s*"AIza[a-zA-Z0-9\-_]{20,}"'
        message: >-
          Plaintext API key or token detected in MCP configuration file. Hardcoded secrets in config files risk exposure
          through version control or file sharing. Use environment variable references or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    tags:
      - mcp
  - id: mcp-tool-poisoning-generic
    name: mcp-tool-poisoning-generic
    description: >-
      MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
      instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files. Review
      the tool description for hidden instructions or social engineering.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: '"""[^"]*<IMPORTANT>[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
      - regex: '"""[^"]*~/\.ssh[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
      - regex: '"""[^"]*~/\.cursor/mcp\.json[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
      - regex: '"""[^"]*(?:/etc/shadow)[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
      - regex: '"""[^"]*(?:read|cat|load|parse|open|access)\s+\.env[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
      - regex: '"""[^"]*do not mention[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
      - regex: '"""[^"]*do not tell the user[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
      - regex: '"""[^"]*ignore previous instructions[^"]*"""'
        message: >-
          MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden
          instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files.
          Review the tool description for hidden instructions or social engineering.
    cwe:
      - CWE-77
    owasp: []
    references:
      - https://modelcontextprotocol.io/specification/draft/basic/security_best_practices
    tags:
      - mcp

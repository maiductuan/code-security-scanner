  - id: apex-csrf-static-constructor
    name: apex-csrf-static-constructor
    description: >-
      Having DML operations in Apex class constructor or initializers can have unexpected side effects: By just
      accessing a page, the DML statements would be executed and the database would be modified. Just querying the
      database is permitted.
    category: api-security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: .*
        message: >-
          Having DML operations in Apex class constructor or initializers can have unexpected side effects: By just
          accessing a page, the DML statements would be executed and the database would be modified. Just querying the
          database is permitted.
    cwe:
      - CWE-352
    owasp:
      - A01:2021
      - A01:2025
    references:
      - https://cwe.mitre.org/data/definitions/352.html
    tags:
      - salesforce
  - id: razor-use-of-htmlstring
    name: razor-use-of-htmlstring
    description: >-
      ASP.NET Core MVC provides an HtmlString class which isn't automatically encoded upon output. This should never be
      used in combination with untrusted input as this will expose an XSS vulnerability.
    category: security
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: .*
        message: >-
          ASP.NET Core MVC provides an HtmlString class which isn't automatically encoded upon output. This should never
          be used in combination with untrusted input as this will expose an XSS vulnerability.
    cwe:
      - CWE-116
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://cwe.mitre.org/data/definitions/116.html
      - https://owasp.org/Top10/A03_2021-Injection/
      - >-
        https://docs.microsoft.com/en-us/aspnet/core/security/cross-site-scripting?view=aspnetcore-6.0#html-encoding-using-razor
    tags:
      - .net
  - id: net-webconfig-debug
    name: net-webconfig-debug
    description: >-
      ASP.NET applications built with `debug` set to true in production may leak debug information to attackers. Debug
      mode also affects performance and reliability. Set `debug` to `false` or remove it from `<compilation ... />`
    category: security
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - pattern: |
          <compilation ... debug = "true" ... />
        message: >-
          ASP.NET applications built with `debug` set to true in production may leak debug information to attackers.
          Debug mode also affects performance and reliability. Set `debug` to `false` or remove it from `<compilation
          ... />`
    cwe:
      - CWE-11
    owasp:
      - A05:2021
      - A02:2025

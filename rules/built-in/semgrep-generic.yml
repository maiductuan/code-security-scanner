  - id: poetry-missing-solver-min-release-age
    name: poetry-missing-solver-min-release-age
    description: >-
      This poetry.toml does not set a dependency cooldown via `solver.min-release-age`. Without a cooldown, Poetry may
      resolve newly published package versions that have not yet been vetted by the community. Supply chain attacks
      frequently involve publishing a malicious version of a popular package and waiting for it to be pulled in — most
      are detected and removed within days. Set `min-release-age = 7` under `[solver]` to require that package versions
      are at least 7 days old before they are considered during dependency resolution. Added in: v2.4.0
    category: security
    severity: medium
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: (?m)^\[solver\]\n(?:^(?!min-release-age|\[|---).*\n)*(?=^\[|^---|\z)
        message: >-
          This poetry.toml does not set a dependency cooldown via `solver.min-release-age`. Without a cooldown, Poetry
          may resolve newly published package versions that have not yet been vetted by the community. Supply chain
          attacks frequently involve publishing a malicious version of a popular package and waiting for it to be pulled
          in — most are detected and removed within days. Set `min-release-age = 7` under `[solver]` to require that
          package versions are at least 7 days old before they are considered during dependency resolution. Added in:
          v2.4.0
      - regex: (?ms)^\[solver\](?:[^\[]*?)min-release-age\s*=\s*(?P<TARGET>"[^"]*"|[0-6](?:\s|#|$)|false)
        message: >-
          This poetry.toml does not set a dependency cooldown via `solver.min-release-age`. Without a cooldown, Poetry
          may resolve newly published package versions that have not yet been vetted by the community. Supply chain
          attacks frequently involve publishing a malicious version of a popular package and waiting for it to be pulled
          in — most are detected and removed within days. Set `min-release-age = 7` under `[solver]` to require that
          package versions are at least 7 days old before they are considered during dependency resolution. Added in:
          v2.4.0
    cwe:
      - CWE-829
    owasp:
      - A08:2021
    references:
      - https://python-poetry.org/docs/configuration/#solvermin-release-age
    tags:
      - poetry
      - python

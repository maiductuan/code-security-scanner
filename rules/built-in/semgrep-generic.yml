  - id: xss-from-unescaped-url-param
    name: xss-from-unescaped-url-param
    description: >-
      To remediate this issue, ensure that all URL parameters are properly escaped before including them in scripts.
      Please update your code to use either the JSENCODE method to escape URL parameters or the escape="true" attribute
      on <apex:outputText> tags. Passing URL parameters directly into scripts and DOM sinks creates an opportunity for
      Cross-Site Scripting attacks. Cross-Site Scripting (XSS) attacks are a type of injection, in which malicious
      scripts are injected into otherwise benign and trusted websites. To remediate this issue, ensure that all URL
      parameters are properly escaped before including them in scripts.
    category: xss
    severity: high

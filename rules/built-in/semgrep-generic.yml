  - id: avoid-native-dml-in-loops
    name: avoid-native-dml-in-loops
    description: >-
      Avoid DML statements inside loops to avoid hitting the DML governor limit. Instead, try to batch up the data into
      a list and invoke your DML once on that list of data outside the loop.
    category: security
    severity: high
    confidence: medium
    languages:
      - generic
    patterns:
      - regex: .*
        message: >-
          Avoid DML statements inside loops to avoid hitting the DML governor limit. Instead, try to batch up the data
          into a list and invoke your DML once on that list of data outside the loop.
    cwe: []
    owasp: []
    references:
      - https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/apex_gov_limits.htm
    tags:
      - salesforce
  - id: avoid-operations-with-limits-in-loops

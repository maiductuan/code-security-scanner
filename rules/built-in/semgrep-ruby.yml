rules:
  - id: anthropic-hardcoded-api-key-ruby
    name: anthropic-hardcoded-api-key-ruby
    description: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          Anthropic::Client.new(api_key: "$KEY", ...)
        message: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/initial-setup
    tags:
      - anthropic
  - id: llm-api-key-in-source-ruby
    name: llm-api-key-in-source-ruby
    description: >-
      AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI, Anthropic,
      Google, Hugging Face). Use environment variables or a secrets manager instead.
    category: injection
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: $VAR = "$KEY"
        message: >-
          AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI,
          Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
    tags:
      - openai
      - anthropic
      - google
      - huggingface
  - id: openai-hardcoded-api-key-ruby
    name: openai-hardcoded-api-key-ruby
    description: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          OpenAI::Client.new(access_token: "$KEY", ...)
        message: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://help.openai.com/en/articles/5112595-best-practices-for-api-key-safety
    tags:
      - openai
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: bundler-gemfile-missing-cooldown
    name: bundler-gemfile-missing-cooldown
    description: >-
      A Gemfile `source` declaration without a `cooldown` (or with a cooldown below 7 days) allows Bundler to resolve
      newly published gem versions immediately, before the community has had time to detect malicious releases. The May
      2026 RubyGems supply-chain attack demonstrated that threat actors can push compromised gem versions and have them
      automatically pulled into builds within minutes. Add `cooldown: 7` to each public source declaration so Bundler
      ignores gem versions published within the last 7 days during dependency resolution (e.g. `source
      "https://rubygems.org", cooldown: 7`). If you operate an internal or private registry where the supply-chain risk
      is lower, use `cooldown: 0` as an explicit bypass. Note: this feature requires Bundler >= 4.0.13. Cooldown only
      applies during `bundle update` and `bundle add`; `bundle install` with an existing lockfile is unaffected.
    category: file-ops
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          A Gemfile `source` declaration without a `cooldown` (or with a cooldown below 7 days) allows Bundler to
          resolve newly published gem versions immediately, before the community has had time to detect malicious
          releases. The May 2026 RubyGems supply-chain attack demonstrated that threat actors can push compromised gem
          versions and have them automatically pulled into builds within minutes. Add `cooldown: 7` to each public
          source declaration so Bundler ignores gem versions published within the last 7 days during dependency
          resolution (e.g. `source "https://rubygems.org", cooldown: 7`). If you operate an internal or private registry
          where the supply-chain risk is lower, use `cooldown: 0` as an explicit bypass. Note: this feature requires
          Bundler >= 4.0.13. Cooldown only applies during `bundle update` and `bundle add`; `bundle install` with an
          existing lockfile is unaffected.
    cwe:
      - CWE-829
    owasp:
      - A08:2021
    references:
      - https://blog.rubygems.org/2026/06/03/cooldown-let-new-gems-be-vetted.html
    tags:
      - bundler
      - ruby
  - id: http-client-requests
    name: http-client-requests
    description: >-
      Checks for requests to http (unencrypted) sites using some of ruby's most popular REST/HTTP libraries, including
      httparty and restclient.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          HTTParty.$PARTYVERB("=~/[hH][tT][tT][pP]://.*/", ...)
        message: >-
          Checks for requests to http (unencrypted) sites using some of ruby's most popular REST/HTTP libraries,
          including httparty and restclient.
      - pattern: |
          $STRING = "=~/[hH][tT][tT][pP]://.*/"
          ...
          HTTParty.$PARTYVERB($STRING, ...)
        message: >-
          Checks for requests to http (unencrypted) sites using some of ruby's most popular REST/HTTP libraries,
          including httparty and restclient.
      - pattern: |
          RestClient.$RESTVERB "=~/[hH][tT][tT][pP]://.*/", ...
        message: >-
          Checks for requests to http (unencrypted) sites using some of ruby's most popular REST/HTTP libraries,
          including httparty and restclient.
      - pattern: |
          RestClient::Request.execute(..., url: "=~/[hH][tT][tT][pP]://.*/", ...)
        message: >-
          Checks for requests to http (unencrypted) sites using some of ruby's most popular REST/HTTP libraries,
          including httparty and restclient.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
    references:
      - https://github.com/rest-client/rest-client
      - https://github.com/jnunemaker/httparty/tree/master/docs
    tags:
      - httparty
      - rest-client
  - id: net-ftp-request
    name: net-ftp-request
    description: >-
      Checks for outgoing connections to ftp servers with the 'net/ftp' package. FTP does not encrypt traffic, possibly
      leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          $FTP = Net::FTP.new('...')
          ...
          $FTP.login
        message: >-
          Checks for outgoing connections to ftp servers with the 'net/ftp' package. FTP does not encrypt traffic,
          possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol.
      - pattern: |
          Net::FTP.open('...') do |ftp|
            ...
            ftp.login
          end
        message: >-
          Checks for outgoing connections to ftp servers with the 'net/ftp' package. FTP does not encrypt traffic,
          possibly leading to PII being sent plaintext over the network. Instead, connect via the SFTP protocol.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
    references:
      - https://docs.ruby-lang.org/en/2.0.0/Net/FTP.html
    tags:
      - ruby
  - id: net-http-request
    name: net-http-request
    description: >-
      Checks for requests sent to http:// URLs. This is dangerous as the server is attempting to connect to a website
      that does not encrypt traffic with TLS. Instead, only send requests to https:// URLs.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Checks for requests sent to http:// URLs. This is dangerous as the server is attempting to connect to a
          website that does not encrypt traffic with TLS. Instead, only send requests to https:// URLs.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
    references:
      - https://ruby-doc.org/stdlib-2.6.5/libdoc/net/http/rdoc/Net/
    tags:
      - ruby
  - id: net-telnet-request
    name: net-telnet-request
    description: >-
      Checks for creation of telnet servers or attempts to connect through telnet. This is insecure as the telnet
      protocol supports no encryption, and data passes through unencrypted.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          Net::Telnet::new(...)
        message: >-
          Checks for creation of telnet servers or attempts to connect through telnet. This is insecure as the telnet
          protocol supports no encryption, and data passes through unencrypted.
      - pattern: |
          Net::SSH::Telnet.new(...)
        message: >-
          Checks for creation of telnet servers or attempts to connect through telnet. This is insecure as the telnet
          protocol supports no encryption, and data passes through unencrypted.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
    references:
      - https://docs.ruby-lang.org/en/2.2.0/Net/Telnet.html
      - https://www.rubydoc.info/gems/net-ssh-telnet2/0.1.0/Net/SSH/Telnet
    tags:
      - ruby
  - id: openuri-request
    name: openuri-request
    description: Checks for requests to http and ftp (unencrypted) sites using OpenURI.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          URI.open('=~/[hH][tT][tT][pP]://.*/', ...)
        message: Checks for requests to http and ftp (unencrypted) sites using OpenURI.
      - pattern: |
          $URI = URI.parse('=~/[hH][tT][tT][pP]://.*/', ...)
          ...
          $URI.open
        message: Checks for requests to http and ftp (unencrypted) sites using OpenURI.
      - pattern: |
          URI.open('=~/^[fF][tT][pP]://.*/', ...)
        message: Checks for requests to http and ftp (unencrypted) sites using OpenURI.
      - pattern: |
          $URI = URI.parse('=~/^[fF][tT][pP]://.*/', ...)
          ...
          $URI.open
        message: Checks for requests to http and ftp (unencrypted) sites using OpenURI.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
    references:
      - https://ruby-doc.org/stdlib-2.6.3/libdoc/open-uri/rdoc/OpenURI.html
    tags:
      - open-uri
  - id: activerecord-sqli
    name: activerecord-sqli
    description: >-
      Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
      user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
      prepared statements instead. You can use parameterized statements like so: `Example.find_by_sql ["SELECT title
      FROM posts WHERE author = ? AND created > ?", author_id, start_date]`
    category: injection
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
          user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
          prepared statements instead. You can use parameterized statements like so: `Example.find_by_sql ["SELECT title
          FROM posts WHERE author = ? AND created > ?", author_id, start_date]`
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://guides.rubyonrails.org/active_record_querying.html#finding-by-sql
    tags:
      - aws-lambda
      - active-record
  - id: mysql2-sqli
    name: mysql2-sqli
    description: >-
      Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
      user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
      prepared statements instead. You can use sanitize statements like so: `escaped = client.escape(user_input)`
    category: injection
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
          user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
          prepared statements instead. You can use sanitize statements like so: `escaped = client.escape(user_input)`
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://github.com/brianmario/mysql2
    tags:
      - aws-lambda
      - mysql2
  - id: pg-sqli
    name: pg-sqli
    description: >-
      Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
      user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
      prepared statements instead. You can use parameterized statements like so: `conn.exec_params('SELECT $1 AS a, $2
      AS b, $3 AS c', [1, 2, nil])`
    category: injection
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
          user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
          prepared statements instead. You can use parameterized statements like so: `conn.exec_params('SELECT $1 AS a,
          $2 AS b, $3 AS c', [1, 2, nil])`
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://www.rubydoc.info/gems/pg/PG/Connection
    tags:
      - aws-lambda
      - postgres
      - pg
  - id: sequel-sqli
    name: sequel-sqli
    description: >-
      Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
      user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
      prepared statements instead. You can use parameterized statements like so: `DB['select * from items where name =
      ?', name]`
    category: injection
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Detected SQL statement that is tainted by `event` object. This could lead to SQL injection if the variable is
          user-controlled and not properly sanitized. In order to prevent SQL injection, use parameterized queries or
          prepared statements instead. You can use parameterized statements like so: `DB['select * from items where name
          = ?', name]`
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://github.com/jeremyevans/sequel#label-Arbitrary+SQL+queries
    tags:
      - aws-lambda
      - sequel
  - id: tainted-deserialization
    name: tainted-deserialization
    description: >-
      Deserialization of a string tainted by `event` object found. Objects in Ruby can be serialized into strings, then
      later loaded from strings. However, uses of `load` can cause remote code execution. Loading user input with
      MARSHAL, YAML or CSV can potentially be dangerous. If you need to deserialize untrusted data, you should use JSON
      as it is only capable of returning 'primitive' types such as strings, arrays, hashes, numbers and nil.
    category: security
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Deserialization of a string tainted by `event` object found. Objects in Ruby can be serialized into strings,
          then later loaded from strings. However, uses of `load` can cause remote code execution. Loading user input
          with MARSHAL, YAML or CSV can potentially be dangerous. If you need to deserialize untrusted data, you should
          use JSON as it is only capable of returning 'primitive' types such as strings, arrays, hashes, numbers and
          nil.
    cwe:
      - CWE-502
    owasp:
      - A08:2017
      - A08:2021
      - A08:2025
    references:
      - https://ruby-doc.org/core-3.1.2/doc/security_rdoc.html
      - https://groups.google.com/g/rubyonrails-security/c/61bkgvnSGTQ/m/nehwjA8tQ8EJ
      - https://github.com/presidentbeef/brakeman/blob/main/lib/brakeman/checks/check_deserialize.rb
    tags:
      - ruby
      - aws-lambda
  - id: tainted-sql-string
    name: tainted-sql-string
    description: >-
      Detected user input used to manually construct a SQL string. This is usually bad practice because manual
      construction could accidentally result in a SQL injection. An attacker could use a SQL injection to steal or
      modify contents of the database. Instead, use a parameterized query which is available by default in most database
      engines. Alternatively, consider using an object-relational mapper (ORM) such as Sequelize which will protect your
      queries.
    category: injection
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Detected user input used to manually construct a SQL string. This is usually bad practice because manual
          construction could accidentally result in a SQL injection. An attacker could use a SQL injection to steal or
          modify contents of the database. Instead, use a parameterized query which is available by default in most
          database engines. Alternatively, consider using an object-relational mapper (ORM) such as Sequelize which will
          protect your queries.
    cwe:
      - CWE-89
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://rorsecurity.info/portfolio/ruby-on-rails-sql-injection-cheat-sheet
    tags:
      - aws-lambda
  - id: ruby-jwt-decode-without-verify
    name: ruby-jwt-decode-without-verify
    description: >-
      Detected the decoding of a JWT token without a verify step. JWT tokens must be verified before use, otherwise the
      token's integrity is unknown. This means a malicious actor could forge a JWT token with any claims.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: JWT.decode($PAYLOAD,$SECRET,false,...)
        message: >-
          Detected the decoding of a JWT token without a verify step. JWT tokens must be verified before use, otherwise
          the token's integrity is unknown. This means a malicious actor could forge a JWT token with any claims.
    cwe:
      - CWE-345
    owasp:
      - A08:2021
      - A08:2025
    references:
      - https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures
    tags:
      - jwt
  - id: ruby-jwt-exposed-data
    name: ruby-jwt-exposed-data
    description: >-
      The object is passed strictly to jsonwebtoken.sign(...) Make sure that sensitive information is not exposed
      through JWT token payload.
    category: auth
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          JWT.encode($INPUT,...)
        message: >-
          The object is passed strictly to jsonwebtoken.sign(...) Make sure that sensitive information is not exposed
          through JWT token payload.
    cwe:
      - CWE-522
    owasp:
      - A02:2017
      - A04:2021
      - A06:2025
    references:
      - https://owasp.org/Top10/A04_2021-Insecure_Design
    tags:
      - jwt
  - id: ruby-jwt-exposed-credentials
    name: ruby-jwt-exposed-credentials
    description: >-
      Password is exposed through JWT token payload. This is not encrypted and the password could be compromised. Do not
      store passwords in JWT tokens.
    category: auth
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          $PAYLOAD = {...,password:...,...}
          ...
          JWT.encode($PAYLOAD,...)
        message: >-
          Password is exposed through JWT token payload. This is not encrypted and the password could be compromised. Do
          not store passwords in JWT tokens.
    cwe:
      - CWE-522
    owasp:
      - A02:2017
      - A04:2021
      - A06:2025
    references:
      - https://cwe.mitre.org/data/definitions/522.html
    tags:
      - jwt
  - id: ruby-jwt-hardcoded-secret
    name: ruby-jwt-hardcoded-secret
    description: >-
      Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
      https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect the
      credentials (e.g. keeping secrets in environment variables)
    category: secrets
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Hardcoded JWT secret or private key is used. This is a Insufficiently Protected Credentials weakness:
          https://cwe.mitre.org/data/definitions/522.html Consider using an appropriate security mechanism to protect
          the credentials (e.g. keeping secrets in environment variables)
    cwe:
      - CWE-522
    owasp:
      - A02:2017
      - A04:2021
      - A06:2025
    references:
      - https://owasp.org/Top10/A04_2021-Insecure_Design
    tags:
      - jwt
  - id: ruby-jwt-none-alg
    name: ruby-jwt-none-alg
    description: >-
      Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token has
      already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
      verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
    category: auth
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: |
          JWT.encode($PAYLOAD, $SECRET, 'none', ...)
        message: >-
          Detected use of the 'none' algorithm in a JWT token. The 'none' algorithm assumes the integrity of the token
          has already been verified. This would allow a malicious actor to forge a JWT token that will automatically be
          verified. Do not explicitly use the 'none' algorithm. Instead, use an algorithm such as 'HS256'.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - jwt
  - id: sha224-hash
    name: sha224-hash
    description: >-
      This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
      updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - ruby
    patterns:
      - pattern: Digest::SHA224.$FUNC
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
      - pattern: OpenSSL::Digest::SHA224.$FUNC
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
      - pattern: SHA3::Digest::SHA224(...)
        message: >-
          This code uses a 224-bit hash function, which is deprecated or disallowed in some security policies. Consider
          updating to a stronger hash function such as SHA-384 or higher to ensure compliance and security.
    cwe:
      - CWE-328
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-131Ar3.ipd.pdf
      - >-
        https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism/cyber-security-guidelines/guidelines-cryptography
    tags:
      - ruby
  - id: bad-deserialization-env
    name: bad-deserialization-env
    description: >-
      Checks for unsafe deserialization. Objects in Ruby can be serialized into strings, then later loaded from strings.
      However, uses of load and object_load can cause remote code execution. Loading user input with MARSHAL or CSV can
      potentially be dangerous. Use JSON in a secure fashion instead.
    category: security
    severity: high
    confidence: medium
    languages:
      - ruby
    patterns:
      - regex: .*
        message: >-
          Checks for unsafe deserialization. Objects in Ruby can be serialized into strings, then later loaded from

    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.chat.completions.create({...})
        message: >-
          OpenAI chat completion created without a 'user' parameter. Including a unique user identifier helps OpenAI

  - id: sequelize-tls-disabled-cert-validation
    name: sequelize-tls-disabled-cert-validation
    description: >-
      Set "rejectUnauthorized" to false is a convenient way to resolve certificate error. But this method is unsafe
      because it disables the server certificate verification, making the Node app open to MITM attack.
      "rejectUnauthorized" option must be alway set to True (default value). With self -signed certificate or custom CA,
      use "ca" option to define Root Certificate. This rule checks TLS configuration only for Postgresql, MariaDB and
      MySQL. SQLite is not really concerned by TLS configuration. This rule could be extended for MSSQL, but the
      dialectOptions is specific for Tedious.
    category: security
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          {
            host: $HOST,
            database: $DATABASE,
            dialect: $DIALECT,
            dialectOptions: {
              ssl: {
                rejectUnauthorized: false
              }
            }
           }
        message: >-
          Set "rejectUnauthorized" to false is a convenient way to resolve certificate error. But this method is unsafe
          because it disables the server certificate verification, making the Node app open to MITM attack.
          "rejectUnauthorized" option must be alway set to True (default value). With self -signed certificate or custom
          CA, use "ca" option to define Root Certificate. This rule checks TLS configuration only for Postgresql,
          MariaDB and MySQL. SQLite is not really concerned by TLS configuration. This rule could be extended for MSSQL,
          but the dialectOptions is specific for Tedious.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://node-postgres.com/features/ssl
      - https://nodejs.org/api/tls.html#tls_class_tls_tlssocket
      - https://nodejs.org/api/tls.html#tls_tls_createsecurecontext_options
    tags:
      - sequelize
  - id: sequelize-weak-tls-version
    name: sequelize-weak-tls-version
    description: >-
      TLS1.0 and TLS1.1 are deprecated and should not be used anymore. By default, NodeJS used TLSv1.2. So, TLS min
      version must not be downgrade to TLS1.0 or TLS1.1. Enforce TLS1.3 is highly recommended This rule checks TLS
      configuration only for PostgreSQL, MariaDB and MySQL. SQLite is not really concerned by TLS configuration. This
      rule could be extended for MSSQL, but the dialectOptions is specific for Tedious.
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          TLS1.0 and TLS1.1 are deprecated and should not be used anymore. By default, NodeJS used TLSv1.2. So, TLS min
          version must not be downgrade to TLS1.0 or TLS1.1. Enforce TLS1.3 is highly recommended This rule checks TLS
          configuration only for PostgreSQL, MariaDB and MySQL. SQLite is not really concerned by TLS configuration.
          This rule could be extended for MSSQL, but the dialectOptions is specific for Tedious.
    cwe:
      - CWE-319
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://node-postgres.com/features/ssl
      - https://nodejs.org/api/tls.html#tls_class_tls_tlssocket
      - https://nodejs.org/api/tls.html#tls_tls_createsecurecontext_options
      - https://nodejs.org/api/tls.html#tls_tls_default_min_version
    tags:
      - sequelize

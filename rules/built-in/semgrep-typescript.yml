  - id: sequelize-raw-query
    name: sequelize-raw-query
    description: >-
      Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL Injection.
      Data replacement or data binding should be used. See https://sequelize.org/master/manual/raw-queries.html
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          $DATABASE.sequelize.query(`...${...}...`, ...)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. Data replacement or data binding should be used. See
          https://sequelize.org/master/manual/raw-queries.html
      - pattern: |
          $QUERY = `...${...}...`
          ...
          $DATABASE.sequelize.query($QUERY, ...)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. Data replacement or data binding should be used. See
          https://sequelize.org/master/manual/raw-queries.html
      - pattern: |
          $DATABASE.sequelize.query($SQL + $VALUE, ...)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. Data replacement or data binding should be used. See
          https://sequelize.org/master/manual/raw-queries.html
      - pattern: |
          $QUERY = $SQL + $VALUE
          ...
          $DATABASE.sequelize.query($QUERY, ...)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. Data replacement or data binding should be used. See
          https://sequelize.org/master/manual/raw-queries.html
      - pattern: |
          Sequelize.literal(`...${...}...`)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. Data replacement or data binding should be used. See
          https://sequelize.org/master/manual/raw-queries.html
      - pattern: |
          $QUERY = `...${...}...`
          ...
          Sequelize.literal($QUERY)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. Data replacement or data binding should be used. See
          https://sequelize.org/master/manual/raw-queries.html
      - pattern: |
          Sequelize.literal($SQL + $VALUE)
        message: >-
          Avoiding SQL string concatenation: untrusted input concatenated with raw SQL query can result in SQL
          Injection. Data replacement or data binding should be used. See
          https://sequelize.org/master/manual/raw-queries.html
      - pattern: |

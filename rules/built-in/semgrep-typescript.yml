  - id: sax-xxe
    name: sax-xxe
    description: >-
      Use of 'ondoctype' in 'sax' library detected. By default, 'sax' won't do anything with custom DTD entity
      definitions. If you're implementing a custom DTD entity definition, be sure not to introduce XML External Entity
      (XXE) vulnerabilities, or be absolutely sure that external entities received from a trusted source while
      processing XML.
    category: api-security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          require('sax');
          ...
          $PARSER.ondoctype = ...;
        message: >-
          Use of 'ondoctype' in 'sax' library detected. By default, 'sax' won't do anything with custom DTD entity
          definitions. If you're implementing a custom DTD entity definition, be sure not to introduce XML External
          Entity (XXE) vulnerabilities, or be absolutely sure that external entities received from a trusted source
          while processing XML.
      - pattern: |-
          require('sax');
          ...
          $PARSER.on('doctype',...);
        message: >-
          Use of 'ondoctype' in 'sax' library detected. By default, 'sax' won't do anything with custom DTD entity
          definitions. If you're implementing a custom DTD entity definition, be sure not to introduce XML External
          Entity (XXE) vulnerabilities, or be absolutely sure that external entities received from a trusted source
          while processing XML.
    cwe:
      - CWE-611
    owasp:
      - A04:2017
      - A05:2021
      - A02:2025
    references:
      - https://github.com/Leonidas-from-XIV/node-xml2js/issues/415
      - https://github.com/isaacs/sax-js
    tags:
      - sax

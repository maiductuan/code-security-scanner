          $GRPC($ADDR,...,$CREDS,...);
        message: >-
          Found an insecure gRPC connection. This creates a connection without encryption to a gRPC client/server. A
          malicious attacker could tamper with the gRPC message, which could compromise the machine.
      - pattern: |-

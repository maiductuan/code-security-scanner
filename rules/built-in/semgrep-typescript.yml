rules:
  - id: anthropic-hardcoded-api-key-javascript
    name: anthropic-hardcoded-api-key-javascript
    description: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          new Anthropic({apiKey: "$KEY", ...})
        message: Anthropic API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/initial-setup
    tags:
      - anthropic
  - id: anthropic-missing-max-tokens-javascript
    name: anthropic-missing-max-tokens-javascript
    description: >-
      Anthropic messages.create() called without 'max_tokens' parameter. Setting max_tokens prevents unexpectedly long
      or expensive responses.
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.messages.create({...})
        message: >-
          Anthropic messages.create() called without 'max_tokens' parameter. Setting max_tokens prevents unexpectedly
          long or expensive responses.
    cwe:
      - CWE-770
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-missing-metadata-user-id-javascript
    name: anthropic-missing-metadata-user-id-javascript
    description: >-
      Anthropic messages.create() called without 'metadata' parameter. Pass a metadata object with a hashed user_id to
      enable abuse tracking and policy enforcement. See https://docs.anthropic.com/en/api/messages
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.messages.create({...})
        message: >-
          Anthropic messages.create() called without 'metadata' parameter. Pass a metadata object with a hashed user_id
          to enable abuse tracking and policy enforcement. See https://docs.anthropic.com/en/api/messages
    cwe:
      - CWE-778
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-missing-refusal-check-javascript
    name: anthropic-missing-refusal-check-javascript
    description: >-
      Anthropic response content accessed without checking stop_reason. Check response.stop_reason to handle cases where
      the model stops unexpectedly (e.g., due to max_tokens or content filtering).
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $RESP.content
        message: >-
          Anthropic response content accessed without checking stop_reason. Check response.stop_reason to handle cases
          where the model stops unexpectedly (e.g., due to max_tokens or content filtering).
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-missing-system-prompt-javascript
    name: anthropic-missing-system-prompt-javascript
    description: >-
      Anthropic messages.create() called without a 'system' parameter. A system prompt helps set behavioral guidelines
      and safety boundaries for the model.
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.messages.create({...})
        message: >-
          Anthropic messages.create() called without a 'system' parameter. A system prompt helps set behavioral
          guidelines and safety boundaries for the model.
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-no- high-handling-javascript
    name: anthropic-no- high-handling-javascript
    description: >-
      Anthropic API call without error handling. Wrap API calls in try/catch to handle rate limits, API errors, and
      network issues gracefully.
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          Anthropic API call without error handling. Wrap API calls in try/catch to handle rate limits, API errors, and
          network issues gracefully.
    cwe:
      - CWE-754
    owasp: []
    references:
      - https://docs.anthropic.com/en/api/messages
    tags:
      - anthropic
  - id: anthropic-user-input-in-system-prompt-js
    name: anthropic-user-input-in-system-prompt-js
    description: >-
      User input flows into the Anthropic system prompt. This enables prompt injection attacks where users can override
      system instructions. Validate and sanitize user input, or keep system prompts hardcoded.
    category: security
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          User input flows into the Anthropic system prompt. This enables prompt injection attacks where users can
          override system instructions. Validate and sanitize user input, or keep system prompts hardcoded.
    cwe:
      - CWE-77
    owasp: []
    references:
      - https://docs.anthropic.com/en/docs/initial-setup
    tags:
      - anthropic
  - id: cohere-hardcoded-api-key-javascript
    name: cohere-hardcoded-api-key-javascript
    description: Cohere API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          new CohereClient({token: "$KEY", ...})
        message: Cohere API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://docs.cohere.com/reference/about
    tags:
      - cohere
  - id: cohere-missing-safety-mode-javascript
    name: cohere-missing-safety-mode-javascript
    description: >-
      Cohere chat called without explicit 'safety_mode' parameter. Set safetyMode to 'STRICT' or 'CONTEXTUAL' to
      explicitly configure content safety guardrails. See https://docs.cohere.com/docs/safety-modes
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.chat({...})
        message: >-
          Cohere chat called without explicit 'safety_mode' parameter. Set safetyMode to 'STRICT' or 'CONTEXTUAL' to
          explicitly configure content safety guardrails. See https://docs.cohere.com/docs/safety-modes
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://docs.cohere.com/docs/safety-modes
    tags:
      - cohere
  - id: cohere-safety-mode-off-javascript
    name: cohere-safety-mode-off-javascript
    description: >-
      Cohere safety mode explicitly set to 'OFF', disabling all safety guardrails. Use 'STRICT' or 'CONTEXTUAL' instead.
      See https://docs.cohere.com/docs/safety-modes
    category: security
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          $CLIENT.chat({..., safetyMode: "OFF", ...})
        message: >-
          Cohere safety mode explicitly set to 'OFF', disabling all safety guardrails. Use 'STRICT' or 'CONTEXTUAL'
          instead. See https://docs.cohere.com/docs/safety-modes
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://docs.cohere.com/docs/safety-modes
    tags:
      - cohere
  - id: cohere-user-input-in-system-prompt-js
    name: cohere-user-input-in-system-prompt-js
    description: >-
      User input flows into the Cohere preamble/system prompt. This enables prompt injection attacks where users can
      override system instructions. Validate and sanitize user input, or keep preamble text hardcoded.
    category: security
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          User input flows into the Cohere preamble/system prompt. This enables prompt injection attacks where users can
          override system instructions. Validate and sanitize user input, or keep preamble text hardcoded.
    cwe:
      - CWE-77
    owasp: []
    references:
      - https://docs.cohere.com/docs/safety-modes
    tags:
      - cohere
  - id: gemini-hardcoded-api-key-javascript
    name: gemini-hardcoded-api-key-javascript
    description: Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: new GoogleGenerativeAI("$KEY")
        message: Google Gemini API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://ai.google.dev/gemini-api/docs/api-key
    tags:
      - gemini
      - google
  - id: gemini-missing-safety-settings-javascript
    name: gemini-missing-safety-settings-javascript
    description: >-
      Gemini generate_content() called without safety_settings. Configure safety settings to control content filtering
      thresholds for harmful content categories.
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $MODEL.generateContent({...})
        message: >-
          Gemini generate_content() called without safety_settings. Configure safety settings to control content
          filtering thresholds for harmful content categories.
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://ai.google.dev/gemini-api/docs/safety-settings
    tags:
      - gemini
  - id: gemini-missing-system-instruction-javascript
    name: gemini-missing-system-instruction-javascript
    description: >-
      Gemini GenerativeModel created without 'systemInstruction' parameter. A system instruction helps establish
      behavioral guidelines and safety boundaries for the model. See
      https://ai.google.dev/gemini-api/docs/safety-guidance
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.getGenerativeModel({...})
        message: >-
          Gemini GenerativeModel created without 'systemInstruction' parameter. A system instruction helps establish
          behavioral guidelines and safety boundaries for the model. See
          https://ai.google.dev/gemini-api/docs/safety-guidance
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://ai.google.dev/gemini-api/docs/safety-guidance
    tags:
      - gemini
  - id: gemini-user-input-in-system-prompt-js
    name: gemini-user-input-in-system-prompt-js
    description: >-
      User input flows into the Gemini system instruction. This enables prompt injection attacks where users can
      override system instructions. Validate and sanitize user input, or keep system instructions hardcoded.
    category: security
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          User input flows into the Gemini system instruction. This enables prompt injection attacks where users can
          override system instructions. Validate and sanitize user input, or keep system instructions hardcoded.
    cwe:
      - CWE-77
    owasp: []
    references:
      - https://ai.google.dev/docs
    tags:
      - gemini
  - id: huggingface-hardcoded-api-key-javascript
    name: huggingface-hardcoded-api-key-javascript
    description: >-
      Hugging Face API token is hardcoded in source code. Use environment variables or a secrets manager instead. See
      https://huggingface.co/docs/hub/en/security-tokens
    category: secrets
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: new InferenceClient("$KEY", ...)
        message: >-
          Hugging Face API token is hardcoded in source code. Use environment variables or a secrets manager instead.
          See https://huggingface.co/docs/hub/en/security-tokens
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://huggingface.co/docs/hub/en/security-tokens
    tags:
      - huggingface
  - id: llm-api-key-in-source-javascript
    name: llm-api-key-in-source-javascript
    description: >-
      AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI, Anthropic,
      Google, Hugging Face). Use environment variables or a secrets manager instead.
    category: injection
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI,
          Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
    tags:
      - openai
      - anthropic
      - google
      - huggingface
  - id: llm-output-to-exec-javascript
    name: llm-output-to-exec-javascript
    description: >-
      LLM API response data flows into a dangerous code execution function (eval, new Function, child_process.exec).
      This enables code injection attacks where a compromised or manipulated LLM response can execute arbitrary code on
      the host system. Validate and sandbox LLM outputs before execution.
    category: security
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          LLM API response data flows into a dangerous code execution function (eval, new Function, child_process.exec).
          This enables code injection attacks where a compromised or manipulated LLM response can execute arbitrary code
          on the host system. Validate and sandbox LLM outputs before execution.
    cwe:
      - CWE-94
    owasp: []
    references:
      - https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/
    tags:
      - openai
      - anthropic
  - id: mistral-hardcoded-api-key-javascript
    name: mistral-hardcoded-api-key-javascript
    description: Mistral API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          new Mistral({apiKey: "$KEY", ...})
        message: Mistral API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://docs.mistral.ai/getting-started/quickstart/
    tags:
      - mistral
  - id: mistral-missing-safe-prompt-javascript
    name: mistral-missing-safe-prompt-javascript
    description: >-
      Mistral chat completion called without 'safe_prompt' parameter. Setting safePrompt=true enables Mistral's built-in
      safety guardrailing. See https://docs.mistral.ai/capabilities/guardrailing/
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.chat.complete({...})
        message: >-
          Mistral chat completion called without 'safe_prompt' parameter. Setting safePrompt=true enables Mistral's
          built-in safety guardrailing. See https://docs.mistral.ai/capabilities/guardrailing/
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://docs.mistral.ai/capabilities/guardrailing/
    tags:
      - mistral
  - id: mistral-user-input-in-system-prompt-js
    name: mistral-user-input-in-system-prompt-js
    description: >-
      User input flows into the Mistral system prompt. This enables prompt injection attacks where users can override
      system instructions. Validate and sanitize user input, or move user input to the 'user' role message instead.
    category: security
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - regex: .*
        message: >-
          User input flows into the Mistral system prompt. This enables prompt injection attacks where users can
          override system instructions. Validate and sanitize user input, or move user input to the 'user' role message
          instead.
    cwe:
      - CWE-77
    owasp: []
    references:
      - https://docs.mistral.ai/capabilities/guardrailing/
    tags:
      - mistral
  - id: openai-hardcoded-api-key-javascript
    name: openai-hardcoded-api-key-javascript
    description: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    category: secrets
    severity: high
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          new OpenAI({apiKey: "$KEY", ...})
        message: OpenAI API key is hardcoded in source code. Use environment variables or a secrets manager instead.
    cwe:
      - CWE-798
    owasp: []
    references:
      - https://help.openai.com/en/articles/5112595-best-practices-for-api-key-safety
    tags:
      - openai
  - id: openai-missing-max-tokens-javascript
    name: openai-missing-max-tokens-javascript
    description: >-
      OpenAI chat completion created without 'max_tokens' parameter. Setting max_tokens prevents unexpectedly long or
      expensive responses and limits potential abuse. See
      https://developers.openai.com/api/docs/guides/safety-best-practices
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.chat.completions.create({...})
        message: >-
          OpenAI chat completion created without 'max_tokens' parameter. Setting max_tokens prevents unexpectedly long
          or expensive responses and limits potential abuse. See
          https://developers.openai.com/api/docs/guides/safety-best-practices
    cwe:
      - CWE-1188
    owasp: []
    references:
      - https://developers.openai.com/api/docs/guides/safety-best-practices
    tags:
      - openai
  - id: openai-missing-refusal-check-javascript
    name: openai-missing-refusal-check-javascript
    description: >-
      OpenAI response content accessed without checking for refusal. The model may refuse requests, and accessing
      .content without checking .refusal first may lead to unexpected behavior. Check
      response.choices[0].message.refusal before accessing content.
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $RESP.choices[0].message.content
        message: >-
          OpenAI response content accessed without checking for refusal. The model may refuse requests, and accessing
          .content without checking .refusal first may lead to unexpected behavior. Check
          response.choices[0].message.refusal before accessing content.
    cwe:
      - CWE-252
    owasp: []
    references:
      - https://developers.openai.com/api/docs/guides/safety-best-practices/
    tags:
      - openai
  - id: openai-missing-safety-identifier-javascript
    name: openai-missing-safety-identifier-javascript
    description: >-
      OpenAI Responses API called without 'safety_identifier' parameter. Include a hashed user identifier to enable
      abuse monitoring and safety checks. See https://developers.openai.com/api/docs/guides/safety-checks
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: $CLIENT.responses.create({...})
        message: >-
          OpenAI Responses API called without 'safety_identifier' parameter. Include a hashed user identifier to enable
          abuse monitoring and safety checks. See https://developers.openai.com/api/docs/guides/safety-checks
    cwe:
      - CWE-778
    owasp: []
    references:
      - https://developers.openai.com/api/docs/guides/safety-checks/
    tags:
      - openai
  - id: openai-missing-system-message-js
    name: openai-missing-system-message-js
    description: >-
      OpenAI chat completion created without a system message. A system message helps establish behavioral guidelines
      and safety boundaries for the model.
    category: security
    severity: medium
    confidence: medium
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          $CLIENT.chat.completions.create({..., messages: $MSGS, ...})
        message: >-
          OpenAI chat completion created without a system message. A system message helps establish behavioral
          guidelines and safety boundaries for the model.
    cwe:
      - CWE-77
    owasp: []
    references:
      - https://developers.openai.com/api/docs/guides/safety-best-practices/
    tags:
      - openai
  - id: openai-missing-user-parameter-javascript

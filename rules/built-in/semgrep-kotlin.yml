rules:
  - id: detect-gemini
    name: detect-gemini
    description: 'Possibly found usage of AI: Gemini'
    category: security
    severity: low
    confidence: medium
    languages:
      - kotlin
    patterns:
      - pattern: import com.google.ai
        message: 'Possibly found usage of AI: Gemini'
      - pattern: GenerativeModel(...)
        message: 'Possibly found usage of AI: Gemini'
    cwe: []
    owasp: []
    references:
      - https://semgrep.dev/blog/2024/detecting-shadow-ai
    tags:
      - genAI
      - LLMs
  - id: contains-bidirectional-characters
    name: contains-bidirectional-characters
    description: >-
      This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left languages
      such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a manner that is
      different from how it is displayed in code editing and review tools. If this is not what you were expecting,
      please review this code in an editor that can reveal hidden Unicode characters.
    category: security
    severity: medium
    confidence: medium
    languages:
      - bash
      - c
      - csharp
      - go
      - java
      - javascript
      - json
      - kotlin
      - lua
      - ocaml
      - php
      - python
      - ruby
      - rust
      - scala
      - sh
      - typescript
      - yaml
    patterns:
      - regex: .*
        message: >-
          This code contains bidirectional (bidi) characters. While this is useful for support of right-to-left
          languages such as Arabic or Hebrew, it can also be used to trick language parsers into executing code in a
          manner that is different from how it is displayed in code editing and review tools. If this is not what you
          were expecting, please review this code in an editor that can reveal hidden Unicode characters.
    cwe:
      - CWE-94
    owasp:
      - A03:2021
      - A05:2025
    references:
      - https://trojansource.codes/
    tags:
      - unicode
  - id: des-is-deprecated
    name: des-is-deprecated
    description: >-
      DES is considered deprecated. AES is the recommended cipher. Upgrade to use AES. See
      https://www.nist.gov/news-events/news/2005/06/nist-withdraws-outdated-data-encryption-standard for more
      information.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
      - kt
    patterns:
      - regex: .*
        message: >-
          DES is considered deprecated. AES is the recommended cipher. Upgrade to use AES. See
          https://www.nist.gov/news-events/news/2005/06/nist-withdraws-outdated-data-encryption-standard for more
          information.
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://www.nist.gov/news-events/news/2005/06/nist-withdraws-outdated-data-encryption-standard
      - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html#algorithms
    tags:
      - java
  - id: desede-is-deprecated
    name: desede-is-deprecated
    description: Triple DES (3DES or DESede) is considered deprecated. AES is the recommended cipher. Upgrade to use AES.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
      - kt
    patterns:
      - regex: .*
        message: Triple DES (3DES or DESede) is considered deprecated. AES is the recommended cipher. Upgrade to use AES.
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://csrc.nist.gov/News/2017/Update-to-Current-Use-and-Deprecation-of-TDEA
    tags:
      - java
  - id: rsa-no-padding
    name: rsa-no-padding
    description: Using RSA without OAEP mode weakens the encryption.
    category: security
    severity: medium
    confidence: medium
    languages:
      - java
      - kt
    patterns:
      - pattern: $CIPHER.getInstance("=~/RSA/[Nn][Oo][Nn][Ee]/NoPadding/")
        message: Using RSA without OAEP mode weakens the encryption.
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://rdist.root.org/2009/10/06/why-rsa-encryption-padding-is-critical/
    tags:
      - java
      - kotlin
  - id: build-gradle-password-hardcoded
    name: build-gradle-password-hardcoded
    description: >-
      A secret is hard-coded in the application. Secrets stored in source code, such as credentials, identifiers, and
      other types of sensitive data, can be leaked and used by internal or external malicious actors. It is recommended
      to rotate the secret and retrieve them from a secure secret vault or Hardware Security Module (HSM), alternatively
      environment variables can be used if allowed by your company policy.
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - kotlin
    patterns:
      - regex: .*
        message: >-
          A secret is hard-coded in the application. Secrets stored in source code, such as credentials, identifiers,
          and other types of sensitive data, can be leaked and used by internal or external malicious actors. It is
          recommended to rotate the secret and retrieve them from a secure secret vault or Hardware Security Module
          (HSM), alternatively environment variables can be used if allowed by your company policy.
    cwe:
      - CWE-798
    owasp:
      - A07:2021
      - A07:2025
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures
    tags:
      - secrets
  - id: anonymous-ldap-bind
    name: anonymous-ldap-bind
    description: >-
      Detected anonymous LDAP bind. This permits anonymous users to execute LDAP statements. Consider enforcing
      authentication for LDAP. See https://docs.oracle.com/javase/tutorial/jndi/ldap/auth_mechs.html for more
      information.
    category: security
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - pattern: |
          $ENV.put($CTX.SECURITY_AUTHENTICATION, "none")
          ...
          $DCTX = InitialDirContext($ENV, ...)
        message: >-
          Detected anonymous LDAP bind. This permits anonymous users to execute LDAP statements. Consider enforcing
          authentication for LDAP. See https://docs.oracle.com/javase/tutorial/jndi/ldap/auth_mechs.html for more
          information.
    cwe:
      - CWE-287
    owasp:
      - A02:2017
      - A07:2021
      - A07:2025
    references:
      - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures
    tags:
      - kotlin
  - id: bad-hexa-conversion
    name: bad-hexa-conversion
    description: >-
      'Integer.toHexString()' strips leading zeroes from each byte if read byte-by-byte. This mistake weakens the hash
      value computed since it introduces more collisions. Use 'String.format("%02X", ...)' instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - pattern: |-
          fun $METHOD(...) {
            ...
            val $MD: MessageDigest = ...
            ...
            $MD.digest(...)
            ...
            Integer.toHexString(...)
          }
        message: >-
          'Integer.toHexString()' strips leading zeroes from each byte if read byte-by-byte. This mistake weakens the
          hash value computed since it introduces more collisions. Use 'String.format("%02X", ...)' instead.
    cwe:
      - CWE-704
    owasp:
      - A03:2017
    references:
      - https://cwe.mitre.org/data/definitions/704.html
    tags:
      - kotlin
  - id: command-injection-formatted-runtime-call
    name: command-injection-formatted-runtime-call
    description: >-
      A formatted or concatenated string was detected as input to a java.lang.Runtime call. This is dangerous if a
      variable is controlled by user input and could result in a command injection. Ensure your variables are not
      controlled by users or sufficiently sanitized.
    category: injection
    severity: high
    confidence: medium
    languages:
      - kt
    patterns:
      - pattern: $RUNTIME.exec($X + $Y)
        message: >-
          A formatted or concatenated string was detected as input to a java.lang.Runtime call. This is dangerous if a
          variable is controlled by user input and could result in a command injection. Ensure your variables are not
          controlled by users or sufficiently sanitized.
      - pattern: $RUNTIME.exec(String.format(...))
        message: >-
          A formatted or concatenated string was detected as input to a java.lang.Runtime call. This is dangerous if a
          variable is controlled by user input and could result in a command injection. Ensure your variables are not
          controlled by users or sufficiently sanitized.
      - pattern: $RUNTIME.loadLibrary($X + $Y)
        message: >-
          A formatted or concatenated string was detected as input to a java.lang.Runtime call. This is dangerous if a
          variable is controlled by user input and could result in a command injection. Ensure your variables are not
          controlled by users or sufficiently sanitized.
      - pattern: $RUNTIME.loadLibrary(String.format(...))
        message: >-
          A formatted or concatenated string was detected as input to a java.lang.Runtime call. This is dangerous if a
          variable is controlled by user input and could result in a command injection. Ensure your variables are not
          controlled by users or sufficiently sanitized.
    cwe:
      - CWE-78
    owasp:
      - A01:2017
      - A03:2021
      - A05:2025
    references:
      - https://owasp.org/Top10/A03_2021-Injection
    tags:
      - kt
  - id: cookie-missing-httponly
    name: cookie-missing-httponly
    description: >-
      A cookie was detected without setting the 'HttpOnly' flag. The 'HttpOnly' flag for cookies instructs the browser
      to forbid client-side scripts from reading the cookie. Set the 'HttpOnly' flag by calling
      'cookie.setHttpOnly(true);'
    category: security
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - regex: .*
        message: >-
          A cookie was detected without setting the 'HttpOnly' flag. The 'HttpOnly' flag for cookies instructs the
          browser to forbid client-side scripts from reading the cookie. Set the 'HttpOnly' flag by calling
          'cookie.setHttpOnly(true);'
    cwe:
      - CWE-1004
    owasp:
      - A05:2021
      - A02:2025
    references:
      - https://owasp.org/Top10/A05_2021-Security_Misconfiguration
    tags:
      - kt
  - id: cookie-missing-secure-flag
    name: cookie-missing-secure-flag
    description: >-
      A cookie was detected without setting the 'secure' flag. The 'secure' flag for cookies prevents the client from
      transmitting the cookie over insecure channels such as HTTP. Set the 'secure' flag by calling
      '$COOKIE.setSecure(true);'
    category: security
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - regex: .*
        message: >-
          A cookie was detected without setting the 'secure' flag. The 'secure' flag for cookies prevents the client
          from transmitting the cookie over insecure channels such as HTTP. Set the 'secure' flag by calling
          '$COOKIE.setSecure(true);'
    cwe:
      - CWE-614
    owasp:
      - A05:2021
      - A02:2025
    references:
      - https://owasp.org/Top10/A05_2021-Security_Misconfiguration
    tags:
      - kt
  - id: defaulthttpclient-is-deprecated
    name: defaulthttpclient-is-deprecated
    description: >-
      DefaultHttpClient is deprecated. Further, it does not support connections using TLS1.2, which makes using
      DefaultHttpClient a security hazard. Use SystemDefaultHttpClient instead, which supports TLS1.2.
    category: security
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - pattern: DefaultHttpClient(...)
        message: >-
          DefaultHttpClient is deprecated. Further, it does not support connections using TLS1.2, which makes using
          DefaultHttpClient a security hazard. Use SystemDefaultHttpClient instead, which supports TLS1.2.
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - kotlin
  - id: ecb-cipher
    name: ecb-cipher
    description: >-
      Cipher in ECB mode is detected. ECB mode produces the same output for the same input each time which allows an
      attacker to intercept and replay the data. Further, ECB mode does not provide any integrity checking. See
      https://find-sec-bugs.github.io/bugs.htm#CIPHER_INTEGRITY.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - regex: .*
        message: >-
          Cipher in ECB mode is detected. ECB mode produces the same output for the same input each time which allows an
          attacker to intercept and replay the data. Further, ECB mode does not provide any integrity checking. See
          https://find-sec-bugs.github.io/bugs.htm#CIPHER_INTEGRITY.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - kotlin
  - id: gcm-detection
    name: gcm-detection
    description: >-
      GCM detected, please check that IV/nonce is not reused, an Initialization Vector (IV) is a nonce used to randomize
      the encryption, so that even if multiple messages with identical plaintext are encrypted, the generated
      corresponding ciphertexts are different.Unlike the Key, the IV usually does not need to be secret, rather it is
      important that it is random and unique. Certain encryption schemes the IV is exchanged in public as part of the
      ciphertext. Reusing same Initialization Vector with the same Key to encrypt multiple plaintext blocks allows an
      attacker to compare the ciphertexts and then, with some assumptions on the content of the messages, to gain
      important information about the data being encrypted.
    category: security
    severity: low
    confidence: medium
    languages:
      - kt
    patterns:
      - regex: .*
        message: >-
          GCM detected, please check that IV/nonce is not reused, an Initialization Vector (IV) is a nonce used to
          randomize the encryption, so that even if multiple messages with identical plaintext are encrypted, the
          generated corresponding ciphertexts are different.Unlike the Key, the IV usually does not need to be secret,
          rather it is important that it is random and unique. Certain encryption schemes the IV is exchanged in public
          as part of the ciphertext. Reusing same Initialization Vector with the same Key to encrypt multiple plaintext
          blocks allows an attacker to compare the ciphertexts and then, with some assumptions on the content of the
          messages, to gain important information about the data being encrypted.
    cwe:
      - CWE-323
    owasp:
      - A02:2021
      - A04:2025
    references:
      - https://cwe.mitre.org/data/definitions/323.html
    tags:
      - kotlin
  - id: no-null-cipher
    name: no-null-cipher
    description: >-
      NullCipher was detected. This will not encrypt anything; the cipher text will be the same as the plain text. Use a
      valid, secure cipher: Cipher.getInstance("AES/CBC/PKCS7PADDING"). See
      https://owasp.org/www-community/Using_the_Java_Cryptographic_Extensions for more information.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - kt
      - scala
    patterns:
      - pattern: NullCipher(...)
        message: >-
          NullCipher was detected. This will not encrypt anything; the cipher text will be the same as the plain text.
          Use a valid, secure cipher: Cipher.getInstance("AES/CBC/PKCS7PADDING"). See
          https://owasp.org/www-community/Using_the_Java_Cryptographic_Extensions for more information.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - kotlin
  - id: unencrypted-socket
    name: unencrypted-socket
    description: >-
      This socket is not encrypted. The traffic could be read by an attacker intercepting the network traffic. Use an
      SSLSocket created by 'SSLSocketFactory' or 'SSLServerSocketFactory' instead
    category: security
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - regex: .*
        message: >-
          This socket is not encrypted. The traffic could be read by an attacker intercepting the network traffic. Use
          an SSLSocket created by 'SSLSocketFactory' or 'SSLServerSocketFactory' instead
    cwe:
      - CWE-319
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - kotlin
  - id: use-of-md5
    name: use-of-md5
    description: >-
      Detected MD5 hash algorithm which is considered insecure. MD5 is not collision resistant and is therefore not
      suitable as a cryptographic signature. Use SHA256 or SHA3 instead.
    category: crypto
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - pattern: |
          java.security.MessageDigest.getInstance("MD5")
        message: >-
          Detected MD5 hash algorithm which is considered insecure. MD5 is not collision resistant and is therefore not
          suitable as a cryptographic signature. Use SHA256 or SHA3 instead.
      - pattern: |
          org.apache.commons.codec.digest.DigestUtils.getMd5Digest()
        message: >-
          Detected MD5 hash algorithm which is considered insecure. MD5 is not collision resistant and is therefore not
          suitable as a cryptographic signature. Use SHA256 or SHA3 instead.
    cwe:
      - CWE-328
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - kotlin
  - id: use-of-sha1
    name: use-of-sha1
    description: >-
      Detected SHA1 hash algorithm which is considered insecure. SHA1 is not collision resistant and is therefore not
      suitable as a cryptographic signature. Use SHA256 or SHA3 instead.
    category: security
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - pattern: |
          $DU.getSha1Digest().digest(...)
        message: >-
          Detected SHA1 hash algorithm which is considered insecure. SHA1 is not collision resistant and is therefore
          not suitable as a cryptographic signature. Use SHA256 or SHA3 instead.
    cwe:
      - CWE-327
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://owasp.org/Top10/A02_2021-Cryptographic_Failures
    tags:
      - kotlin
  - id: use-of-weak-rsa-key
    name: use-of-weak-rsa-key
    description: RSA keys should be at least 2048 bits based on NIST recommendation.
    category: secrets
    severity: medium
    confidence: medium
    languages:
      - kt
    patterns:
      - regex: .*
        message: RSA keys should be at least 2048 bits based on NIST recommendation.
    cwe:
      - CWE-326
    owasp:
      - A03:2017
      - A02:2021
      - A04:2025
    references:
      - https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html#algorithms
    tags:
      - kotlin
